<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตั้งรหัสผ่านใหม่ — SchoolPL</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display:flex; flex-direction:column; min-height:100vh; background:#f0f4ff; }
    .wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:32px 16px; }
    .card { background:#fff; border-radius:14px; box-shadow:0 4px 24px rgba(0,0,0,.10); padding:32px; width:100%; max-width:400px; }
    .card h2 { font-size:17px; font-weight:700; color:var(--navy); margin-bottom:6px; }
    .card p  { font-size:13px; color:var(--muted); margin-bottom:20px; }
    .error-msg   { background:#fee2e2; color:#b91c1c; padding:10px 14px; border-radius:7px; font-size:13px; margin-bottom:14px; display:none; }
    .success-msg { background:#dcfce7; color:#166534; padding:10px 14px; border-radius:7px; font-size:13px; margin-bottom:14px; display:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>ตั้งรหัสผ่านใหม่</h2>
      <p id="subtitle">กรุณาตั้งรหัสผ่านใหม่สำหรับบัญชีของคุณ</p>

      <div class="error-msg"   id="error-msg"></div>
      <div class="success-msg" id="success-msg"></div>

      <form id="form" novalidate>
        <div class="form-group">
          <label>รหัสผ่านใหม่ <span style="color:#b91c1c">*</span></label>
          <input type="password" id="newPassword" placeholder="อย่างน้อย 6 ตัวอักษร" required autocomplete="new-password">
        </div>
        <div class="form-group">
          <label>ยืนยันรหัสผ่าน <span style="color:#b91c1c">*</span></label>
          <input type="password" id="confirmPassword" placeholder="กรอกรหัสผ่านอีกครั้ง" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-navy btn-full" id="submit-btn" style="margin-top:8px">บันทึกรหัสผ่าน</button>
      </form>
    </div>
  </div>

  <script>
    const token = new URLSearchParams(location.search).get('token');
    if (!token) {
      document.getElementById('error-msg').textContent = 'ลิงก์ไม่ถูกต้อง กรุณาขอรีเซ็ตใหม่';
      document.getElementById('error-msg').style.display = 'block';
      document.getElementById('form').style.display = 'none';
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('error-msg');
      const okEl  = document.getElementById('success-msg');
      const btn   = document.getElementById('submit-btn');
      errEl.style.display = 'none';
      okEl.style.display  = 'none';

      const newPassword     = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword.length < 6) { show('error', 'รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร'); return; }
      if (newPassword !== confirmPassword) { show('error', 'รหัสผ่านทั้งสองช่องไม่ตรงกัน'); return; }

      btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword }),
        });
        const data = await res.json();
        if (res.ok) {
          show('success', '✅ ตั้งรหัสผ่านสำเร็จ กำลังไปหน้าเข้าสู่ระบบ...');
          document.getElementById('form').style.display = 'none';
          setTimeout(() => location.href = 'login.html', 1800);
        } else {
          show('error', data.error || 'เกิดข้อผิดพลาด');
        }
      } catch { show('error', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้'); }
      finally { btn.disabled = false; btn.textContent = 'บันทึกรหัสผ่าน'; }
    });

    function show(type, msg) {
      const el = document.getElementById(type === 'error' ? 'error-msg' : 'success-msg');
      el.textContent = msg; el.style.display = 'block';
    }
  </script>
</body>
</html>
