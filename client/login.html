<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SchoolPL — Play & Learn</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f0f4ff;
    }

    /* ── Brand hero ─────────────────────────────────────────── */
    .login-hero {
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #7c3aed 100%);
      padding: 40px 24px 36px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* floating circles decoration */
    .login-hero::before,
    .login-hero::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      opacity: .12;
      background: #fff;
    }
    .login-hero::before { width: 200px; height: 200px; top: -60px; left: -50px; }
    .login-hero::after  { width: 140px; height: 140px; bottom: -40px; right: -30px; }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px; height: 64px;
      background: rgba(255,255,255,.18);
      border-radius: 18px;
      font-size: 32px;
      margin-bottom: 14px;
      backdrop-filter: blur(4px);
      border: 1.5px solid rgba(255,255,255,.25);
    }

    .brand-name {
      font-size: 32px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -.5px;
      line-height: 1;
    }
    .brand-name span { color: #93c5fd; }

    .brand-tagline {
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 99px;
      padding: 5px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #e0f2fe;
      letter-spacing: .06em;
    }
    .brand-tagline .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #34d399;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.5; transform:scale(1.4); }
    }

    .brand-sub {
      margin-top: 10px;
      font-size: 12px;
      color: rgba(255,255,255,.6);
    }

    /* ── Login card ─────────────────────────────────────────── */
    .login-wrap {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 0 16px 40px;
    }

    .login-card {
      background: #fff;
      border-radius: 0 0 16px 16px;
      box-shadow: 0 8px 32px rgba(37,99,235,.12);
      padding: 28px 28px 32px;
      width: 100%;
      max-width: 380px;
    }

    .login-card h2 {
      font-size: 15px;
      font-weight: 700;
      color: #1e3a8a;
      margin-bottom: 20px;
      text-align: center;
    }

    .error-msg {
      background: #fee2e2;
      color: #b91c1c;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
    }

    .register-link {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-top: 16px;
    }
    .register-link a { color: #2563eb; text-decoration: none; font-weight: 600; }
    .register-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Brand Hero -->
  <div class="login-hero">
    <div class="brand-logo">🎓</div>
    <div class="brand-name">School<span>PL</span></div>
    <div style="margin-top:10px">
      <div class="brand-tagline">
        <span class="dot"></span>
        Play &amp; Learn
      </div>
    </div>
    <div class="brand-sub">ระบบฝึกสอบออนไลน์ ป.4 — ม.3</div>
  </div>

  <!-- Login Form -->
  <div class="login-wrap">
    <div class="login-card">
      <h2>เข้าสู่ระบบ</h2>

      <div class="error-msg" id="error-msg"></div>

      <div class="form-group">
        <label>ชื่อผู้ใช้</label>
        <input type="text" id="username" placeholder="username" autocomplete="username">
      </div>
      <div class="form-group">
        <label>รหัสผ่าน</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn btn-navy btn-full mt-16" id="login-btn" onclick="login()">เข้าสู่ระบบ</button>

      <div class="register-link" style="margin-top:10px">
        <a href="forgot-password.html" style="color:#6b7280;font-size:13px">ลืมรหัสผ่าน?</a>
      </div>
      <div class="register-link">
        ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a>
      </div>
    </div>
  </div>

  <script src="login-script.js"></script>
  <script>
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    window.login = async function() {
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'กำลังเข้าสู่ระบบ...';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
          if (data.mustChangePassword) {
            window.location.href = 'change-password.html';
          } else {
            window.location.href = 'dashboard.html';
          }
        } else {
          errEl.textContent = data.message || 'เข้าสู่ระบบไม่สำเร็จ';
          errEl.style.display = 'block';
        }
      } catch {
        errEl.textContent = 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'เข้าสู่ระบบ';
      }
    };
  </script>
</body>
</html>
