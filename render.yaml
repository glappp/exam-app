services:
  - type: web
    name: exam-app
    env: node
    region: singapore
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: node server/Index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: PORT
        value: 3001

    # ---- Persistent disk สำหรับ SQLite ----
    # ถ้าใช้ Render free tier ให้ลบ disk ออก (data จะหายทุก deploy)
    # ถ้าใช้ paid tier ให้ uncomment บรรทัดนี้:
    # disk:
    #   name: exam-app-db
    #   mountPath: /opt/render/project/src/server/prisma
    #   sizeGB: 1
