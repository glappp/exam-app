<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ข้อสอบจริง</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" defer></script>
</head>
<body>
  <div id="app" class="container">
    <h1>ข้อสอบจริง</h1>
<div class="exam-layout">
  <div class="question-area">
    <div id="question-container"></div>
  </div>
  <div class="nav-sidebar" id="navigation">
    <button id="prev-btn" disabled title="ย้อนกลับ">⬅️</button>
    <span id="progress" style="text-align: center;"></span>
    <button id="next-btn" title="ข้อต่อไป">➡️</button>
  </div>
</div>


    <div id="submit-section" class="mt-4" style="display:none;">
      <button id="submit-btn">ส่งคำตอบทั้งหมด</button>
    </div>

    <div id="result-section" class="mt-6"></div>
  </div>

  <script>
    const user = localStorage.getItem('user');
    if (!user) {
      alert("กรุณาเข้าสู่ระบบก่อนใช้งาน");
      window.location.href = "/login.html";
    }

    const urlParams = new URLSearchParams(window.location.search);
    const grade = urlParams.get('grade');
    const examType = urlParams.get('examType');
    const year = urlParams.get('year');
    const timed = urlParams.get('timed');

    let questions = [];
    let currentIndex = 0;
    let answers = [];




    async function fetchQuestions() {
      const source = decodeURIComponent(examType); // เช่น Chulabhorn Science-Math test
const res = await fetch(`/api/exam-set-official?source=${encodeURIComponent(source)}&year=${year}&grade=${grade}`);

      if (!res.ok) {
        alert("ไม่พบชุดข้อสอบที่เลือก กรุณาตรวจสอบใหม่");
        return;
      }
      questions = await res.json();
      answers = new Array(questions.length).fill(null);
      renderQuestion();
      updateProgress();
    }

    function renderQuestion() {
      const q = questions[currentIndex];
      const container = document.getElementById('question-container');
      container.innerHTML = `
        <div class="question-box">
          <div class="question-text">${(q.textTh || '').replace(/\n/g, '<br>')}</div>
          ${q.image ? `<img src="${q.image}" class="question-image">` : ''}
          <div class="answer-section">
            ${q.choices && q.choices.length ? q.choices.map((c, i) => `
              <label>
                <input type="radio" name="answer" value="${i}" ${answers[currentIndex] == i ? 'checked' : ''}>
                ${c.textTh}
              </label>
            `).join('<br>') : `
              <input type="text" id="short-answer" value="${answers[currentIndex] || ''}" placeholder="พิมพ์คำตอบ">
            `}
          </div>
        </div>
      `;

      if (window.MathJax) MathJax.typesetPromise();

      document.querySelectorAll('input[name="answer"]').forEach(input => {
        input.addEventListener('change', e => {
          answers[currentIndex] = parseInt(e.target.value);
        });
      });

      const shortInput = document.getElementById('short-answer');
      if (shortInput) {
        shortInput.addEventListener('input', e => {
          answers[currentIndex] = e.target.value;
        });
      }
    }
function updateProgress() {
  document.getElementById('progress').textContent = `ข้อ ${currentIndex + 1} / ${questions.length}`;
  document.getElementById('prev-btn').disabled = currentIndex === 0;
  document.getElementById('next-btn').innerHTML = currentIndex === questions.length - 1 ? '✅' : '&rarr;';
  document.getElementById('prev-btn').innerHTML = '&larr;';
}



    document.getElementById('prev-btn').addEventListener('click', () => {
      if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
        updateProgress();
      }
    });

    document.getElementById('next-btn').addEventListener('click', () => {
      if (currentIndex < questions.length - 1) {
        currentIndex++;
        renderQuestion();
        updateProgress();
      } else {
        const unanswered = [];
        for (let i = 0; i < answers.length; i++) {
          if (answers[i] === null || answers[i] === '') {
            unanswered.push(i + 1);
          }
        }

        if (unanswered.length > 0) {
          alert(`คุณยังไม่ได้ตอบข้อ: ${unanswered.join(', ')}\nกรุณาตอบให้ครบก่อนส่ง`);
          return;
        }

        const ok = confirm("คุณแน่ใจหรือไม่ว่าต้องการส่งคำตอบทั้งหมด?");
        if (!ok) return;

        document.getElementById('submit-section').style.display = 'block';
        document.getElementById('navigation').style.display = 'none';
      }
    });

    document.getElementById('submit-btn').addEventListener('click', async () => {
      const res = await fetch('/api/submit-exam', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          mode: 'official',
          source: examType,
          year,
          grade,
          questions: questions.map(q => q.id),
          answers,
        })
      });
      const result = await res.json();
      localStorage.setItem("examResult", JSON.stringify(result));
      window.location.href = "/result-competitive.html";
    });

    fetchQuestions();

  </script>
</body>
</html>
