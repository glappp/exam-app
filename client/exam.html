<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เลือกการสอบ — SchoolPL</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .mode-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
    @media (max-width: 480px) { .mode-cards { grid-template-columns: 1fr; } }

    .mode-card {
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      background: #fff;
    }
    .mode-card:hover { border-color: var(--blue); }
    .mode-card.active { border-color: var(--blue); background: #eff6ff; }
    .mode-card .icon { font-size: 26px; display: block; margin-bottom: 6px; }
    .mode-card .label { font-weight: 700; font-size: 14px; }
    .mode-card .desc  { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .options-panel { display: none; }
    .options-panel.visible { display: block; }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="topbar-title">เลือกการสอบ</span>
    <div class="topbar-nav">
      <span class="topbar-user" id="greeting"></span>
      <a href="dashboard.html">หน้าหลัก</a>
      <a href="#" onclick="logout()">ออกจากระบบ</a>
    </div>
  </div>

  <div class="page">
    <div class="card">
      <div class="card-title">โหมดการสอบ</div>
      <div class="mode-cards">
        <div class="mode-card active" id="card-official" onclick="selectMode('official')">
          <span class="icon">📄</span>
          <div class="label">ข้อสอบจริง</div>
          <div class="desc">ข้อสอบเก่าจริงตามปีและสนาม</div>
        </div>
        <div class="mode-card" id="card-practice" onclick="selectMode('practice')">
          <span class="icon">⏱️</span>
          <div class="label">ฝึกสอบ (สุ่มข้อ)</div>
          <div class="desc">สุ่มข้อสอบตามชั้นและสนาม</div>
        </div>
      </div>

      <div class="options-panel visible" id="opts-official">
        <div class="form-row">
          <div class="form-group">
            <label>ระดับชั้น</label>
            <select id="grade-official"></select>
          </div>
          <div class="form-group">
            <label>สนามสอบ</label>
            <select id="examType-official"></select>
          </div>
        </div>
        <div style="margin-top:12px;padding:10px 14px;background:#fefce8;border:1px solid #fde047;border-radius:8px;font-size:12px;color:#713f12;line-height:1.6">
          ⚠️ <strong>หมายเหตุ:</strong> บางสนามสอบไม่เปิดเผยข้อสอบที่ใช้จริง ข้อมูลในระบบอาจรวบรวมมาจากสื่ออินเทอร์เน็ตและความทรงจำของผู้เข้าสอบ จึงอาจมีความคลาดเคลื่อนจากข้อสอบจริง
        </div>
      </div>

      <div class="options-panel" id="opts-practice">
        <div class="form-row">
          <div class="form-group">
            <label>ระดับชั้น</label>
            <select id="grade-practice"></select>
          </div>
          <div class="form-group">
            <label>สนามสอบ</label>
            <select id="examType-practice"></select>
          </div>
        </div>
      </div>

      <div class="form-group mt-16" style="display:flex;align-items:center;gap:8px">
        <input type="checkbox" id="timed" style="width:auto;margin:0">
        <label for="timed" style="margin:0;font-size:14px;font-weight:500;color:var(--text)">จับเวลา</label>
      </div>

      <button class="btn btn-primary mt-16" onclick="startExam()">เริ่มสอบ</button>
    </div>
  </div>

  <script>
    const _urlType = new URLSearchParams(location.search).get('type');
    let currentMode = _urlType === 'practice' ? 'practice' : 'official';

    // ถ้าระบุ type มาใน URL → ซ่อน mode cards และล็อก mode
    if (_urlType === 'official' || _urlType === 'practice') {
      document.querySelector('.mode-cards').style.display = 'none';
      document.querySelectorAll('.options-panel').forEach(p => p.classList.remove('visible'));
      document.getElementById(`opts-${currentMode}`).classList.add('visible');
    }

    function selectMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
      document.getElementById(`card-${mode}`).classList.add('active');
      document.querySelectorAll('.options-panel').forEach(p => p.classList.remove('visible'));
      document.getElementById(`opts-${mode}`).classList.add('visible');
    }

    async function fetchOptions(mode) {
      const res = await fetch(`/api/exam-options?mode=${mode}`);
      if (!res.ok) return;
      const data = await res.json();
      const suffix = mode === 'official' ? '-official' : '-practice';

      const gradeEl    = document.getElementById('grade'    + suffix);
      const examTypeEl = document.getElementById('examType' + suffix);
      gradeEl.innerHTML = '';
      examTypeEl.innerHTML = '';

      data.grades.forEach(g => {
        gradeEl.innerHTML += `<option value="${g}">${gradeLabel(g)}</option>`;
      });
      (data.examSets || []).forEach(e => {
        examTypeEl.innerHTML += `<option value="${e.source}">${e.label}</option>`;
      });

    }

    function gradeLabel(g) {
      return { p4:'ป.4', p5:'ป.5', p6:'ป.6', m1:'ม.1', m2:'ม.2', m3:'ม.3' }[g] || g;
    }
    function examLabel(e) {
      return { chulabhorn:'จุฬาภรณ์', suankularb:'สวนกุหลาบ', muengnont:'เมืองนนท์' }[e] || e;
    }

    function startExam() {
      const suffix = currentMode === 'official' ? '-official' : '-practice';
      const grade    = document.getElementById('grade'    + suffix).value;
      const examType = document.getElementById('examType' + suffix).value;
      const timed    = document.getElementById('timed').checked ? '1' : '0';

      if (currentMode === 'official') {
        location.href = `exam-official.html?grade=${grade}&examType=${examType}&timed=${timed}`;
      } else {
        location.href = `test-competitive.html?grade=${grade}&examType=${examType}&timed=${timed}`;
      }
    }

    function logout() {
      fetch('/api/logout', { method: 'POST', credentials: 'include' });
      location.href = 'login.html';
    }

    (async () => {
      const res = await fetch('/api/me', { credentials: 'include' });
      if (!res.ok) { location.href = 'login.html'; return; }
      const me = await res.json();
      document.getElementById('greeting').textContent = `สวัสดี, ${me.firstName || ''}`;
      await Promise.all([fetchOptions('official'), fetchOptions('practice')]);
    })();
  </script>
</body>
</html>
