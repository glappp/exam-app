<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>กล่องรางวัล — SchoolPL</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; }

    header {
      background: rgba(15,23,42,0.9);
      backdrop-filter: blur(8px);
      padding: 14px 20px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: sticky; top: 0; z-index: 10;
    }
    header h1 { font-size: 1.15rem; font-weight: 700; }
    .back-btn {
      background: rgba(255,255,255,0.1);
      border: none; color: #fff;
      padding: 6px 12px; border-radius: 8px;
      cursor: pointer; font-size: 0.9rem;
    }

    .container { max-width: 600px; margin: 0 auto; padding: 20px 16px; }

    /* ── Inventory ── */
    .inv-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      margin-bottom: 28px;
    }
    .inv-card {
      border-radius: 16px; padding: 16px 20px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer; transition: transform .15s, box-shadow .15s;
      user-select: none;
    }
    .inv-card:hover:not(.disabled) { transform: translateY(-2px); }
    .inv-card.silver {
      background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
      border: 2px solid #64748b;
      box-shadow: 0 4px 20px rgba(100,116,139,0.25);
    }
    .inv-card.gold {
      background: linear-gradient(135deg, #78350f 0%, #431407 100%);
      border: 2px solid #d97706;
      box-shadow: 0 4px 20px rgba(217,119,6,0.3);
    }
    .inv-card.disabled { opacity: 0.4; cursor: not-allowed; }
    .box-icon { font-size: 2.6rem; line-height: 1; }
    .inv-info .inv-label { font-size: 0.78rem; color: rgba(255,255,255,0.55); }
    .inv-info .inv-count { font-size: 1.6rem; font-weight: 700; }
    .inv-info .inv-action { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-top: 2px; }
    .inv-card.silver .inv-count { color: #cbd5e1; }
    .inv-card.gold   .inv-count { color: #fbbf24; }

    /* ── Stage ── */
    .stage {
      min-height: 280px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
    }
    .stage-hint {
      text-align: center; color: #475569;
      font-size: 0.95rem; line-height: 1.6;
    }
    .stage-hint .big { font-size: 3.5rem; display: block; margin-bottom: 8px; }

    @keyframes shake {
      0%,100% { transform: rotate(0deg) scale(1); }
      15%      { transform: rotate(-8deg) scale(1.05); }
      30%      { transform: rotate(8deg)  scale(1.1); }
      45%      { transform: rotate(-6deg) scale(1.08); }
      60%      { transform: rotate(6deg)  scale(1.12); }
      75%      { transform: rotate(-4deg) scale(1.1); }
      90%      { transform: rotate(4deg)  scale(1.05); }
    }
    @keyframes burst {
      0%   { transform: scale(1);   opacity: 1; }
      50%  { transform: scale(1.7); opacity: 0.5; }
      100% { transform: scale(0.3); opacity: 0; }
    }
    @keyframes popIn {
      0%   { transform: scale(0.5) translateY(20px); opacity: 0; }
      60%  { transform: scale(1.08) translateY(-4px); opacity: 1; }
      100% { transform: scale(1)   translateY(0);    opacity: 1; }
    }

    .opening-box {
      font-size: 6rem; line-height: 1;
      cursor: pointer;
      display: inline-block;
    }
    .opening-box.shaking { animation: shake .7s ease-in-out; }
    .opening-box.bursting { animation: burst .35s ease-in forwards; }

    /* ── Result card ── */
    .result-card {
      width: 100%;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 28px 24px;
      text-align: center;
      animation: popIn .5s cubic-bezier(.34,1.56,.64,1) both;
    }
    .result-icon { font-size: 4rem; margin-bottom: 12px; }
    .result-title { font-size: 1rem; color: #94a3b8; margin-bottom: 6px; }
    .result-value { font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
    .result-sub { font-size: 0.85rem; color: #64748b; }
    .result-xp            { color: #6ee7b7; }
    .result-parent_points { color: #fcd34d; }
    .result-ticket        { color: #93c5fd; }
    .result-gold_box      { color: #fbbf24; }
    .result-reward        { color: #f9a8d4; }

    .claim-ref {
      display: inline-block; margin-top: 12px;
      background: rgba(255,255,255,0.06);
      border-radius: 8px; padding: 6px 14px;
      font-family: monospace; font-size: 0.82rem; color: #cbd5e1;
    }

    .open-again-btn {
      margin-top: 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff; padding: 10px 24px;
      border-radius: 10px; cursor: pointer;
      font-size: 0.9rem; transition: background .15s;
    }
    .open-again-btn:hover { background: rgba(255,255,255,0.15); }

    /* ── History ── */
    .section-label {
      font-size: 0.72rem; font-weight: 700;
      color: #475569; text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 10px; margin-top: 32px;
    }
    .history-list { display: flex; flex-direction: column; gap: 6px; }
    .history-item {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.04);
      border-radius: 10px; padding: 10px 14px;
      font-size: 0.85rem;
    }
    .h-icon  { font-size: 1.3rem; width: 28px; text-align: center; flex-shrink: 0; }
    .h-desc  { flex: 1; color: #cbd5e1; }
    .h-box   { font-size: 0.72rem; color: #475569; }
    .h-time  { font-size: 0.72rem; color: #334155; white-space: nowrap; }
    .empty-history { text-align: center; color: #334155; padding: 24px; font-size: 0.88rem; }
  </style>
</head>
<body>

<header>
  <button class="back-btn" onclick="history.back()">← กลับ</button>
  <h1>🎁 กล่องรางวัล</h1>
</header>

<div class="container">

  <!-- Inventory -->
  <div class="inv-row">
    <div class="inv-card silver disabled" id="silver-card" onclick="selectBox('silver')">
      <div class="box-icon">📦</div>
      <div class="inv-info">
        <div class="inv-label">กล่องเงิน</div>
        <div class="inv-count" id="silver-count">—</div>
        <div class="inv-action">คลิกเพื่อเปิด</div>
      </div>
    </div>
    <div class="inv-card gold disabled" id="gold-card" onclick="selectBox('gold')">
      <div class="box-icon">🏅</div>
      <div class="inv-info">
        <div class="inv-label">กล่องทอง</div>
        <div class="inv-count" id="gold-count">—</div>
        <div class="inv-action">คลิกเพื่อเปิด</div>
      </div>
    </div>
  </div>

  <!-- Stage -->
  <div class="stage" id="stage">
    <div class="stage-hint">
      <span class="big">🎁</span>
      เลือกกล่องด้านบนเพื่อเริ่มเปิด
    </div>
  </div>

  <!-- History -->
  <div class="section-label">ประวัติการเปิดกล่อง (20 ล่าสุด)</div>
  <div id="history-wrap"><div class="empty-history">กำลังโหลด...</div></div>

</div>

<script>
let inventory = { silver: 0, gold: 0 };
let busy = false;

/* ── Icons & labels ── */
function rewardIcon(type) {
  return { xp:'⚡', parent_points:'⭐', ticket:'🎟️', gold_box:'🏅', reward:'🎀' }[type] || '🎁';
}
function rewardLabel(type, amount, name) {
  if (type === 'xp')            return `+${amount} XP`;
  if (type === 'parent_points') return `+${amount} Parent Points`;
  if (type === 'ticket')        return `Ticket ×${amount}`;
  if (type === 'gold_box')      return `กล่องทอง ×${amount}`;
  if (type === 'reward')        return name || 'ของรางวัลพิเศษ';
  return type;
}
function rewardSub(type, amount, name, desc) {
  if (type === 'xp')            return 'เพิ่ม XP ให้นักเรียน';
  if (type === 'parent_points') return 'คะแนนสำหรับผู้ปกครอง';
  if (type === 'ticket')        return 'Ticket ใช้สำหรับซื้อสิทธิ์พิเศษ';
  if (type === 'gold_box')      return '🎉 โชคดี! ได้กล่องทองมา';
  if (type === 'reward')        return desc || '';
  return '';
}
function fmtTime(iso) {
  return new Date(iso).toLocaleString('th-TH', {
    day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit',
  });
}

/* ── Inventory ── */
async function loadInventory() {
  try {
    const res = await fetch('/api/box/inventory');
    if (!res.ok) return;
    inventory = await res.json();
    renderInventory();
  } catch(e) {}
}

function renderInventory() {
  document.getElementById('silver-count').textContent = inventory.silver;
  document.getElementById('gold-count').textContent   = inventory.gold;
  document.getElementById('silver-card').classList.toggle('disabled', inventory.silver === 0);
  document.getElementById('gold-card').classList.toggle('disabled',   inventory.gold   === 0);
}

/* ── History ── */
async function loadHistory() {
  const wrap = document.getElementById('history-wrap');
  try {
    const res = await fetch('/api/box/history');
    if (!res.ok) { wrap.innerHTML = '<div class="empty-history">โหลดประวัติไม่ได้</div>'; return; }
    const { history } = await res.json();
    if (!history.length) { wrap.innerHTML = '<div class="empty-history">ยังไม่เคยเปิดกล่อง</div>'; return; }
    wrap.innerHTML = '<div class="history-list">' + history.map(h => `
      <div class="history-item">
        <div class="h-icon">${rewardIcon(h.rewardType)}</div>
        <div class="h-desc">${rewardLabel(h.rewardType, h.rewardAmount, null)}</div>
        <div class="h-box">${h.boxType === 'silver' ? '📦 เงิน' : '🏅 ทอง'}</div>
        <div class="h-time">${fmtTime(h.createdAt)}</div>
      </div>`).join('') + '</div>';
  } catch(e) {
    wrap.innerHTML = '<div class="empty-history">โหลดไม่สำเร็จ</div>';
  }
}

/* ── Select box ── */
function selectBox(type) {
  if (busy) return;
  if (inventory[type] === 0) return;

  const emoji = type === 'silver' ? '📦' : '🏅';
  const stage = document.getElementById('stage');
  stage.innerHTML = `
    <div style="text-align:center">
      <div id="opening-box" class="opening-box" onclick="doOpen('${type}')">${emoji}</div>
      <p style="color:#64748b;font-size:0.85rem;margin-top:14px">
        แตะกล่องเพื่อเปิด!
      </p>
    </div>`;

  // idle bounce on hover
  const box = document.getElementById('opening-box');
  box.addEventListener('mouseenter', () => {
    if (!busy) { box.classList.add('shaking'); }
  });
  box.addEventListener('animationend', () => box.classList.remove('shaking'));
}

/* ── Open box ── */
async function doOpen(type) {
  if (busy) return;
  busy = true;

  const box = document.getElementById('opening-box');
  if (box) {
    // shake a bit, then burst
    box.classList.remove('shaking');
    void box.offsetWidth;
    box.classList.add('shaking');
    await sleep(700);
    box.classList.remove('shaking');
    box.classList.add('bursting');
    await sleep(350);
  }

  try {
    const res = await fetch('/api/box/open', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ boxType: type }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      showError(err.error || 'เปิดกล่องไม่สำเร็จ');
      return;
    }

    const data = await res.json();
    inventory = data.inventory;
    renderInventory();
    showResult(data.reward, type);
    loadHistory();

  } catch(e) {
    showError('เกิดข้อผิดพลาด กรุณาลองใหม่');
  }
}

/* ── Show result ── */
function showResult(reward, boxType) {
  busy = false;
  const stage = document.getElementById('stage');
  const icon  = rewardIcon(reward.type);
  const label = rewardLabel(reward.type, reward.amount, reward.rewardName);
  const sub   = rewardSub(reward.type, reward.amount, reward.rewardName, reward.rewardDesc);
  const cls   = `result-${reward.type}`;
  const hasMore = inventory[boxType] > 0;

  const claimHtml = reward.claimRef
    ? `<div class="claim-ref">🔖 รหัสรางวัล: ${reward.claimRef}</div>` : '';

  stage.innerHTML = `
    <div class="result-card">
      <div class="result-icon">${icon}</div>
      <div class="result-title">${boxType === 'silver' ? '📦 กล่องเงิน' : '🏅 กล่องทอง'} · ได้รับ</div>
      <div class="result-value ${cls}">${label}</div>
      ${sub ? `<div class="result-sub">${sub}</div>` : ''}
      ${claimHtml}
      <br>
      <button class="open-again-btn" onclick="${hasMore ? `selectBox('${boxType}')` : 'resetStage()'}">
        ${hasMore ? `เปิดอีกครั้ง (เหลือ ${inventory[boxType]})` : '← กลับหน้าเลือกกล่อง'}
      </button>
    </div>`;
}

function showError(msg) {
  busy = false;
  const stage = document.getElementById('stage');
  stage.innerHTML = `
    <div style="text-align:center;color:#f87171">
      <div style="font-size:2.5rem;margin-bottom:10px">⚠️</div>
      <div>${msg}</div>
      <button class="open-again-btn" style="margin-top:16px" onclick="resetStage()">กลับ</button>
    </div>`;
}

function resetStage() {
  busy = false;
  document.getElementById('stage').innerHTML = `
    <div class="stage-hint">
      <span class="big">🎁</span>
      เลือกกล่องด้านบนเพื่อเริ่มเปิด
    </div>`;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ── Init ── */
Promise.all([loadInventory(), loadHistory()]);
</script>
</body>
</html>
