<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายการโจทย์ — SchoolPL</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .filter-bar { display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end; margin-bottom:16px; }
    .filter-bar .form-group { margin:0; min-width:140px; }
    .filter-bar input[type=text] { height:36px; padding:0 10px; border:1px solid var(--border); border-radius:6px; font-size:14px; width:100%; box-sizing:border-box; }
    .pager { display:flex; align-items:center; gap:8px; margin-top:16px; }
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.45);
      display:flex; align-items:center; justify-content:center; z-index:100;
    }
    .modal-box {
      background:#fff; border-radius:12px; padding:24px; max-width:640px; width:90%;
      max-height:85vh; overflow-y:auto; box-shadow:0 8px 40px rgba(0,0,0,.2);
    }
    .choice-item { padding:7px 10px; margin-bottom:6px; border-radius:6px; border:1px solid var(--border); font-size:14px; }
    .choice-item.correct { background:#dcfce7; border-color:#16a34a; font-weight:600; }
  </style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">📋 รายการโจทย์</span>
  <div class="topbar-nav">
    <a href="add-question.html">+ เพิ่มโจทย์</a>
    <a href="admin.html">Admin</a>
    <a href="dashboard.html">หน้าหลัก</a>
  </div>
</div>

<div class="page">
  <div class="card">
    <!-- Filter bar -->
    <div class="filter-bar">
      <div class="form-group" style="min-width:180px">
        <label>ชุดข้อสอบ</label>
        <select id="sourceFilter">
          <option value="all">-- ทุกชุด --</option>
        </select>
      </div>
      <div class="form-group" style="min-width:160px">
        <label>หัวข้อ (topic)</label>
        <select id="topicFilter">
          <option value="all">-- ทุกหัวข้อ --</option>
        </select>
      </div>
      <div class="form-group" style="min-width:120px">
        <label>รหัส/เลขข้อ</label>
        <input type="text" id="codeFilter" placeholder="เช่น CHB-001">
      </div>
      <div class="form-group">
        <label>ความยาก</label>
        <select id="difficulty">
          <option value="all">-- ทุกระดับ --</option>
          <option value="easy">ง่าย (1)</option>
          <option value="medium">ปานกลาง (2)</option>
          <option value="hard">ยาก (3)</option>
        </select>
      </div>
      <div class="form-group" style="flex:1;min-width:160px">
        <label>ค้นหาเนื้อหา</label>
        <input type="text" id="keyword" placeholder="พิมพ์คำค้นหา...">
      </div>
      <div class="form-group" style="min-width:auto;align-self:flex-end">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;white-space:nowrap">
          <input type="checkbox" id="needsReview" onchange="search()" style="width:15px;height:15px">
          <span style="color:#b91c1c;font-weight:600">ต้องตรวจ</span>
        </label>
      </div>
      <button class="btn btn-primary" onclick="search()">ค้นหา</button>
      <button class="btn btn-ghost" onclick="resetFilters()">รีเซ็ต</button>
    </div>

    <!-- Table -->
    <div id="table-wrap"></div>

    <!-- Pagination -->
    <div class="pager" id="pager"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modal-content"></div>
</div>

<script>
  let currentPage = 1;
  let currentLang = 'th';
  let cachedQuestions = [];
  let attrDict = {};

  // Auth check
  (async () => {
    const res = await fetch('/api/me', { credentials: 'include' });
    if (!res.ok) { location.href = 'login.html'; return; }
  })();

  // โหลด attribute dict → เติม topic dropdown
  (async () => {
    try {
      const res = await fetch('/api/attribute-dict', { credentials: 'include' });
      const list = await res.json();
      attrDict = {};
      list.forEach(a => { attrDict[a.key] = a; });

      const topicSel = document.getElementById('topicFilter');
      const topics = list.filter(a => a.key.startsWith('topic:'));
      topics.forEach(a => {
        const opt = document.createElement('option');
        opt.value = a.key;
        opt.textContent = a.th || a.key;
        topicSel.appendChild(opt);
      });
    } catch {}
  })();

  // โหลด sources → เติม ชุดข้อสอบ dropdown
  (async () => {
    try {
      const res = await fetch('/questions/sources', { credentials: 'include' });
      const sources = await res.json();
      const sel = document.getElementById('sourceFilter');
      sources.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        sel.appendChild(opt);
      });
    } catch {}
  })();

  function getText(q) {
    return currentLang === 'th' ? (q.textTh || q.text || '-') : (q.textEn || q.text || '-');
  }

  function getChoiceText(c) {
    return currentLang === 'th' ? (c.textTh || c.text || '') : (c.textEn || c.text || '');
  }

  function search() { fetchQuestions(1); }

  function resetFilters() {
    document.getElementById('sourceFilter').value = 'all';
    document.getElementById('topicFilter').value = 'all';
    document.getElementById('codeFilter').value = '';
    document.getElementById('difficulty').value = 'all';
    document.getElementById('keyword').value = '';
    document.getElementById('needsReview').checked = false;
    fetchQuestions(1);
  }

  async function fetchQuestions(page = 1) {
    document.getElementById('table-wrap').innerHTML =
      '<p style="text-align:center;padding:24px;color:var(--muted)">กำลังโหลด...</p>';

    const params = new URLSearchParams({ page });
    const keyword    = document.getElementById('keyword').value.trim();
    const difficulty = document.getElementById('difficulty').value;
    const source     = document.getElementById('sourceFilter').value;
    const topic      = document.getElementById('topicFilter').value;
    const code       = document.getElementById('codeFilter').value.trim();

    if (keyword)    params.set('keyword', keyword);
    if (difficulty && difficulty !== 'all') params.set('difficulty', difficulty);
    if (source && source !== 'all') params.set('source', source);
    if (topic && topic !== 'all') { params.set('attrType', 'topic'); params.set('attrValue', topic.replace('topic:', '')); }
    if (code)       params.set('code', code);
    if (document.getElementById('needsReview').checked) params.set('needsReview', 'true');

    try {
      const res = await fetch(`/questions?${params}`, { credentials: 'include' });
      if (!res.ok) throw new Error('โหลดไม่สำเร็จ');
      const data = await res.json();
      cachedQuestions = data.questions || [];
      currentPage = data.currentPage || 1;
      renderTable(data);
      renderPager(data);
    } catch (err) {
      document.getElementById('table-wrap').innerHTML =
        `<p class="msg msg-error">${err.message}</p>`;
    }
  }

  function renderTable(data) {
    if (!data || !data.questions || data.questions.length === 0) {
      document.getElementById('table-wrap').innerHTML =
        '<p style="text-align:center;padding:24px;color:var(--muted)">ไม่พบโจทย์</p>';
      return;
    }

    const total = data.total ?? data.questions.length;
    const rows = data.questions.map(q => {
      const text = getText(q);
      const short = text.length > 60 ? text.substring(0, 60) + '…' : text;
      const diffLabel = { '1': 'ง่าย', '2': 'ปานกลาง', '3': 'ยาก' }[q.difficulty] || q.difficulty || '-';
      const diffBadge = { '1': 'badge-success', '2': 'badge-warn', '3': 'badge-error' }[q.difficulty] || 'badge-info';
      const reviewBadge = q.needsReview ? `<span style="display:inline-block;margin-left:6px;padding:1px 7px;border-radius:99px;font-size:11px;background:#fee2e2;color:#b91c1c;font-weight:600">ต้องตรวจ</span>` : '';
      return `
        <tr>
          <td style="font-size:11px;color:var(--muted);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${q.code || q.id.substring(0, 8)}</td>
          <td>${short}${reviewBadge}</td>
          <td style="text-align:center">${q.image ? `<img src="/uploads/${q.image}" height="36" style="border-radius:4px">` : '-'}</td>
          <td style="text-align:center"><span class="badge ${diffBadge}">${diffLabel}</span></td>
          <td style="text-align:center;white-space:nowrap">
            <button class="btn btn-ghost" style="padding:4px 10px;font-size:12px" onclick="showQuestion('${q.id}')">ดู</button>
            <a href="/edit-question.html?id=${q.id}" class="btn btn-ghost" style="padding:4px 10px;font-size:12px;margin-left:4px">แก้ไข</a>
          </td>
        </tr>
      `;
    }).join('');

    document.getElementById('table-wrap').innerHTML = `
      <div style="font-size:13px;color:var(--muted);margin-bottom:8px">พบ ${total} รายการ</div>
      <table class="table">
        <thead><tr><th>รหัส</th><th>โจทย์</th><th>รูป</th><th>ระดับ</th><th>จัดการ</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  function renderPager(data) {
    const { currentPage: cp, totalPages: tp } = data;
    if (tp <= 1) { document.getElementById('pager').innerHTML = ''; return; }

    let html = '';
    if (cp > 1) html += `<button class="btn btn-ghost" style="padding:6px 12px" onclick="fetchQuestions(${cp - 1})">← ก่อนหน้า</button>`;
    html += `<span style="font-size:14px;color:var(--muted)">หน้า ${cp} / ${tp}</span>`;
    if (cp < tp) html += `<button class="btn btn-ghost" style="padding:6px 12px" onclick="fetchQuestions(${cp + 1})">ถัดไป →</button>`;
    document.getElementById('pager').innerHTML = html;
  }

  function showQuestion(id) {
    const q = cachedQuestions.find(q => q.id === id);
    if (!q) return;

    const text = getText(q);
    const choicesHTML = (q.choices || []).map((c, i) => {
      const isCorrect = i === q.answer;
      return `
        <div class="choice-item ${isCorrect ? 'correct' : ''}">
          ${isCorrect ? '✔ ' : ''}<strong>${String.fromCharCode(65 + i)}.</strong> ${getChoiceText(c)}
          ${c.image ? `<br><img src="/uploads/${c.image}" style="max-height:80px;margin-top:6px;border-radius:6px">` : ''}
        </div>
      `;
    }).join('');

    const attrs = q.attributes || {};
    const attrRows = ['topic', 'skill', 'trap']
      .filter(t => attrs[t]?.length)
      .map(t => `<div style="margin-bottom:4px"><strong>${t}:</strong> ${
        attrs[t].map(k => `<span class="badge badge-info" style="margin-left:4px">${attrDict[k]?.th || k}</span>`).join('')
      }</div>`)
      .join('');

    document.getElementById('modal-content').innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <strong style="font-size:16px">รายละเอียดโจทย์</strong>
        <button class="btn btn-ghost" style="padding:4px 10px" onclick="closeModal()">✕ ปิด</button>
      </div>
      <p style="font-size:15px;line-height:1.7;margin-bottom:12px">${text}</p>
      ${q.image ? `<img src="/uploads/${q.image}" style="max-width:100%;border-radius:8px;margin-bottom:12px">` : ''}
      <div style="margin-bottom:12px">${choicesHTML}</div>
      ${attrRows ? `<div style="margin-bottom:12px">${attrRows}</div>` : ''}
      <div style="font-size:12px;color:var(--muted)">รหัส: ${q.code || q.id}</div>
      <a href="/edit-question.html?id=${q.id}" class="btn btn-primary" style="margin-top:14px;display:inline-block">แก้ไขโจทย์นี้</a>
    `;
    document.getElementById('modal').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('modal').style.display = 'none';
  }

  document.getElementById('keyword').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
  document.getElementById('codeFilter').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
  document.getElementById('sourceFilter').addEventListener('change', () => search());
  document.getElementById('topicFilter').addEventListener('change', () => search());
  document.getElementById('difficulty').addEventListener('change', () => search());

  fetchQuestions(1);
</script>
</body>
</html>
