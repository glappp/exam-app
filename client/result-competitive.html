<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ผลสอบ — SchoolPL</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" defer></script>
  <script src="topicMap.js"></script>
  <style>
    /* ── ผลข้อสอบ ──────────────────────────────────────────── */
    .star-row { display: flex; gap: 6px; justify-content: center; margin: 12px 0 4px; }
    .star { font-size: 36px; color: #d1d5db; transition: color .2s; }
    .star.lit { color: #f59e0b; }
    .result-question-card {
      border-left: 5px solid var(--border);
      padding: 14px 16px;
      margin-bottom: 10px;
      border-radius: 0 8px 8px 0;
      background: #fff;
      border: 1px solid var(--border);
      border-left-width: 5px;
    }
    .result-question-card.correct { border-left-color: #16a34a; background: #f0fdf4; }
    .result-question-card.wrong   { border-left-color: #dc2626; background: #fff5f5; }
    .choice-line { font-size: 14px; padding: 4px 0; }
    .choice-line.is-answer { font-weight: 700; color: #15803d; }
    .choice-line.user-wrong { color: #dc2626; text-decoration: line-through; }

    /* ── จุดอ่อน ────────────────────────────────────────────── */
    .weak-section { display: flex; flex-direction: column; gap: 14px; }
    .weak-group { background: #f9fafb; border-radius: 10px; padding: 14px 16px; }
    .weak-group-title {
      font-size: 12px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px;
    }
    .weak-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .weak-tag {
      display: inline-flex; align-items: center; gap: 6px;
      background: #fff; border: 1px solid #e5e7eb;
      border-radius: 20px; padding: 4px 10px 4px 12px;
      font-size: 13px; font-weight: 500;
    }
    .weak-tag .count {
      background: #fef3c7; color: #92400e;
      border-radius: 99px; padding: 1px 7px;
      font-size: 12px; font-weight: 700;
    }
    .weak-tag a.fix-btn {
      background: #eff6ff; color: #1d4ed8;
      border-radius: 99px; padding: 2px 9px;
      font-size: 11px; font-weight: 600;
      text-decoration: none; white-space: nowrap;
    }
    .weak-tag a.fix-btn:hover { background: #dbeafe; }

    /* ── Print A4 Portrait ──────────────────────────────────── */
    @media print {
      @page { size: A4 portrait; margin: 18mm 18mm 20mm; }

      body { background: #fff !important; }
      .topbar, .no-print { display: none !important; }
      .page { padding: 0 !important; max-width: 100% !important; }
      .card { box-shadow: none !important; border: 1px solid #e5e7eb !important; break-inside: avoid; }

      /* หัวกระดาษ */
      #print-header { display: block !important; }

      /* ซ่อน detail ข้อสอบ — พิมพ์แค่สรุปกับจุดอ่อน */
      #detail-section { display: none !important; }

      /* ปรับสีให้ printer เห็น */
      .result-question-card.correct { background: #f0fdf4 !important; }
      .result-question-card.wrong   { background: #fff5f5 !important; }
      .weak-group { background: #f9fafb !important; }
      .weak-tag { background: #fff !important; border: 1px solid #d1d5db !important; }
      .weak-tag .count { background: #fef3c7 !important; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">📋 ผลสอบ</span>
  <div class="topbar-nav">
    <a href="exam.html">เลือกการสอบ</a>
    <a href="dashboard.html">หน้าหลัก</a>
  </div>
</div>

<!-- หัวกระดาษ (แสดงเฉพาะตอนพิมพ์) -->
<div id="print-header" style="display:none; margin-bottom:16px; padding-bottom:12px; border-bottom:2px solid #374151;">
  <div style="font-size:18px; font-weight:800; color:#111827;">SchoolPL — สรุปผลการสอบ</div>
  <div id="print-date" style="font-size:12px; color:#6b7280; margin-top:4px;"></div>
</div>

<div class="page" id="main-content">
  <p style="text-align:center;padding:40px;color:var(--muted)">กำลังโหลดผลสอบ...</p>
</div>

<script>
  const result = JSON.parse(localStorage.getItem('examResult') || 'null');
  const repairedTopics = new Set(JSON.parse(localStorage.getItem('repairedTopics') || '[]'));

  const LETTERS = ['a','b','c','d','e'];
  const LABELS  = ['ก','ข','ค','ง','จ'];

  function answerLabel(ans) {
    const i = LETTERS.indexOf(String(ans));
    return i >= 0 ? LABELS[i] : String(ans ?? '?');
  }

  function isAnswerCorrect(ans, q) {
    if (q.type === 'numeric' || q.answer == null) {
      if (!Array.isArray(q.shortAnswer)) return false;
      const clean = a => { const n = parseFloat(String(a).trim()); return isNaN(n) ? String(a).toLowerCase().trim() : n.toFixed(6); };
      return q.shortAnswer.some(sa => clean(sa) === clean(ans));
    }
    return String(ans) === q.answer;
  }

  // ── แปล key เป็นภาษาไทย ──────────────────────────────────────────────────
  const SKILL_MAP = {
    'logical-reasoning':    'การใช้เหตุผล',
    'multi-step':           'โจทย์หลายขั้นตอน',
    'visual-spatial':       'มิติและรูปทรง',
    'arithmetic':           'การคำนวณ',
    'estimation':           'การประมาณค่า',
    'pattern-recognition':  'การหารูปแบบ',
    'comparison':           'การเปรียบเทียบ',
    'unit-conversion':      'การแปลงหน่วย',
    'reading-graph':        'อ่านกราฟ/ตาราง',
    'word-problem':         'โจทย์ปัญหา',
    'number-sense':         'ความรู้สึกเชิงตัวเลข',
    'fraction-sense':       'ความรู้สึกเชิงเศษส่วน',
  };

  const TRAP_MAP = {
    'alternate-interior-angles': 'สลับมุมใน',
    'off-by-one':                'ผิดหนึ่งหน่วย',
    'misread-question':          'อ่านโจทย์ผิด',
    'wrong-formula':             'ใช้สูตรผิด',
    'unit-mismatch':             'หน่วยไม่ตรงกัน',
    'order-of-operations':       'ลำดับการดำเนินการ',
    'sign-error':                'ติดลบผิด',
    'fraction-invert':           'พลิกเศษส่วนผิด',
    'extra-step':                'เผลอคิดเพิ่ม',
  };

  function keyToThai(type, rawKey) {
    // rawKey อาจมี prefix เช่น "skill:logical-reasoning" หรือ "topic:geometry"
    const clean = rawKey.replace(/^[^:]+:/, '');
    if (type === 'topic') return getTopicLabel(rawKey);      // จาก topicMap.js
    if (type === 'skill') return SKILL_MAP[clean] || clean;
    if (type === 'trap')  return TRAP_MAP[clean]  || clean;
    return clean;
  }

  // ── ส่วนจุดอ่อน ──────────────────────────────────────────────────────────
  function weakSection(weakness) {
    const GROUPS = [
      { type: 'topic', title: '📚 หัวข้อวิชา',    icon: '📚' },
      { type: 'skill', title: '🧠 ทักษะที่ต้องฝึก', icon: '🧠' },
      { type: 'trap',  title: '⚠️ กับดักที่ต้องระวัง', icon: '⚠️' },
    ];

    const parts = GROUPS.map(({ type, title }) => {
      const items = weakness[type];
      const entries = Object.entries(items).sort((a, b) => b[1] - a[1])
        .filter(([k]) => !repairedTopics.has(k));
      if (!entries.length) return '';

      const tags = entries.map(([k, n]) => `
        <div class="weak-tag">
          <span>${keyToThai(type, k)}</span>
          <span class="count">${n} ข้อ</span>
          <a href="practice.html?mode=targeted&topic=${encodeURIComponent(k)}"
             class="fix-btn no-print">ฝึกซ่อม</a>
        </div>`).join('');

      return `
        <div class="weak-group">
          <div class="weak-group-title">${title}</div>
          <div class="weak-tags">${tags}</div>
        </div>`;
    }).join('');

    return `<div class="weak-section">${parts}</div>`;
  }

  function _renderBlock(block) {
    if (block.type === 'text') {
      return `<div class="qb-text">${(block.value || '').replace(/\n/g, '<br>')}</div>`;
    }
    if (block.type === 'image') {
      const src = /^https?:\/\//.test(block.url || '') || (block.url || '').startsWith('/') ? block.url : `/uploads/${block.url}`;
      return `<div class="qb-img"><img src="${src}" onclick="openLightbox && openLightbox(this)" style="max-width:min(100%,420px);max-height:300px;border-radius:8px;object-fit:contain;cursor:zoom-in"></div>`;
    }
    return '';
  }
  function renderQuestionBody(q) {
    if (q.content && Array.isArray(q.content)) {
      return q.content.map(block => {
        if (block.type === 'hint') {
          const inner = (block.content || []).map(_renderBlock).join('');
          return `<details class="qb-hint"><summary>${block.label || 'ความรู้เพิ่มเติม'}</summary><div class="qb-hint-body">${inner}</div></details>`;
        }
        return _renderBlock(block);
      }).join('');
    }
    const lang = typeof currentLang !== 'undefined' ? currentLang : 'th';
    const text = lang === 'th' ? (q.textTh || q.text || '') : (q.textEn || q.text || '');
    let html = `<div class="qb-text">${text.replace(/\n/g, '<br>')}</div>`;
    if (q.image) {
      const src = /^https?:\/\//.test(q.image) || q.image.startsWith('/') ? q.image : `/uploads/${q.image}`;
      html += `<div class="qb-img"><img src="${src}" onclick="openLightbox && openLightbox(this)" style="max-width:min(100%,420px);max-height:300px;border-radius:8px;object-fit:contain;cursor:zoom-in"></div>`;
    }
    return html;
  }

  // ── render หลัก ──────────────────────────────────────────────────────────
  function renderResult(result) {
    const qna = result.questions || [];
    const userAnswers = result.userAnswers || result.answers || [];
    const correctCount = result.correctCount ?? qna.filter((q, i) => isAnswerCorrect(userAnswers[i], q)).length;
    const total = result.total ?? qna.length;
    const pct = total > 0 ? Math.round(correctCount / total * 100) : 0;
    const scoreColor = pct >= 80 ? '#16a34a' : pct >= 60 ? '#d97706' : '#dc2626';

    // วิเคราะห์จุดอ่อน
    const weakness = { topic: {}, skill: {}, trap: {} };
    qna.forEach((q, i) => {
      if (isAnswerCorrect(userAnswers[i], q)) return;
      ['topic', 'skill', 'trap'].forEach(type => {
        (q.attributes?.[type] || []).forEach(attr => {
          weakness[type][attr] = (weakness[type][attr] || 0) + 1;
        });
      });
    });
    const hasWeakness = Object.values(weakness).some(m => Object.keys(m).length > 0);

    // รายละเอียดแต่ละข้อ
    const details = qna.map((q, i) => {
      const userAns = userAnswers[i];
      const correct = isAnswerCorrect(userAns, q);
      const choicesHTML = q.type === 'numeric'
        ? `<div style="margin-top:6px;font-size:14px">
             <div style="color:${correct ? '#15803d' : '#dc2626'};font-weight:700">
               ${correct ? '✔' : '✘'} คำตอบของคุณ: <strong>${userAns ?? '(ไม่ได้ตอบ)'}</strong>
             </div>
             ${!correct ? `<div style="color:#15803d;margin-top:4px">→ เฉลย: <strong>${(q.shortAnswer || [])[0] ?? '?'}</strong></div>` : ''}
           </div>`
        : (q.choices || []).map((c, idx) => {
            const letter = LETTERS[idx];
            let cls = 'choice-line';
            if (letter === q.answer) cls += ' is-answer';
            if (letter === userAns && !correct) cls += ' user-wrong';
            const mark = letter === userAns ? (correct ? '✔ ' : '✘ ') : (letter === q.answer && !correct ? '→ ' : '');
            return `<div class="${cls}">${mark}<strong>${LABELS[idx]}.</strong> ${c.textTh || ''}</div>`;
          }).join('');

      return `
        <div class="result-question-card ${correct ? 'correct' : 'wrong'}">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px">
            <strong>ข้อ ${i + 1}</strong>
            <span class="badge ${correct ? 'badge-success' : 'badge-error'}">${correct ? 'ถูก' : 'ผิด'}</span>
          </div>
          <div class="qb-wrap">${renderQuestionBody(q)}</div>
          ${choicesHTML}
        </div>`;
    }).join('');

    // ดาว mock
    let starsHTML = '';
    if (result.mode === 'mock' && result.avgPassScore != null) {
      const diff = correctCount - result.avgPassScore;
      const stars = diff >= 15 ? 5 : diff >= 8 ? 4 : diff >= 1 ? 3 : diff >= -7 ? 2 : 1;
      const starLabel = ['', 'ต้องฝึกเพิ่ม', 'พอผ่าน', 'ดี', 'ดีมาก', 'ยอดเยี่ยม!'][stars];
      starsHTML = `
        <div style="margin-bottom:8px">
          <div style="font-size:12px;color:var(--muted);margin-bottom:4px">ผลการประเมิน (เทียบคะแนนเฉลี่ยผู้ผ่าน ${result.avgPassScore} คะแนน)</div>
          <div class="star-row">${Array.from({length:5},(_,i) => `<span class="star ${i < stars ? 'lit' : ''}">★</span>`).join('')}</div>
          <div style="font-size:14px;font-weight:700;color:#f59e0b">${starLabel}</div>
        </div>`;
    }

    const backBtn = result.mode === 'mock'
      ? `<a href="mock-setup.html" class="btn btn-primary">กลับเลือก Mock</a>`
      : `<a href="exam.html" class="btn btn-primary">ทำอีกครั้ง</a>`;

    document.getElementById('main-content').innerHTML = `
      <!-- สรุปคะแนน -->
      <div class="card" style="text-align:center">
        ${result.mode === 'mock' && result.blueprintName ? `<div style="font-size:13px;color:var(--muted);margin-bottom:4px">${result.blueprintName}</div>` : ''}
        <div class="card-title">สรุปผลสอบ</div>
        <div style="font-size:60px;font-weight:800;color:${scoreColor};line-height:1;margin:16px 0 4px">${correctCount}/${total}</div>
        <div style="font-size:24px;font-weight:700;color:${scoreColor}">${pct}%</div>
        ${starsHTML}
        <div style="color:var(--muted);margin-top:8px;font-size:14px">
          ตอบถูก ${correctCount} ข้อ จาก ${total} ข้อ
          ${result.durationSec ? ` · เวลา ${Math.floor(result.durationSec/60)} นาที ${result.durationSec%60} วินาที` : ''}
        </div>
        <div class="no-print" style="display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap">
          ${backBtn}
          <a href="dashboard.html" class="btn btn-ghost">กลับหน้าหลัก</a>
          <button class="btn btn-ghost" onclick="printResult()">🖨 พิมพ์ผล</button>
        </div>
      </div>

      <!-- จุดอ่อน -->
      ${hasWeakness ? `
      <div class="card">
        <div class="card-title">📌 จุดที่ควรทบทวน</div>
        ${weakSection(weakness)}
      </div>` : ''}

      <!-- รายละเอียดข้อสอบ -->
      ${qna.length > 0 ? `
      <div class="card" id="detail-section">
        <div class="card-title">รายละเอียดข้อสอบ</div>
        ${details}
      </div>` : ''}
    `;

    if (window.MathJax) MathJax.typesetPromise();
  }

  function printResult() {
    // ตั้งวันที่บนหัวกระดาษ
    const now = new Date();
    const dateStr = now.toLocaleDateString('th-TH', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' });
    document.getElementById('print-date').textContent = 'วันที่พิมพ์: ' + dateStr;
    window.print();
  }

  if (!result) {
    document.getElementById('main-content').innerHTML =
      `<div class="card" style="text-align:center">
        <p class="msg msg-error">ไม่พบข้อมูลผลสอบ</p>
        <a href="exam.html" class="btn btn-primary" style="margin-top:12px">กลับหน้าเลือกสอบ</a>
      </div>`;
  } else {
    renderResult(result);
  }
</script>
<script src="/feedback-widget.js"></script>
</body>
</html>
