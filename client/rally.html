<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตะลุยโจทย์ — SchoolPL</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .rally-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .rally-score {
      display: flex; gap: 16px; align-items: center;
      font-size: 14px; color: var(--muted);
    }
    .score-correct { color: #16a34a; font-weight: 700; font-size: 20px; }
    .score-wrong   { color: #dc2626; font-weight: 700; font-size: 20px; }

    .weakness-bar {
      background: #fef9c3; border: 1px solid #fde047;
      border-radius: 10px; padding: 10px 14px; margin-bottom: 14px;
      font-size: 13px; color: #713f12;
    }
    .weakness-bar strong { color: #854d0e; }
    .weakness-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .weakness-tag {
      background: #fef08a; border: 1px solid #facc15;
      border-radius: 12px; padding: 2px 10px;
      font-size: 12px; color: #713f12;
    }
    .weakness-tag.heat-3 { background: #fca5a5; border-color: #f87171; color: #991b1b; }
    .weakness-tag.heat-2 { background: #fdba74; border-color: #fb923c; color: #9a3412; }

    .question-card {
      background: #fff; border-radius: 12px;
      border: 1px solid var(--border); padding: 20px;
      margin-bottom: 14px;
    }
    .question-no {
      font-size: 12px; color: var(--muted); margin-bottom: 10px;
    }

    .choice-btn {
      display: block; width: 100%; text-align: left;
      background: #fff; border: 1.5px solid var(--border);
      border-radius: 8px; padding: 10px 14px; margin-bottom: 8px;
      cursor: pointer; font-size: 14px; font-family: inherit;
      transition: border-color .15s, background .15s;
    }
    .choice-btn:hover:not(:disabled) { border-color: var(--blue); background: #eff6ff; }
    .choice-btn.correct  { background: #dcfce7; border-color: #16a34a; color: #15803d; }
    .choice-btn.wrong    { background: #fee2e2; border-color: #dc2626; color: #b91c1c; }
    .choice-btn:disabled { cursor: default; }

    .feedback-box {
      border-radius: 10px; padding: 14px 18px; margin-bottom: 14px;
      font-size: 14px; display: none;
    }
    .feedback-box.correct { background: #dcfce7; border: 1px solid #86efac; color: #15803d; }
    .feedback-box.wrong   { background: #fee2e2; border: 1px solid #fca5a5; color: #b91c1c; }
    .feedback-box .fb-title { font-weight: 700; font-size: 16px; margin-bottom: 6px; }
    .feedback-box .fb-answer { margin-top: 6px; font-size: 13px; }

    .next-btn {
      background: var(--blue); color: #fff; border: none;
      border-radius: 8px; padding: 12px 28px; font-size: 15px;
      font-weight: 600; cursor: pointer; font-family: inherit;
      transition: background .15s;
    }
    .next-btn:hover { background: #1d4ed8; }

    .stop-btn {
      background: #f3f4f6; color: #374151; border: none;
      border-radius: 8px; padding: 10px 20px; font-size: 14px;
      font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .stop-btn:hover { background: #e5e7eb; }

    .loading-overlay {
      text-align: center; padding: 48px 20px;
      color: var(--muted); font-size: 15px;
    }

    .summary-card {
      background: #fff; border-radius: 12px;
      border: 1px solid var(--border); padding: 28px; text-align: center;
    }
    .summary-card h2 { margin: 0 0 8px; font-size: 22px; }
    .summary-stat { font-size: 40px; font-weight: 700; color: var(--blue); margin: 12px 0; }
    .summary-sub { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="topbar-title">⚡ ตะลุยโจทย์</span>
    <div class="topbar-nav">
      <span class="topbar-user" id="greeting"></span>
      <a href="dashboard.html">← แดชบอร์ด</a>
      <a href="#" onclick="logout()">ออกจากระบบ</a>
    </div>
  </div>

  <div class="page">
    <!-- หัว: คะแนน + ปุ่มหยุด -->
    <div class="rally-header" id="rally-header" style="display:none">
      <div class="rally-score">
        <span>ถูก <span class="score-correct" id="cnt-correct">0</span></span>
        <span>ผิด <span class="score-wrong" id="cnt-wrong">0</span></span>
        <span style="font-size:13px">รวม <strong id="cnt-total">0</strong> ข้อ</span>
      </div>
      <button class="stop-btn" onclick="stopRally()">หยุด</button>
    </div>

    <!-- จุดอ่อนปัจจุบัน -->
    <div class="weakness-bar" id="weakness-bar" style="display:none">
      <strong>📌 หัวข้อที่ต้องระวัง</strong>
      <div class="weakness-tags" id="weakness-tags"></div>
    </div>

    <!-- loading -->
    <div class="loading-overlay" id="loading">กำลังโหลดโจทย์...</div>

    <!-- โจทย์ -->
    <div id="question-area" style="display:none">
      <div class="question-card">
        <div class="question-no" id="question-no"></div>
        <div id="question-body"></div>
        <div id="choices-area" style="margin-top:14px"></div>
      </div>

      <!-- feedback หลังตอบ -->
      <div class="feedback-box" id="feedback-box">
        <div class="fb-title" id="fb-title"></div>
        <div class="fb-answer" id="fb-answer"></div>
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="next-btn" id="next-btn" onclick="nextQuestion()" style="display:none">ข้อถัดไป →</button>
        <button class="stop-btn" id="stop-btn2" onclick="stopRally()" style="display:none">หยุดพัก</button>
      </div>
    </div>

    <!-- สรุปเมื่อหยุด -->
    <div id="summary-area" style="display:none"></div>
  </div>

  <script src="script.js"></script>
  <script>
    let cntCorrect = 0, cntWrong = 0;
    let currentQ = null;
    let seenIds = [];   // ids ที่เห็นแล้วใน session นี้ (กัน repeat ระยะสั้น)
    const MAX_EXCLUDE = 20;

    (async () => {
      const res = await fetch('/api/me', { credentials: 'include' });
      if (!res.ok) { location.href = 'login.html'; return; }
      const me = await res.json();
      document.getElementById('greeting').textContent = `สวัสดี, ${me.firstName || me.username}`;
      loadNext();
    })();

    async function loadNext() {
      document.getElementById('loading').style.display = '';
      document.getElementById('question-area').style.display = 'none';
      document.getElementById('feedback-box').style.display = 'none';

      const excludeParam = seenIds.slice(-MAX_EXCLUDE).join(',');
      const url = '/api/adaptive/next' + (excludeParam ? `?exclude=${excludeParam}` : '');

      try {
        const res = await fetch(url, { credentials: 'include' });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          if (err.code === 'INSUFFICIENT_PASSES') {
            showInsufficientPasses(err.passCount || 0, err.required || 5);
          } else {
            showError(err.error || 'โหลดโจทย์ไม่สำเร็จ');
          }
          return;
        }
        const data = await res.json();
        currentQ = data.question;
        seenIds.push(currentQ.id);

        renderWeaknesses(data.weaknesses || []);
        renderQuestion(currentQ);

        document.getElementById('rally-header').style.display = 'flex';
        document.getElementById('loading').style.display = 'none';
        document.getElementById('question-area').style.display = '';
        updateCounters();
      } catch (e) {
        showError('เชื่อมต่อเซิร์ฟเวอร์ไม่สำเร็จ');
      }
    }

    function renderQuestion(q) {
      const total = cntCorrect + cntWrong + 1;
      document.getElementById('question-no').textContent = `ข้อที่ ${total}`;
      document.getElementById('question-body').innerHTML = renderQuestionBody(q);

      const area = document.getElementById('choices-area');
      if (q.type === 'numeric') {
        area.innerHTML = `
          <input id="numeric-ans" type="text" placeholder="กรอกคำตอบ" class="form-control"
            style="max-width:200px;margin-bottom:10px" />
          <button class="next-btn" onclick="submitAnswer()">ยืนยัน</button>`;
        setTimeout(() => document.getElementById('numeric-ans')?.focus(), 100);
      } else {
        const LABELS = ['ก', 'ข', 'ค', 'ง'];
        area.innerHTML = (q.choices || []).map((c, i) => {
          const text = c.textTh || c.text || '';
          return `<button class="choice-btn" id="choice-${i}" onclick="submitAnswer(${i})">
            <strong>${LABELS[i] || String.fromCharCode(65+i)}.</strong> ${text}
          </button>`;
        }).join('');
      }

      document.getElementById('feedback-box').style.display = 'none';
      document.getElementById('next-btn').style.display = 'none';
      document.getElementById('stop-btn2').style.display = 'none';
    }

    function submitAnswer(choiceIndex) {
      if (!currentQ) return;
      const ANSWER_LETTERS = ['a', 'b', 'c', 'd'];
      let userAns, isCorrect;

      if (currentQ.type === 'numeric') {
        userAns = document.getElementById('numeric-ans')?.value?.trim() || '';
        const accepted = currentQ.shortAnswer || [];
        isCorrect = accepted.length === 0 || accepted.some(a => normalizeNum(a) === normalizeNum(userAns));
      } else {
        userAns = ANSWER_LETTERS[choiceIndex] ?? '';
        isCorrect = userAns === currentQ.answer;

        // ระบายสีปุ่ม
        document.querySelectorAll('.choice-btn').forEach((btn, i) => {
          btn.disabled = true;
          if (ANSWER_LETTERS[i] === currentQ.answer) btn.classList.add('correct');
          if (i === choiceIndex && !isCorrect) btn.classList.add('wrong');
        });
      }

      if (isCorrect) cntCorrect++; else cntWrong++;
      updateCounters();

      // แสดง feedback
      const fb = document.getElementById('feedback-box');
      fb.className = 'feedback-box ' + (isCorrect ? 'correct' : 'wrong');
      document.getElementById('fb-title').textContent = isCorrect ? '✅ ถูกต้อง!' : '❌ ผิด';
      if (!isCorrect && currentQ.type !== 'numeric') {
        const LABELS = ['ก', 'ข', 'ค', 'ง'];
        const corrIdx = ANSWER_LETTERS.indexOf(currentQ.answer);
        const corrText = currentQ.choices?.[corrIdx]?.textTh || currentQ.choices?.[corrIdx]?.text || '';
        document.getElementById('fb-answer').textContent =
          `คำตอบที่ถูก: ${LABELS[corrIdx] || currentQ.answer}. ${corrText}`;
      } else if (!isCorrect && currentQ.type === 'numeric') {
        document.getElementById('fb-answer').textContent =
          `คำตอบที่ถูก: ${(currentQ.shortAnswer || []).join(' หรือ ')}`;
      } else {
        document.getElementById('fb-answer').textContent = '';
      }
      fb.style.display = '';

      document.getElementById('next-btn').style.display = '';
      document.getElementById('stop-btn2').style.display = '';

      // ส่ง weakness update ไปยัง server
      const attrs = currentQ.attributes || {};
      fetch('/api/adaptive/submit', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          questionId: currentQ.id,
          isCorrect,
          selectedAnswer: userAns,
          tags: {
            topic:    attrs.topic    || [],
            subtopic: attrs.subtopic || [],
            skill:    attrs.skill    || [],
            trap:     attrs.trap     || []
          }
        })
      }).then(r => r.json()).then(data => {
        if (data.weaknesses) renderWeaknesses(data.weaknesses);
      }).catch(() => {});
    }

    function nextQuestion() { loadNext(); }

    function updateCounters() {
      document.getElementById('cnt-correct').textContent = cntCorrect;
      document.getElementById('cnt-wrong').textContent   = cntWrong;
      document.getElementById('cnt-total').textContent   = cntCorrect + cntWrong;
    }

    function renderWeaknesses(list) {
      const bar  = document.getElementById('weakness-bar');
      const tags = document.getElementById('weakness-tags');
      if (!list || list.length === 0) { bar.style.display = 'none'; return; }
      bar.style.display = '';
      tags.innerHTML = list.map(w => {
        const heat = w.failCount >= 5 ? 'heat-3' : w.failCount >= 3 ? 'heat-2' : '';
        return `<span class="weakness-tag ${heat}">${w.tagKey.replace(/^(topic|subtopic|skill|trap):/, '')} (×${w.failCount})</span>`;
      }).join('');
    }

    function stopRally() {
      document.getElementById('rally-header').style.display = 'none';
      document.getElementById('weakness-bar').style.display = 'none';
      document.getElementById('question-area').style.display = 'none';
      document.getElementById('loading').style.display = 'none';

      const pct = cntCorrect + cntWrong > 0
        ? Math.round(cntCorrect / (cntCorrect + cntWrong) * 100) : 0;

      document.getElementById('summary-area').style.display = '';
      document.getElementById('summary-area').innerHTML = `
        <div class="summary-card">
          <h2>สรุปผลการตะลุยโจทย์</h2>
          <div class="summary-stat">${cntCorrect}/${cntCorrect + cntWrong}</div>
          <div class="summary-sub">ถูก ${cntCorrect} ข้อ จากทั้งหมด ${cntCorrect + cntWrong} ข้อ (${pct}%)</div>
          <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
            <button class="next-btn" onclick="restartRally()">ตะลุยต่อ ⚡</button>
            <button class="stop-btn" onclick="location.href='dashboard.html'">กลับแดชบอร์ด</button>
          </div>
        </div>`;
    }

    function restartRally() {
      cntCorrect = 0; cntWrong = 0; seenIds = [];
      document.getElementById('summary-area').style.display = 'none';
      loadNext();
    }

    function showInsufficientPasses(passCount, required) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('summary-area').style.display = '';
      const pct = Math.min(100, Math.round(passCount / required * 100));
      document.getElementById('summary-area').innerHTML = `
        <div class="summary-card">
          <div style="font-size:48px;margin-bottom:12px">🔒</div>
          <h2>โหมดนี้ยังล็อคอยู่</h2>
          <p style="color:var(--muted);font-size:14px;margin:0 0 16px;line-height:1.6">
            ต้องผ่านอย่างน้อย <strong>${required} subtopic</strong> จึงจะใช้โหมดตะลุยโจทย์ได้<br>
            ตอนนี้คุณผ่านแล้ว <strong>${passCount} subtopic</strong>
          </p>
          <div style="background:#f3f4f6;border-radius:999px;height:12px;margin:0 auto 20px;max-width:260px;overflow:hidden">
            <div style="background:var(--blue);height:100%;width:${pct}%;border-radius:999px;transition:width .4s"></div>
          </div>
          <div style="color:var(--muted);font-size:13px;margin-bottom:20px">
            ${passCount}/${required} subtopic
          </div>
          <button class="next-btn" onclick="location.href='practice.html'">ไปฝึกหัดเพิ่ม →</button>
        </div>`;
    }

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('summary-area').style.display = '';
      document.getElementById('summary-area').innerHTML = `
        <div class="summary-card">
          <div style="font-size:48px;margin-bottom:12px">⚠️</div>
          <p style="color:#dc2626">${msg}</p>
          <button class="stop-btn" onclick="loadNext()">ลองใหม่</button>
        </div>`;
    }

    function normalizeNum(v) {
      const s = String(v).trim().replace(/\s/g, '');
      const n = parseFloat(s);
      return isNaN(n) ? s.toLowerCase() : n.toFixed(6);
    }
  </script>
  <script src="/feedback-widget.js"></script>
</body>
</html>
