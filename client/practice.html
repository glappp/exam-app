<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ฝึกหัด — คลังข้อสอบ</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .result-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
    .result-row:last-child { border-bottom: none; }
    .result-correct { color: #16a34a; font-weight: 700; font-size: 18px; }
    .result-wrong   { color: #dc2626; font-weight: 700; font-size: 18px; }
    #question-area { margin-top: 0; }

    /* overview */
    .overview-header {
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
    }
    .overview-toggle {
      font-size: 12px; color: var(--muted); padding: 2px 8px;
      border: 1px solid var(--border); border-radius: 6px;
      background: #f9fafb; transition: background .15s;
    }
    .overview-header:hover .overview-toggle { background: #f0f0f0; }
    .overview-body-wrap { margin-top: 12px; }

    .grade-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px; flex-wrap: nowrap; overflow-x: auto;
      padding-bottom: 4px;
    }
    .grade-row::-webkit-scrollbar { height: 3px; }
    .grade-row::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 9px; }
    .grade-label {
      font-size: 12px; font-weight: 700; color: var(--muted);
      white-space: nowrap; min-width: 60px;
    }
    .topic-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 20px; font-size: 12px;
      border: 1.5px solid var(--border); background: #fff;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: border-color .15s, background .15s;
    }
    .topic-chip:hover { border-color: var(--blue); background: #eff6ff; }
    .topic-chip.passed  { border-color: #16a34a; background: #f0fdf4; color: #15803d; }
    .topic-chip.started { border-color: #f59e0b; background: #fffbeb; color: #92400e; }
    .topic-chip .chip-bar {
      width: 32px; height: 3px; background: #e5e7eb;
      border-radius: 9px; overflow: hidden;
    }
    .topic-chip .chip-bar-fill { height: 100%; border-radius: 9px; background: #3b82f6; }
    .topic-chip.passed  .chip-bar-fill { background: #16a34a; }
    .topic-chip.started .chip-bar-fill { background: #f59e0b; }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="topbar-title" id="topbar-title">📗 โหมดฝึกหัด</span>
    <div class="topbar-nav">
      <span class="topbar-user" id="greeting"></span>
      <a href="dashboard.html">หน้าหลัก</a>
      <a href="#" onclick="logout()">ออกจากระบบ</a>
    </div>
  </div>

  <div class="page">
    <!-- topic overview (แสดงเฉพาะ mode ปกติ) -->
    <div id="overview-panel" class="card" style="display:none">
      <div class="overview-header" onclick="toggleOverview()">
        <span class="card-title" style="margin:0">ภาพรวมหัวข้อ</span>
        <span class="overview-toggle" id="overview-toggle-btn">ซ่อน ▲</span>
      </div>
      <div id="overview-body" class="overview-body-wrap">
        <p style="color:var(--muted);font-size:13px">กำลังโหลด...</p>
      </div>
    </div>

    <!-- adaptive banner -->
    <div id="adaptive-banner" style="display:none;background:#dbeafe;border:1px solid #93c5fd;border-radius:10px;padding:14px 18px;margin-bottom:16px">
      <div style="font-weight:700;color:#1e40af;font-size:14px">🎯 โหมดปรับจุดอ่อน</div>
      <div id="adaptive-desc" style="font-size:13px;color:#1e3a8a;margin-top:4px">กำลังวิเคราะห์จุดอ่อน...</div>
    </div>

    <!-- targeted banner -->
    <div id="targeted-banner" style="display:none;background:#fef9c3;border:1px solid #fde047;border-radius:10px;padding:14px 18px;margin-bottom:16px">
      <div style="font-weight:700;color:#854d0e;font-size:14px">🔧 ซ่อมจุดอ่อน</div>
      <div style="font-size:13px;color:#713f12;margin-top:4px">หัวข้อ: <strong id="targeted-tag-label"></strong> — ตอบถูกให้ครบ 10 ข้อ</div>
    </div>

    <!-- เลือกหัวข้อ + เริ่ม -->
    <div class="card" id="setup-panel">
      <div class="card-title" id="setup-title">เลือกหัวข้อที่ต้องการฝึก</div>

      <div class="form-row" style="margin-bottom:14px" id="chapter-group">
        <div class="form-group">
          <label>ระดับชั้น</label>
          <select id="grade" onchange="onGradeChange(this.value)">
            <option value="">-- เลือกชั้น --</option>
            <option value="p4">ป.4</option>
            <option value="p5">ป.5</option>
            <option value="p6">ป.6</option>
          </select>
        </div>
        <div class="form-group">
          <label>หัวข้อ</label>
          <select id="chapter" disabled>
            <option value="">-- เลือกชั้นก่อน --</option>
          </select>
        </div>
      </div>

      <button class="btn btn-primary" id="start-btn" onclick="startExam()">เริ่มทำข้อสอบ</button>
    </div>

    <!-- โจทย์ -->
    <div id="question-area"></div>

    <!-- ผลลัพธ์ + วิเคราะห์ -->
    <div id="results"></div>
    <div id="analysis"></div>
  </div>

  <script src="topicMap.js"></script>
  <script src="script.js"></script>
  <script>
    (async () => {
      const res = await fetch('/api/me', { credentials: 'include' });
      if (!res.ok) { location.href = 'login.html'; return; }
      const me = await res.json();
      document.getElementById('greeting').textContent = `สวัสดี, ${me.firstName || me.username}`;

      // แสดง overview เฉพาะ mode ปกติ (ไม่ใช่ adaptive/targeted)
      const params = new URLSearchParams(location.search);
      if (!params.get('mode') && !params.get('topic')) {
        loadOverview();
      }
    })();

    async function loadOverview() {
      const panel = document.getElementById('overview-panel');
      panel.style.display = '';
      try {
        const res = await fetch('/api/student/topic-stats', { credentials: 'include' });
        const { stats } = await res.json();
        renderOverview(stats || {});
      } catch {
        document.getElementById('overview-body').innerHTML =
          '<p style="color:var(--muted);font-size:13px">โหลดข้อมูลไม่สำเร็จ</p>';
      }
    }

    function renderOverview(stats) {
      const grades = ['p4', 'p5', 'p6'];
      const gradeNames = { p4: 'ป.4', p5: 'ป.5', p6: 'ป.6' };
      let html = '';

      for (const grade of grades) {
        const topics = gradeTopics[grade] || [];
        if (!topics.length) continue;
        const gradeStats = stats[grade] || {};
        const passed = topics.filter(t => gradeStats[t.key]?.passed).length;

        html += `<div class="grade-row">
          <span class="grade-label">${gradeNames[grade]}<br>
            <span style="font-weight:400;font-size:11px">${passed}/${topics.length}</span>
          </span>`;

        for (const t of topics) {
          const s = gradeStats[t.key];
          const acc = s ? Math.round(s.accuracy * 100) : 0;
          const stateClass = !s ? '' : s.passed ? 'passed' : 'started';
          const icon = !s ? '⬜' : s.passed ? '✅' : '🔶';
          const tip = !s ? 'ยังไม่เริ่ม' : s.passed ? `ผ่าน ${acc}%` : `${acc}% (${s.attempted} ข้อ)`;

          html += `<span class="topic-chip ${stateClass}" onclick="quickStart('${grade}','${t.key}')"
              title="${tip}">
            ${icon} ${t.label}
            <span class="chip-bar"><span class="chip-bar-fill" style="width:${acc}%"></span></span>
          </span>`;
        }
        html += '</div>';
      }

      document.getElementById('overview-body').innerHTML = html ||
        '<p style="color:var(--muted);font-size:13px">ยังไม่มีข้อมูล</p>';
    }

    function toggleOverview() {
      const body = document.getElementById('overview-body');
      const btn  = document.getElementById('overview-toggle-btn');
      const hidden = body.style.display === 'none';
      body.style.display = hidden ? '' : 'none';
      btn.textContent = hidden ? 'ซ่อน ▲' : 'แสดง ▼';
    }

    // คลิก chip → เซต grade/topic แล้ว scroll ลงไปที่ setup panel
    function quickStart(grade, topicKey) {
      const gradeEl = document.getElementById('grade');
      gradeEl.value = grade;
      onGradeChange(grade);
      document.getElementById('chapter').value = topicKey;
      document.getElementById('setup-panel').scrollIntoView({ behavior: 'smooth' });
    }
  </script>
</body>
</html>
