<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — คลังข้อสอบ</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .stat-strip { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 24px; }
    .stat-box { background:#fff; border-radius:10px; padding:18px; text-align:center; box-shadow:var(--shadow); }
    .stat-num  { font-size:28px; font-weight:800; color:var(--navy); }
    .stat-lbl  { font-size:12px; color:var(--muted); margin-top:3px; }

    .tabs { display:flex; gap:4px; margin-bottom:16px; }
    .tab-btn {
      padding:8px 18px; border:1.5px solid var(--border); border-radius:7px;
      background:#fff; font-size:13px; font-weight:600; cursor:pointer; color:var(--muted);
    }
    .tab-btn.active { background:var(--navy); color:#fff; border-color:var(--navy); }

    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    .role-sel {
      padding:4px 8px; border:1px solid var(--border); border-radius:5px;
      font-size:12px; cursor:pointer; background:#fff;
    }
    .role-sel:focus { outline:none; border-color:var(--blue); }

    .pct-bar { height:6px; background:#f0f0f0; border-radius:3px; overflow:hidden; display:inline-block; width:60px; vertical-align:middle; }
    .pct-fill { height:100%; border-radius:3px; background:var(--blue); }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="topbar-title">Admin Panel</span>
    <div class="topbar-nav">
      <a href="dashboard.html">หน้าหลัก</a>
      <a href="list-questions.html">โจทย์</a>
      <a href="attribute-dict.html">Dict</a>
      <a href="#" onclick="logout()">ออกจากระบบ</a>
    </div>
  </div>

  <div class="page-wide">
    <div class="stat-strip" id="stat-strip">
      <div class="stat-box"><div class="stat-num" id="s-users">—</div><div class="stat-lbl">ผู้ใช้ทั้งหมด</div></div>
      <div class="stat-box"><div class="stat-num" id="s-questions">—</div><div class="stat-lbl">โจทย์ทั้งหมด</div></div>
      <div class="stat-box"><div class="stat-num" id="s-results">—</div><div class="stat-lbl">ครั้งที่สอบ</div></div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('users')">ผู้ใช้</button>
      <button class="tab-btn" onclick="switchTab('results')">ผลการสอบ</button>
      <button class="tab-btn" onclick="switchTab('announce')">ประกาศ</button>
    </div>

    <!-- Users tab -->
    <div class="tab-panel active card" id="tab-users">
      <div id="users-content"><div style="color:var(--muted);font-size:13px">กำลังโหลด...</div></div>
    </div>

    <!-- Results tab -->
    <div class="tab-panel card" id="tab-results">
      <div id="results-content"><div style="color:var(--muted);font-size:13px">กำลังโหลด...</div></div>
    </div>

    <!-- Announce tab -->
    <div class="tab-panel card" id="tab-announce">
      <div style="max-width:520px">
        <div class="card-title">สร้างประกาศใหม่</div>
        <div class="form-group" style="margin-bottom:10px">
          <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">หัวข้อ</label>
          <input type="text" id="ann-form-title" class="input" placeholder="หัวข้อประกาศ" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit">
        </div>
        <div class="form-group" style="margin-bottom:10px">
          <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">เนื้อหา</label>
          <textarea id="ann-form-body" rows="3" placeholder="เนื้อหาประกาศ..." style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit;resize:vertical"></textarea>
        </div>
        <div style="display:flex;gap:10px;margin-bottom:14px">
          <div style="flex:1">
            <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">ส่งถึง</label>
            <select id="ann-form-role" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit">
              <option value="">ทุกคน</option>
              <option value="student">นักเรียนเท่านั้น</option>
              <option value="teacher">ครูเท่านั้น</option>
            </select>
          </div>
          <div style="flex:1">
            <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">หมดอายุ (ไม่บังคับ)</label>
            <input type="date" id="ann-form-expires" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit">
          </div>
        </div>
        <button class="btn btn-primary" onclick="createAnn()">ส่งประกาศ</button>
        <div id="ann-form-msg" style="margin-top:8px;font-size:13px"></div>
      </div>
      <hr style="margin:20px 0;border:none;border-top:1px solid #f0f0f0">
      <div class="card-title">ประกาศที่ใช้งานอยู่</div>
      <div id="ann-list"><div style="color:var(--muted);font-size:13px">กำลังโหลด...</div></div>
    </div>
  </div>

  <script>
    const TABS = ['users','results','announce'];
    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', TABS[i] === name));
      document.querySelectorAll('.tab-panel').forEach((p,i) => p.classList.toggle('active', `tab-${TABS[i]}` === `tab-${name}`));
      if (name === 'announce') loadAnnList();
    }

    async function createAnn() {
      const title = document.getElementById('ann-form-title').value.trim();
      const body = document.getElementById('ann-form-body').value.trim();
      const targetRole = document.getElementById('ann-form-role').value;
      const expiresAt = document.getElementById('ann-form-expires').value;
      const msg = document.getElementById('ann-form-msg');
      if (!title || !body) { msg.style.color='#dc2626'; msg.textContent='กรุณากรอกหัวข้อและเนื้อหา'; return; }
      const r = await fetch('/api/announcements', {
        method:'POST', credentials:'include',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ title, body, targetRole: targetRole || null, expiresAt: expiresAt || null })
      });
      const d = await r.json();
      if (d.success) {
        msg.style.color='#16a34a'; msg.textContent='✅ ส่งประกาศสำเร็จ';
        document.getElementById('ann-form-title').value = '';
        document.getElementById('ann-form-body').value = '';
        loadAnnList();
        setTimeout(() => msg.textContent = '', 3000);
      } else {
        msg.style.color='#dc2626'; msg.textContent=`❌ ${d.error}`;
      }
    }

    async function loadAnnList() {
      const el = document.getElementById('ann-list');
      // admin ดูผ่าน direct DB query ยังไม่มี endpoint แสดงทั้งหมด ใช้ /api/announcements ชั่วคราว
      const r = await fetch('/api/announcements', { credentials:'include' });
      if (!r.ok) { el.innerHTML = '<p style="color:#aaa;font-size:13px">โหลดไม่ได้</p>'; return; }
      const { announcements } = await r.json();
      if (!announcements.length) { el.innerHTML = '<p style="color:#aaa;font-size:13px">ไม่มีประกาศที่ยังไม่ได้อ่าน</p>'; return; }
      el.innerHTML = announcements.map(a => `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f0f0f0">
          <div>
            <div style="font-weight:600;font-size:13px">${a.title}</div>
            <div style="font-size:12px;color:#666;margin-top:2px">${a.body.substring(0,80)}${a.body.length>80?'...':''}</div>
            <div style="font-size:11px;color:#aaa;margin-top:3px">${new Date(a.createdAt).toLocaleDateString('th-TH')}</div>
          </div>
          <button onclick="deleteAnn(${a.id},this)" style="padding:4px 12px;background:#fee2e2;color:#dc2626;border:none;border-radius:5px;font-size:12px;cursor:pointer">ลบ</button>
        </div>`).join('');
    }

    async function deleteAnn(id, btn) {
      btn.disabled = true;
      await fetch(`/api/announcements/${id}`, { method:'DELETE', credentials:'include' });
      loadAnnList();
    }

    async function loadStats() {
      const r = await fetch('/api/admin/stats', { credentials:'include' });
      if (!r.ok) { location.href = 'dashboard.html'; return; }
      const d = await r.json();
      document.getElementById('s-users').textContent     = d.userCount;
      document.getElementById('s-questions').textContent = d.questionCount;
      document.getElementById('s-results').textContent   = d.resultCount;
    }

    async function loadUsers() {
      const r = await fetch('/api/admin/users', { credentials:'include' });
      const d = await r.json();
      const el = document.getElementById('users-content');
      if (!d.users?.length) { el.innerHTML = '<p style="color:var(--muted);font-size:13px">ไม่มีผู้ใช้</p>'; return; }

      const rows = d.users.map(u => {
        const p = u.studentProfiles?.[0];
        const examCount = p?._count?.examResults ?? '—';
        const roleColors = { admin:'badge-error', teacher:'badge-info', student:'badge-success' };
        return `<tr>
          <td>${u.id}</td>
          <td><strong>${u.firstName} ${u.lastName}</strong><br><span class="text-small text-muted">@${u.username}</span></td>
          <td>${u.email}</td>
          <td><span class="badge ${roleColors[u.role] || 'badge-warn'}">${u.role}</span></td>
          <td>${p ? `${p.grade} • ${p.school}` : '—'}</td>
          <td>${examCount}</td>
          <td>
            <select class="role-sel" onchange="changeRole(${u.id}, this.value)">
              ${['student','teacher','admin'].map(r => `<option value="${r}" ${r===u.role?'selected':''}>${r}</option>`).join('')}
            </select>
          </td>
        </tr>`;
      }).join('');

      el.innerHTML = `<div style="overflow-x:auto">
        <table class="table">
          <thead><tr>
            <th>ID</th><th>ชื่อ</th><th>Email</th><th>Role</th><th>โปรไฟล์</th><th>ครั้งที่สอบ</th><th>เปลี่ยน Role</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }

    async function loadResults() {
      const r = await fetch('/api/admin/results', { credentials:'include' });
      const d = await r.json();
      const el = document.getElementById('results-content');
      if (!d.results?.length) { el.innerHTML = '<p style="color:var(--muted);font-size:13px">ยังไม่มีผลสอบ</p>'; return; }

      const modeClass = { practice:'badge-success', competitive:'badge-warn', adaptive:'badge-info', official:'badge-error' };
      const rows = d.results.map(r => {
        const u = r.studentProfile?.user;
        const pct = r.total ? Math.round(r.score / r.total * 100) : 0;
        const date = new Date(r.createdAt).toLocaleDateString('th-TH', { day:'2-digit', month:'short', year:'2-digit', hour:'2-digit', minute:'2-digit' });
        return `<tr>
          <td>${date}</td>
          <td>${u ? `${u.firstName} ${u.lastName}` : '—'}</td>
          <td>${r.studentProfile?.grade || '—'}</td>
          <td><span class="badge ${modeClass[r.mode] || 'badge-warn'}">${r.mode}</span></td>
          <td>${r.score}/${r.total}</td>
          <td>
            <div class="pct-bar"><div class="pct-fill" style="width:${pct}%"></div></div>
            <span style="font-size:12px;margin-left:6px">${pct}%</span>
          </td>
        </tr>`;
      }).join('');

      el.innerHTML = `<div style="overflow-x:auto">
        <table class="table">
          <thead><tr>
            <th>วันที่</th><th>นักเรียน</th><th>ชั้น</th><th>โหมด</th><th>คะแนน</th><th>%</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }

    async function changeRole(userId, newRole) {
      const r = await fetch(`/api/admin/users/${userId}/role`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ role: newRole })
      });
      if (!r.ok) alert('เปลี่ยน role ไม่สำเร็จ');
    }

    function logout() {
      fetch('/api/logout', { method:'POST', credentials:'include' });
      location.href = 'login.html';
    }

    async function init() {
      const me = await fetch('/api/me', { credentials:'include' });
      if (!me.ok) { location.href = 'login.html'; return; }
      const data = await me.json();
      if (data.role !== 'admin') { alert('คุณไม่มีสิทธิ์เข้าหน้านี้'); location.href = 'dashboard.html'; return; }

      await Promise.all([loadStats(), loadUsers(), loadResults()]);
    }

    init();
  </script>
</body>
</html>
