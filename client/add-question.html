<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>เพิ่มโจทย์ใหม่</title>
</head>
<body>
  <h2>เพิ่มโจทย์ใหม่</h2>

  <form id="add-question-form" enctype="multipart/form-data">
    <label>โจทย์ (text):</label><br>
    <textarea name="questionText" rows="3" cols="50"></textarea><br><br>

    <label>ภาพโจทย์ (ถ้ามี):</label><br>
    <input type="file" name="questionImage"><br><br>

    <label>ตัวเลือก:</label><br>
    <p><strong>ระบุว่าข้อใดคือคำตอบที่ถูกต้อง ✔️ (ติ๊กที่ปุ่มกลมด้านขวาของตัวเลือก):</strong></p>

    <div id="choices">
      <div>
        <input type="text" name="choice0" placeholder="ตัวเลือกที่ 1">
        <input type="radio" name="correct" value="0"> 
        <input type="file" name="choiceImage0">
      </div>
      <div>
        <input type="text" name="choice1" placeholder="ตัวเลือกที่ 2">
        <input type="radio" name="correct" value="1">
        <input type="file" name="choiceImage1">
      </div>
      <div>
        <input type="text" name="choice2" placeholder="ตัวเลือกที่ 3">
        <input type="radio" name="correct" value="2">
        <input type="file" name="choiceImage2">
      </div>
      <div>
        <input type="text" name="choice3" placeholder="ตัวเลือกที่ 4">
        <input type="radio" name="correct" value="3">
        <input type="file" name="choiceImage3">
      </div>
    </div>

    <br>
    <label>ระดับความยาก:</label>
    <select name="difficulty">
      <option value="easy">ง่าย</option>
      <option value="medium">ปานกลาง</option>
      <option value="hard">ยาก</option>
    </select><br><br>

    <label>Tags (อัตโนมัติ):</label>
    <input type="text" name="tags" disabled placeholder="ระบบจะใส่ให้ภายหลัง"><br><br>

    <button type="submit">เพิ่มโจทย์</button>
    <button type="button" onclick="previewQuestion()">🔎 Preview</button>
  </form>

  <div id="result" style="margin-top: 20px; font-weight: bold;"></div>
  <div id="preview" style="margin-top: 20px; border: 1px solid #ccc; padding: 10px;"></div>

  <script>
    let previewed = false;

    document.getElementById("add-question-form").addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!previewed) {
        alert("⚠️ กรุณากดปุ่ม Preview เพื่อตรวจสอบก่อนส่งข้อมูล");
        return;
      }

      const form = e.target;
      const formData = new FormData(form);

      try {
        const res = await fetch("http://localhost:3001/add-question", {
          method: "POST",
          body: formData
        });

        const result = await res.json();
        const output = result.success
          ? `✅ เพิ่มโจทย์สำเร็จ! ID: ${result.id}`
          : `❌ เกิดข้อผิดพลาด: ${result.error}`;

        document.getElementById("result").innerText = output;
        previewed = false; // reset

      } catch (err) {
        document.getElementById("result").innerText = "❌ ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้: " + err.message;
        console.error(err);
      }
    });

    function previewQuestion() {
      const form = document.getElementById("add-question-form");
      const questionText = form.questionText.value.trim();
      const choices = [
        form.choice0.value.trim(),
        form.choice1.value.trim(),
        form.choice2.value.trim(),
        form.choice3.value.trim()
      ];

      if (!questionText) {
        alert("❌ กรุณากรอกโจทย์");
        return;
      }

      const filledChoices = choices.filter(choice => choice !== "");
      if (filledChoices.length < 2) {
        alert("❌ กรุณากรอกตัวเลือกอย่างน้อย 2 ข้อ");
        return;
      }

      if (!form.correct.value) {
        alert("❌ กรุณาเลือกคำตอบที่ถูกต้อง");
        return;
      }

      // เริ่มสร้าง preview
      const previewDiv = document.getElementById("preview");
      let html = `<h3>🔍 Preview</h3>`;
      html += `<p><strong>โจทย์:</strong> ${questionText}</p>`;

      const qImage = form.questionImage.files[0];
      if (qImage) {
        const imgURL = URL.createObjectURL(qImage);
        html += `<p><strong>📷 ภาพโจทย์:</strong><br><img src="${imgURL}" height="100"></p>`;
      }

      html += `<p><strong>📝 ตัวเลือก:</strong></p><ul>`;
      choices.forEach((text, i) => {
        if (text) {
          const mark = form.correct.value == i ? "✔️" : "";
          const choiceImage = form[`choiceImage${i}`].files[0];
          let imgHTML = "";
          if (choiceImage) {
            const imgURL = URL.createObjectURL(choiceImage);
            imgHTML = `<br><img src="${imgURL}" height="50">`;
          }
          html += `<li>${text} ${mark}${imgHTML}</li>`;
        }
      });
      html += `</ul>`;

      previewDiv.innerHTML = html;
      previewed = true;
    }
  </script>
</body>
</html>
