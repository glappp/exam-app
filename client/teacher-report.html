<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายงานครู — SchoolPL</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .school-banner { background:var(--navy); color:#fff; border-radius:10px; padding:14px 20px; margin-bottom:20px; font-size:14px; }
    .school-banner strong { font-size:16px; display:block; margin-bottom:2px; }
    .tabs { display:flex; gap:4px; margin-bottom:16px; flex-wrap:wrap; }
    .tab-btn { padding:8px 18px; border:1.5px solid var(--border); border-radius:7px; background:#fff; font-size:13px; font-weight:600; cursor:pointer; color:var(--muted); }
    .tab-btn.active { background:var(--navy); color:#fff; border-color:var(--navy); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }
    .filter-bar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; align-items:flex-end; }
    .filter-bar select, .filter-bar input { padding:8px 10px; border:1px solid var(--border); border-radius:6px; font-size:13px; font-family:inherit; }
    .stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:16px; }
    .stat-box { background:#fff; border-radius:10px; padding:16px; text-align:center; box-shadow:0 1px 4px rgba(0,0,0,.06); }
    .stat-num { font-size:28px; font-weight:800; color:var(--navy); }
    .stat-label { font-size:11px; color:#888; margin-top:2px; }
    .student-table { width:100%; border-collapse:collapse; font-size:13px; }
    .student-table th { text-align:left; padding:9px 10px; background:#f8fafc; color:#666; font-weight:600; border-bottom:2px solid #e8e8e8; }
    .student-table td { padding:9px 10px; border-bottom:1px solid #f0f0f0; vertical-align:middle; }
    .student-table tr:hover td { background:#fafafa; }
    .tag-pill { display:inline-block; background:#fff7ed; border:1px solid #fed7aa; border-radius:99px; padding:2px 8px; font-size:11px; color:#9a3412; margin:2px 2px 0 0; }
    .alert-row td { background:#fff5f5; }
    .section-title { font-size:13px; font-weight:700; color:#444; margin:20px 0 10px; text-transform:uppercase; letter-spacing:.5px; }
    .score-card { background:#f8fafc; border-radius:8px; padding:14px; margin-bottom:10px; font-size:13px; }
    .score-card .subject { font-weight:700; color:var(--navy); font-size:14px; margin-bottom:4px; }
    .period-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
    .period-box { background:#fff; border-radius:6px; padding:10px 12px; border:1px solid #e5e7eb; }
    .period-box .period-label { font-size:11px; font-weight:700; color:#6b7280; margin-bottom:5px; }
    .period-box .period-mean { font-size:16px; font-weight:800; color:var(--navy); }
    .period-box .period-sub { font-size:11px; color:#9ca3af; margin-top:2px; }
    .period-box.missing .period-mean { color:#d1d5db; }
    .period-total { margin-top:8px; text-align:right; font-size:12px; color:#374151; }
    .grade-badge { display:inline-block; padding:3px 8px; border-radius:5px; font-size:11px; font-weight:700; background:#f1f5f9; color:var(--navy); }
  </style>
</head>
<body>
<div class="topbar">
  <span class="topbar-title">รายงานครู</span>
  <div class="topbar-nav">
    <span id="greeting" style="font-size:13px;color:#ccc"></span>
    <a href="dashboard.html">หน้าหลัก</a>
    <a href="#" onclick="logout()">ออกจากระบบ</a>
  </div>
</div>

<div class="page">
  <div id="school-banner" class="school-banner" style="display:none">
    <strong id="banner-name">—</strong>
    <span id="banner-location">—</span>
  </div>

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
    <div class="tabs" style="margin-bottom:0">
      <button class="tab-btn active" onclick="switchTab('exam')">ภาพรวมการสอบ</button>
      <button class="tab-btn" onclick="switchTab('scores')">คะแนนที่อัปโหลด</button>
    </div>
    <a href="teacher-score-entry.html" class="btn btn-primary" style="font-size:13px;padding:8px 16px">+ บันทึกคะแนน</a>
  </div>

  <!-- Tab: ภาพรวมการสอบ -->
  <div class="tab-panel active" id="tab-exam">
    <div class="filter-bar">
      <div>
        <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">ระดับชั้น</label>
        <select id="f-grade"><option value="">ทุกชั้น</option></select>
      </div>
      <div>
        <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">ห้อง</label>
        <select id="f-classroom"><option value="">ทุกห้อง</option></select>
      </div>
      <div id="school-filter-wrap">
        <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">โรงเรียน</label>
        <select id="f-school"><option value="">ทุกโรงเรียน</option></select>
      </div>
      <div>
        <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">ปีการศึกษา</label>
        <input type="text" id="f-year" style="width:90px">
      </div>
      <button class="btn btn-primary" onclick="loadExam()">ดูรายงาน</button>
    </div>
    <div id="exam-content"><p style="color:var(--muted);text-align:center;padding:40px">เลือก filter แล้วกด "ดูรายงาน"</p></div>
  </div>

  <!-- Tab: คะแนนที่อัปโหลด -->
  <div class="tab-panel" id="tab-scores">
    <div id="scores-content"><p style="color:var(--muted);text-align:center;padding:40px">กำลังโหลด...</p></div>
  </div>
</div>

<script>
  let isAdmin = false;

  const TABS = ['exam','scores'];
  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', TABS[i] === name));
    document.querySelectorAll('.tab-panel').forEach((p,i) => p.classList.toggle('active', `tab-${TABS[i]}` === `tab-${name}`));
  }

  async function init() {
    const r = await fetch('/api/me', { credentials: 'include' });
    if (!r.ok) { location.href = 'login.html'; return; }
    const me = await r.json();
    if (!['admin','school_admin','teacher'].includes(me.role)) { location.href = 'dashboard.html'; return; }
    isAdmin = me.role === 'admin';
    document.getElementById('greeting').textContent = me.firstName || '';

    const year = String(new Date().getFullYear() + 543);
    document.getElementById('f-year').value = year;

    const rf = await fetch(`/api/teacher/filters?academicYear=${year}`, { credentials: 'include' });
    if (rf.ok) {
      const { grades, classrooms, schools, schoolName } = await rf.json();
      grades.forEach(g => document.getElementById('f-grade').innerHTML += `<option>${g}</option>`);
      classrooms.forEach(c => document.getElementById('f-classroom').innerHTML += `<option>${c}</option>`);
      if (isAdmin && schools.length) {
        schools.forEach(s => document.getElementById('f-school').innerHTML += `<option>${s}</option>`);
      } else {
        document.getElementById('school-filter-wrap').style.display = 'none';
      }
      if (schoolName) {
        document.getElementById('banner-name').textContent = schoolName;
        document.getElementById('school-banner').style.display = 'block';
      }
    }
    loadExam();
    loadScores();
  }

  async function loadExam() {
    const grade     = document.getElementById('f-grade').value;
    const classroom = document.getElementById('f-classroom').value;
    const school    = document.getElementById('f-school')?.value || '';
    const year      = document.getElementById('f-year').value;
    const params    = new URLSearchParams({ academicYear: year, ...(grade && {grade}), ...(classroom && {classroom}), ...(school && {school}) });

    document.getElementById('exam-content').innerHTML = '<p style="text-align:center;padding:32px;color:var(--muted)">กำลังโหลด...</p>';
    const r = await fetch(`/api/teacher/class-overview?${params}`, { credentials: 'include' });
    if (!r.ok) { document.getElementById('exam-content').innerHTML = '<p class="msg msg-error">โหลดข้อมูลล้มเหลว</p>'; return; }
    renderExam(await r.json());
  }

  function renderExam({ students, classWeakTopics, needAttention, total }) {
    const withExam = students.filter(s => s.avgPct !== null);
    const avgAll   = withExam.length ? Math.round(withExam.reduce((a, s) => a + s.avgPct, 0) / withExam.length) : null;

    const weakHtml = classWeakTopics.length
      ? classWeakTopics.map(w => `
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <div style="flex:1;font-size:13px">${w.label}</div>
            <div style="background:#fee2e2;border-radius:99px;height:8px;width:120px;overflow:hidden">
              <div style="background:#ef4444;height:8px;border-radius:99px;width:${Math.min(w.count/(total||1)*300,100)}%"></div>
            </div>
            <div style="font-size:12px;color:#888;width:50px">${w.count} คน</div>
          </div>`).join('')
      : '<p style="color:var(--muted);font-size:13px">ยังไม่มีข้อมูล</p>';

    const rows = students.map(s => {
      const isAlert = needAttention.some(n => n.userId === s.userId);
      const pctColor = s.avgPct === null ? '#aaa' : s.avgPct >= 75 ? '#16a34a' : s.avgPct >= 50 ? '#d97706' : '#dc2626';
      return `<tr class="${isAlert ? 'alert-row' : ''}">
        <td>${s.name}<br><span style="font-size:11px;color:#aaa">${s.username}</span></td>
        <td><span class="grade-badge">${s.grade}${s.classroom ? ' ห้อง '+s.classroom : ''}</span></td>
        <td style="text-align:center;font-weight:700;color:${pctColor}">${s.avgPct !== null ? s.avgPct+'%' : '—'}</td>
        <td style="text-align:center">${s.examCount}</td>
        <td>${s.weakTags.map(t => `<span class="tag-pill">${t.replace(/^[^:]+:/,'')}</span>`).join('')}</td>
        <td>${isAlert ? '<span style="color:#dc2626;font-size:12px">⚠️ ต้องดูแล</span>' : ''}</td>
      </tr>`;
    }).join('');

    document.getElementById('exam-content').innerHTML = `
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-label">นักเรียนทั้งหมด</div></div>
        <div class="stat-box"><div class="stat-num" style="color:${avgAll>=75?'#16a34a':avgAll>=50?'#d97706':'#dc2626'}">${avgAll!==null?avgAll+'%':'—'}</div><div class="stat-label">คะแนนเฉลี่ย</div></div>
        <div class="stat-box"><div class="stat-num" style="color:#dc2626">${needAttention.length}</div><div class="stat-label">ต้องดูแลพิเศษ</div></div>
      </div>
      <div class="card" style="margin-bottom:16px">
        <div class="section-title">หัวข้อที่ทั้งห้องทำได้แย่</div>${weakHtml}
      </div>
      <div class="card">
        <div class="section-title">รายชื่อนักเรียน</div>
        <div style="overflow-x:auto">
          <table class="student-table">
            <thead><tr><th>ชื่อ</th><th>ชั้น/ห้อง</th><th>คะแนนเฉลี่ย</th><th>ครั้งที่สอบ</th><th>จุดอ่อน</th><th></th></tr></thead>
            <tbody>${rows || '<tr><td colspan="6" style="text-align:center;color:#aaa;padding:20px">ไม่พบข้อมูล</td></tr>'}</tbody>
          </table>
        </div>
      </div>`;
  }

  async function loadScores() {
    const el = document.getElementById('scores-content');
    el.innerHTML = '<p style="text-align:center;padding:32px;color:var(--muted)">กำลังโหลด...</p>';
    const r = await fetch('/api/teacher/classroom-scores', { credentials: 'include' });
    if (!r.ok) { el.innerHTML = '<p class="msg msg-error">โหลดข้อมูลล้มเหลว</p>'; return; }
    const { uploads } = await r.json();
    if (!uploads.length) { el.innerHTML = '<div class="empty-msg">ยังไม่มีข้อมูลคะแนนที่อัปโหลด</div>'; return; }

    // จัดกลุ่มตาม subject + academicYear + term
    const groups = {};
    uploads.forEach(u => {
      const key = `${u.subject}|${u.academicYear||''}|${u.term||''}`;
      if (!groups[key]) groups[key] = { subject: u.subject, academicYear: u.academicYear, term: u.term, midterm: null, final: null };
      if (u.examPeriod === 'final') groups[key].final = u;
      else groups[key].midterm = u; // midterm หรือ ยังไม่ระบุ → ใส่ช่องกลางภาค
    });

    const periodBox = (u, label) => {
      const s = u?.stats ? JSON.parse(u.stats) : null;
      const hasStat = s && (s.mean != null);
      return `<div class="period-box${hasStat ? '' : ' missing'}">
        <div class="period-label">${label}</div>
        <div class="period-mean">${hasStat ? s.mean : '0'}</div>
        <div class="period-sub">${hasStat ? `SD ${s.sd} • ${s.count} คน` : 'ยังไม่มีข้อมูล'}</div>
      </div>`;
    };

    const cards = Object.values(groups).map(g => {
      const midS = g.midterm?.stats ? JSON.parse(g.midterm.stats) : null;
      const finS = g.final?.stats   ? JSON.parse(g.final.stats)   : null;
      const midMean = midS?.mean ?? 0;
      const finMean = finS?.mean ?? 0;
      const total   = (midMean + finMean).toFixed(1);
      const meta = [g.grade, g.academicYear ? `ปี ${g.academicYear}` : null, g.term ? `ภาคเรียน ${g.term}` : null].filter(Boolean).join(' • ');
      return `<div class="score-card">
        <div class="subject">${g.subject === 'multi' ? '📊 หลายวิชา' : g.subject}</div>
        ${meta ? `<div style="font-size:12px;color:#6b7280">${meta}</div>` : ''}
        <div class="period-grid">
          ${periodBox(g.midterm, '🔵 กลางภาค')}
          ${periodBox(g.final,   '🟢 ปลายภาค')}
        </div>
        <div class="period-total">คะแนนรวมเฉลี่ย: <strong>${total}</strong></div>
      </div>`;
    }).join('');

    el.innerHTML = `<div>${cards}</div>`;
  }

  function logout() { fetch('/api/logout', { method:'POST', credentials:'include' }); location.href='login.html'; }
  init();
</script>
</body>
</html>
