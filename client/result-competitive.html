<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ผลสอบ</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" defer></script>
  <style>
    .question-box {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
      background-color: #f9f9f9;
    }
    .correct {
      border-left: 8px solid #4caf50;
    }
    .wrong {
      border-left: 8px solid #f44336;
    }
    img.question-image {
      max-width: 120px;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📄 ผลสอบ: Competitive Practice</h1>
    <div id="summary"></div>
    <div id="recommendations"></div>
    <div id="details"></div>
    <button onclick="window.print()">🖨️ พิมพ์ผลสอบ</button>
  </div>

  <script>
    const result = JSON.parse(localStorage.getItem("examResult"));
    const qna = result.questions || [];
    const userAnswers = result.userAnswers || result.answers || [];

    // วิเคราะห์จุดอ่อนจากข้อที่ตอบผิด
    function analyzeWeakness(result) {
      const count = { topic: {}, skill: {}, trap: {} };

      qna.forEach((q, i) => {
        const ans = userAnswers[i];
        if (isAnswerCorrect(ans, q)) return;

        ['topic', 'skill', 'trap'].forEach(type => {
          const attrs = q.attributes?.[type] || [];
          attrs.forEach(attr => {
            count[type][attr] = (count[type][attr] || 0) + 1;
          });
        });
      });

      return count;
    }

    function isAnswerCorrect(ans, q) {
      if (q.answer != null) return ans === q.answer;
      if (Array.isArray(q.shortAnswer)) {
        const clean = (a) => String(a).trim().toLowerCase().replace(/\s+/g, '');
        return q.shortAnswer.some(sa => clean(sa) === clean(ans));
      }
      return false;
    }

    // สรุปคะแนน
    document.getElementById('summary').innerHTML = `
      <h2>สรุปคะแนน</h2>
      <p>ตอบถูก <strong>${result.correctCount}</strong> / ${result.total} ข้อ</p>
      <p>ได้ <strong>${result.score}</strong> / ${result.fullScore} คะแนน</p>
    `;

    // แสดงชื่อ attribute ภาษาไทย (สามารถใช้ fetch ในอนาคต)
let attributeDict = {};

fetch('/api/attributeDict.json')
  .then(res => res.json())
  .then(data => attributeDict = data)
  .catch(err => console.error("โหลด attributeDict ไม่สำเร็จ", err));

function getLabel(attrKey) {
  return attributeDict[attrKey]?.labelTh || attrKey;
}


    function renderRecommendations(weakness) {
      const renderList = (title, items) => {
        if (!items || Object.keys(items).length === 0) return '';
        const sorted = Object.entries(items).sort((a, b) => b[1] - a[1]);
        return `
          <h3>${title}</h3>
          <ul>
            ${sorted.map(([key, count]) => `<li>${getLabel(key)} (${count} ข้อ)</li>`).join('')}
          </ul>
        `;
      };

      return `
        <h2>📌 จุดอ่อนที่ควรทบทวน</h2>
        ${renderList('🔹 หัวข้อ (Topic)', weakness.topic)}
        ${renderList('🔹 ทักษะ (Skill)', weakness.skill)}
        ${renderList('🔹 กับดัก (Trap)', weakness.trap)}
      `;
    }

    const weakness = analyzeWeakness(result);
    document.getElementById('recommendations').innerHTML = renderRecommendations(weakness);

    // รายละเอียดข้อสอบ
    const details = qna.map((q, i) => {
      const userAns = userAnswers[i];
      const isCorrect = isAnswerCorrect(userAns, q);
      const choiceText = (c, idx) => {
        if (!c || !c.textTh) return '';
        const mark = idx === userAns ? '👉 ' : '';
        const bold = idx === q.answer ? 'font-weight:bold;' : '';
        return `<li style="${bold}">${mark}${c.textTh}</li>`;
      };

      return `
        <div class="question-box ${isCorrect ? 'correct' : 'wrong'}">
          <p><strong>ข้อ ${i + 1}</strong>: ${q.textTh}</p>
          ${q.image ? `<img src="${q.image}" class="question-image">` : ''}
          <ul>
            ${q.choices?.map((c, idx) => choiceText(c, idx)).join('')}
          </ul>
        </div>
      `;
    });

    document.getElementById('details').innerHTML = `
      <h2>🧾 รายละเอียดข้อสอบ</h2>
      ${details.join('')}
    `;

    if (window.MathJax) {
      MathJax.typesetPromise();
    }
  </script>
</body>
</html>
