<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สอบแข่งขัน — คลังข้อสอบ</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" defer></script>
  <style>
    .timer { font-size: 20px; font-weight: 700; color: var(--navy); font-variant-numeric: tabular-nums; }
    .timer.warn   { color: #d97706; }
    .timer.danger { color: #dc2626; }
    .question-text { font-size: 15px; line-height: 1.7; margin-bottom: 12px; }
    .answer-section label {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 7px;
      margin-bottom: 8px; cursor: pointer; font-size: 14px; background: #fff;
      transition: border-color .1s, background .1s;
    }
    .answer-section label:hover { border-color: var(--blue); background: #eff6ff; }
    .answer-section label:has(input:checked) { border-color: var(--blue); background: #dbeafe; font-weight: 600; }
    .answer-section input[type=radio] { margin-top: 2px; flex-shrink: 0; }
    .progress-text { font-size: 13px; color: var(--muted); font-weight: 600; }

    /* Pre-exam ticket screen */
    #ticket-screen { max-width: 440px; margin: 40px auto; }
    .ticket-option {
      border: 2px solid #e0e0e0; border-radius: 12px; padding: 16px 20px;
      cursor: pointer; margin-bottom: 12px; transition: border-color .15s, background .15s;
      display: flex; align-items: flex-start; gap: 14px;
    }
    .ticket-option:hover { border-color: #3b82f6; background: #eff6ff; }
    .ticket-option.selected { border-color: #3b82f6; background: #dbeafe; }
    .ticket-option input[type=radio] { margin-top: 3px; flex-shrink: 0; }
    .ticket-option .opt-title { font-weight: 700; font-size: 14px; margin-bottom: 3px; }
    .ticket-option .opt-desc { font-size: 12px; color: #666; line-height: 1.5; }
    .ticket-badge {
      display: inline-block; background: #fef3c7; color: #92400e;
      border: 1px solid #fcd34d; border-radius: 99px;
      padding: 2px 10px; font-size: 12px; font-weight: 700;
    }
    .ticket-warn { background: #fef2f2; border: 1px solid #fca5a5; border-radius: 8px;
      padding: 10px 14px; font-size: 13px; color: #b91c1c; margin-bottom: 16px; }
  </style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">⏱️ สอบแข่งขัน</span>
  <div class="topbar-nav">
    <span id="timer-display" class="timer" style="display:none"></span>
    <span class="progress-text" id="progress"></span>
    <a href="exam.html">เลือกการสอบ</a>
  </div>
</div>

<!-- หน้าเลือกตั๋ว (แสดงก่อนเริ่มสอบ) -->
<div class="page" id="ticket-screen">
  <div class="card" style="margin-bottom:16px">
    <div class="card-title">ตั๋วแข่งขันของคุณ</div>
    <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
      <div style="text-align:center">
        <div style="font-size:32px;font-weight:800;color:#1e3a5f" id="ts-balance">—</div>
        <div style="font-size:12px;color:#888">ใบที่มี</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:32px;font-weight:800;color:#d97706" id="ts-used">—</div>
        <div style="font-size:12px;color:#888">ใช้ไปวันนี้</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:32px;font-weight:800;color:#16a34a" id="ts-remain">—</div>
        <div style="font-size:12px;color:#888">คงเหลือวันนี้ (max 5)</div>
      </div>
    </div>
  </div>

  <div id="ts-cap-warn" class="ticket-warn" style="display:none">
    ⚠️ ใช้ตั๋วครบ 5 ใบแล้วในวันนี้ — ยังเล่นได้แบบไม่บันทึกคะแนน
  </div>
  <div id="ts-no-ticket-warn" class="ticket-warn" style="display:none">
    ⚠️ ตั๋วหมด — เล่นได้แบบไม่บันทึกคะแนน หรือทำภารกิจเพื่อรับตั๋วเพิ่ม
  </div>

  <div class="card-title" style="margin-bottom:10px">เลือกโหมดการเล่น</div>

  <label class="ticket-option" id="opt-ticket">
    <input type="radio" name="ticket-choice" value="use">
    <div>
      <div class="opt-title">🎟️ ใช้ตั๋ว 1 ใบ — บันทึกคะแนน</div>
      <div class="opt-desc">คะแนนจะบันทึกลงประวัติและ leaderboard<br>
        ใช้ตั๋ว 1 ใบ จาก <span id="opt-balance-text">—</span> ใบ
      </div>
    </div>
  </label>

  <label class="ticket-option selected" id="opt-free">
    <input type="radio" name="ticket-choice" value="free" checked>
    <div>
      <div class="opt-title">🎮 เล่นฟรี — ไม่บันทึกคะแนน</div>
      <div class="opt-desc">เล่นได้เต็มที่ แต่ไม่บันทึกลง leaderboard</div>
    </div>
  </label>

  <button class="btn btn-primary btn-full" id="ts-start-btn" onclick="startExam()" style="margin-top:8px">
    เริ่มสอบ →
  </button>
</div>

<!-- หน้าสอบจริง (ซ่อนอยู่ก่อน) -->
<div class="page" id="exam-screen" style="display:none">
  <div class="exam-layout">
    <div class="question-area">
      <div id="question-container"></div>
    </div>
    <div class="nav-sidebar" id="navigation">
      <button class="btn" id="prev-btn" disabled>←</button>
      <button class="btn btn-primary" id="next-btn">→</button>
    </div>
  </div>

  <div id="submit-section" style="display:none;margin-top:16px">
    <div id="ticket-reminder" style="font-size:12px;color:#888;margin-bottom:8px;text-align:center"></div>
    <button class="btn btn-primary btn-full" id="submit-btn">ส่งคำตอบทั้งหมด</button>
  </div>

  <div id="result-section" style="margin-top:16px"></div>
</div>

<script>
  const urlParams  = new URLSearchParams(location.search);
  const mode       = urlParams.get('mode') || 'competitive';
  const grade      = urlParams.get('grade');
  const examType   = urlParams.get('examType');
  const timed      = urlParams.get('timed') === '1';

  let questions = [];
  let currentIndex = 0;
  let answers = [];
  let examStartTime = null;
  let timerInterval = null;
  let useTicket = false;
  let ticketInfo = { balance: 0, usedToday: 0, remainingToday: 0 };

  // Auth check + โหลด ticket balance
  (async () => {
    const res = await fetch('/api/me', { credentials: 'include' });
    if (!res.ok) { location.href = '/login.html'; return; }
    await loadTicketInfo();
  })();

  async function loadTicketInfo() {
    try {
      const res = await fetch('/api/tickets/balance', { credentials: 'include' });
      if (!res.ok) return;
      ticketInfo = await res.json();
    } catch {}

    document.getElementById('ts-balance').textContent = ticketInfo.balance;
    document.getElementById('ts-used').textContent = ticketInfo.usedToday;
    document.getElementById('ts-remain').textContent = ticketInfo.remainingToday;
    document.getElementById('opt-balance-text').textContent = ticketInfo.balance;

    const optTicket = document.getElementById('opt-ticket');
    const capWarn = document.getElementById('ts-cap-warn');
    const noTicketWarn = document.getElementById('ts-no-ticket-warn');

    if (ticketInfo.remainingToday <= 0) {
      capWarn.style.display = '';
      optTicket.style.opacity = '0.4';
      optTicket.style.pointerEvents = 'none';
      optTicket.querySelector('input').disabled = true;
    } else if (ticketInfo.balance <= 0) {
      noTicketWarn.style.display = '';
      optTicket.style.opacity = '0.4';
      optTicket.style.pointerEvents = 'none';
      optTicket.querySelector('input').disabled = true;
    }

    // highlight ที่เลือก
    document.querySelectorAll('.ticket-option').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.ticket-option').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
      });
    });
  }

  async function startExam() {
    const choice = document.querySelector('input[name="ticket-choice"]:checked')?.value;
    useTicket = choice === 'use';

    document.getElementById('ticket-screen').style.display = 'none';
    document.getElementById('exam-screen').style.display = '';

    if (useTicket) {
      document.getElementById('ticket-reminder').textContent = '🎟️ ใช้ตั๋ว — คะแนนจะถูกบันทึก';
    } else {
      document.getElementById('ticket-reminder').textContent = '🎮 โหมดฟรี — ไม่บันทึกคะแนน';
    }

    await fetchQuestions();
  }

  async function fetchQuestions() {
    const params = new URLSearchParams({ mode });
    if (grade)    params.set('grade', grade);
    if (examType) params.set('examType', examType);
    const res = await fetch(`/api/exam-set/random?${params}`, { credentials: 'include' });
    if (!res.ok) {
      document.getElementById('question-container').innerHTML =
        '<div class="card"><p style="color:#b91c1c">ไม่พบชุดข้อสอบ</p></div>';
      return;
    }
    questions = await res.json();
    answers = new Array(questions.length).fill(null);
    examStartTime = Date.now();
    if (timed) startTimer();
    renderQuestion();
    updateProgress();
  }

  function startTimer() {
    const el = document.getElementById('timer-display');
    el.style.display = 'inline';
    timerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - examStartTime) / 1000);
      const mm = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const ss = String(elapsed % 60).padStart(2, '0');
      el.textContent = `${mm}:${ss}`;
    }, 1000);
  }

  function renderQuestion() {
    const q = questions[currentIndex];
    document.getElementById('question-container').innerHTML = `
      <div class="card">
        <div class="question-text">${(q.textTh || '').replace(/\n/g, '<br>')}</div>
        ${q.image ? `<img src="${q.image.startsWith('/') ? q.image : '/uploads/' + q.image}" class="question-image">` : ''}
        <div class="answer-section">
          ${q.choices?.length ? q.choices.map((c, i) => `
            <label>
              <input type="radio" name="answer" value="${i}" ${answers[currentIndex] === i ? 'checked' : ''}>
              ${c.image ? `<img src="/uploads/${c.image}" style="max-height:40px">` : ''}
              ${c.textTh || ''}
            </label>
          `).join('') : `
            <input type="text" id="short-answer" value="${answers[currentIndex] || ''}" placeholder="พิมพ์คำตอบ" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-size:14px;margin-top:8px">
          `}
        </div>
      </div>
    `;

    if (window.MathJax) MathJax.typesetPromise();

    document.querySelectorAll('input[name="answer"]').forEach(input => {
      input.addEventListener('change', e => { answers[currentIndex] = parseInt(e.target.value); });
    });
    const shortInput = document.getElementById('short-answer');
    if (shortInput) shortInput.addEventListener('input', e => { answers[currentIndex] = e.target.value; });
  }

  function updateProgress() {
    document.getElementById('progress').textContent = `ข้อ ${currentIndex + 1} / ${questions.length}`;
    document.getElementById('prev-btn').disabled = currentIndex === 0;
    document.getElementById('next-btn').textContent = currentIndex === questions.length - 1 ? '✔ เสร็จ' : '→';
  }

  document.getElementById('prev-btn').addEventListener('click', () => {
    if (currentIndex > 0) { currentIndex--; renderQuestion(); updateProgress(); }
  });

  document.getElementById('next-btn').addEventListener('click', () => {
    if (currentIndex < questions.length - 1) {
      currentIndex++; renderQuestion(); updateProgress();
    } else {
      const unanswered = answers.map((a, i) => (a === null || a === '') ? i + 1 : null).filter(Boolean);
      if (unanswered.length) { alert(`ยังไม่ได้ตอบข้อ: ${unanswered.join(', ')}`); return; }
      if (!confirm('ส่งคำตอบทั้งหมดใช่ไหม?')) return;
      document.getElementById('submit-section').style.display = 'block';
      document.getElementById('navigation').style.display = 'none';
    }
  });

  document.getElementById('submit-btn').addEventListener('click', async () => {
    const durationSec = examStartTime ? Math.round((Date.now() - examStartTime) / 1000) : 0;
    if (timerInterval) clearInterval(timerInterval);
    document.getElementById('submit-btn').disabled = true;
    document.getElementById('submit-btn').textContent = 'กำลังส่ง...';

    const res = await fetch('/api/submit-exam', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ mode, grade, examType, questions: questions.map(q => q.id), answers, durationSec, useTicket })
    });
    const result = await res.json();

    if (!res.ok) {
      // เกิดขึ้นถ้าตั๋วหมดระหว่างรอ (edge case)
      alert(result.error || 'ส่งคำตอบไม่สำเร็จ');
      document.getElementById('submit-btn').disabled = false;
      document.getElementById('submit-btn').textContent = 'ส่งคำตอบทั้งหมด';
      return;
    }

    localStorage.setItem('examResult', JSON.stringify(result));
    location.href = '/result-competitive.html';
  });
</script>
</body>
</html>
