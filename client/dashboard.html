<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>แดชบอร์ด</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; color: #222; min-height: 100vh; }

    .topbar {
      background: #1e3a5f;
      color: #fff;
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-title { font-weight: 600; font-size: 16px; }
    .topbar-right { display: flex; align-items: center; gap: 16px; font-size: 13px; }
    .topbar-right a { color: #93c5fd; text-decoration: none; }
    .topbar-right a:hover { color: #fff; }

    .container { max-width: 900px; margin: 28px auto; padding: 0 16px 64px; }

    .welcome { margin-bottom: 24px; }
    .welcome h2 { font-size: 22px; font-weight: 700; }
    .welcome p { color: #666; font-size: 14px; margin-top: 4px; }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 640px) { .grid2 { grid-template-columns: 1fr; } }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .card-title {
      font-size: 12px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 14px;
    }

    /* Mode buttons */
    .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .mode-btn {
      padding: 14px 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: opacity .15s;
    }
    .mode-btn:hover { opacity: .85; }
    .mode-btn .icon { font-size: 22px; }
    .mode-btn.green  { background: #dcfce7; color: #166534; }
    .mode-btn.blue   { background: #dbeafe; color: #1e40af; }
    .mode-btn.orange { background: #ffedd5; color: #9a3412; }
    .mode-btn.purple { background: #f3e8ff; color: #6b21a8; }

    /* Profile form */
    .form-group { margin-bottom: 12px; }
    .form-group label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
    .form-group input, .form-group select {
      width: 100%; padding: 8px 10px; border: 1px solid #e0e0e0; border-radius: 6px;
      font-size: 13px; font-family: inherit;
    }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #3b82f6; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .profile-value {
      padding: 8px 10px; background: #f1f5f9; border-radius: 6px;
      font-size: 14px; color: #1e293b; min-height: 36px;
    }

    /* Stats row */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
    .stat-box { background: #f8fafc; border-radius: 8px; padding: 12px; text-align: center; }
    .stat-num { font-size: 24px; font-weight: 700; color: #1e3a5f; }
    .stat-label { font-size: 11px; color: #888; margin-top: 2px; }

    /* History table */
    .history-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .history-table th { text-align: left; padding: 8px 10px; background: #f8fafc; color: #666; font-weight: 600; border-bottom: 1px solid #e8e8e8; }
    .history-table td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
    .badge-practice  { background: #dcfce7; color: #166534; }
    .badge-competitive { background: #ffedd5; color: #9a3412; }
    .badge-adaptive  { background: #dbeafe; color: #1e40af; }
    .badge-official  { background: #f3e8ff; color: #6b21a8; }

    /* Weakness */
    .weak-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .weak-label { font-size: 12px; color: #444; width: 160px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .weak-bar-bg { flex: 1; height: 8px; background: #f0f0f0; border-radius: 4px; overflow: hidden; }
    .weak-bar-fill { height: 100%; border-radius: 4px; background: #3b82f6; }
    .weak-bar-fill.warn { background: #f59e0b; }
    .weak-bar-fill.danger { background: #ef4444; }
    .weak-pct { font-size: 12px; color: #666; width: 36px; text-align: right; }

    .empty-msg { font-size: 13px; color: #aaa; font-style: italic; text-align: center; padding: 16px 0; }
  </style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">คลังข้อสอบออนไลน์</span>
  <div class="topbar-right">
    <span id="topbar-name"></span>
    <a href="#" onclick="logout()">ออกจากระบบ</a>
  </div>
</div>

<!-- Announcement popup -->
<div id="ann-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:center;justify-content:center;padding:16px">
  <div style="background:#fff;border-radius:14px;max-width:480px;width:100%;padding:28px;box-shadow:0 8px 32px rgba(0,0,0,.18);position:relative">
    <div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:6px">📢 ประกาศ</div>
    <div id="ann-title" style="font-size:18px;font-weight:700;margin-bottom:10px"></div>
    <div id="ann-body" style="font-size:14px;line-height:1.7;color:#444;margin-bottom:20px"></div>
    <div style="display:flex;justify-content:flex-end;gap:8px">
      <button id="ann-next" style="padding:8px 20px;background:#f0f0f0;border:none;border-radius:6px;cursor:pointer;font-size:13px">ถัดไป</button>
      <button id="ann-close" style="padding:8px 20px;background:#1e3a5f;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px">ปิด</button>
    </div>
    <div id="ann-counter" style="position:absolute;top:16px;right:20px;font-size:12px;color:#aaa"></div>
  </div>
</div>

<div class="container">
  <div class="welcome">
    <h2 id="welcome-name">กำลังโหลด...</h2>
    <p id="welcome-sub"></p>
  </div>

  <!-- Character card -->
  <div class="card" id="char-card" style="display:none;margin-bottom:16px">
    <div style="display:flex;align-items:center;gap:14px">
      <div id="char-icon" style="font-size:36px;line-height:1"></div>
      <div style="flex:1">
        <div style="font-weight:700;font-size:15px" id="char-name"></div>
        <div style="font-size:12px;color:#888;margin:4px 0" id="char-xp"></div>
        <div style="background:#f0f0f0;border-radius:99px;height:6px">
          <div id="char-bar" style="background:#7c3aed;height:6px;border-radius:99px;width:0%;transition:width .4s"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Daily Mission card -->
  <div class="card" id="mission-card" style="margin-bottom:16px;display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="card-title" style="margin:0">ภารกิจวันนี้</div>
      <div id="mission-points" style="font-size:13px;color:#888"></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
          <span id="mission-label">ทำโจทย์ 0/10 ข้อ</span>
          <span id="mission-status"></span>
        </div>
        <div style="background:#f0f0f0;border-radius:99px;height:8px">
          <div id="mission-bar" style="background:#3b82f6;height:8px;border-radius:99px;width:0%;transition:width .4s"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Stats row -->
  <div class="stats-row" id="stats-row" style="display:none">
    <div class="stat-box">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">ครั้งที่สอบ</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stat-avg">—</div>
      <div class="stat-label">คะแนนเฉลี่ย (%)</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stat-best">—</div>
      <div class="stat-label">สูงสุด (%)</div>
    </div>
  </div>

  <div class="grid2">
    <!-- Left: Mode buttons + Weaknesses -->
    <div style="display:flex;flex-direction:column;gap:16px">

      <div class="card">
        <div class="card-title">เริ่มเรียน / สอบ</div>
        <div class="mode-grid">
          <button class="mode-btn green" onclick="location.href='practice.html'">
            <span class="icon">📗</span>ฝึกหัด
          </button>
          <button class="mode-btn blue" onclick="location.href='practice.html?mode=adaptive'">
            <span class="icon">🎯</span>ปรับจุดอ่อน
          </button>
          <button class="mode-btn orange" onclick="location.href='exam.html'">
            <span class="icon">⏱️</span>สอบแข่งขัน
          </button>
          <button class="mode-btn purple" onclick="location.href='exam.html?type=official'">
            <span class="icon">📄</span>ข้อสอบจริง
          </button>
          <button class="mode-btn" style="background:#fce7f3;color:#9d174d" onclick="location.href='parent.html'">
            <span class="icon">👨‍👩‍👧</span>ผู้ปกครอง
          </button>
          <button class="mode-btn" id="teacher-btn" style="display:none;background:#f0fdf4;color:#166534" onclick="location.href='teacher-report.html'">
            <span class="icon">👩‍🏫</span>รายงานครู
          </button>
          <button class="mode-btn" style="background:#fef9c3;color:#854d0e;grid-column:1/-1" onclick="location.href='mock-setup.html'">
            <span class="icon">🏆</span>Mock สอบแข่งขัน
          </button>
          <button class="mode-btn" style="background:#fef3c7;color:#92400e;grid-column:1/-1" onclick="location.href='grand-prix.html'">
            <span class="icon">🏎️</span>สูตรคูณ Grand Prix
          </button>
          <button class="mode-btn" style="background:#ede9fe;color:#4c1d95;grid-column:1/-1" onclick="location.href='time-trial.html'">
            <span class="icon">⏱️</span>Time Trial — สูตรคูณ 90 วิ
          </button>
        </div>
      </div>

      <div class="card" id="weakness-card">
        <div class="card-title">จุดอ่อน (Top 5)</div>
        <div id="weakness-content"><div class="empty-msg">ยังไม่มีข้อมูล</div></div>
      </div>

      <div class="card" id="recommend-card" style="display:none">
        <div class="card-title">แนะนำให้ฝึก</div>
        <div id="recommend-content"></div>
        <button class="btn btn-primary" style="margin-top:12px;width:100%" onclick="location.href='practice.html?mode=adaptive'">
          🎯 ปรับจุดอ่อนทั้งหมด
        </button>
      </div>

    </div>

    <!-- Right: Profile form + History -->
    <div style="display:flex;flex-direction:column;gap:16px">

      <div class="card">
        <div class="card-title">ข้อมูลนักเรียน</div>
        <div class="form-row">
          <div class="form-group">
            <label>ปีการศึกษา (พ.ศ.)</label>
            <div class="profile-value" id="p-year">—</div>
          </div>
          <div class="form-group">
            <label>ระดับชั้น</label>
            <div class="profile-value" id="p-grade">—</div>
          </div>
        </div>
        <div class="form-group">
          <label>โรงเรียน</label>
          <div class="profile-value" id="p-school">—</div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>อำเภอ / เขต</label>
            <div class="profile-value" id="p-district">—</div>
          </div>
          <div class="form-group">
            <label>จังหวัด</label>
            <div class="profile-value" id="p-province">—</div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>ห้อง</label>
            <div class="profile-value" id="p-classroom">—</div>
          </div>
          <div class="form-group">
            <label>เลขประจำตัว</label>
            <div class="profile-value" id="p-code">—</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">ประวัติการสอบ</div>
        <div id="history-content"><div class="empty-msg">ยังไม่มีประวัติ</div></div>
      </div>

    </div>
  </div>
</div>

<script>
  let studentData = null;

  async function init() {
    const res = await fetch('/api/me', { credentials: 'include' });
    if (!res.ok) { location.href = 'login.html'; return; }
    const me = await res.json();

    document.getElementById('topbar-name').textContent = me.firstName || me.username || '';
    if (['admin','teacher'].includes(me.role)) {
      document.getElementById('teacher-btn').style.display = '';
    }
    document.getElementById('welcome-name').textContent = `สวัสดี, ${me.firstName || 'นักเรียน'} 👋`;

    // Load full student data + daily mission พร้อมกัน
    const [r2, r3] = await Promise.all([
      fetch('/api/student/me', { credentials: 'include' }),
      fetch('/api/student/daily-mission', { credentials: 'include' })
    ]);
    if (r2.ok) {
      studentData = await r2.json();
      applyProfile(studentData.profile);
      renderStats(studentData.examResults);
      renderHistory(studentData.examResults);
      renderWeakness(studentData.examResults);
      renderRecommendation(studentData.examResults);
      if (studentData.profile) {
        document.getElementById('welcome-sub').textContent =
          `${studentData.profile.grade} • ${studentData.profile.school} • ปีการศึกษา ${studentData.profile.academicYear}`;
      }
    }
    if (r3.ok) {
      const mission = await r3.json();
      renderMission(mission);
    }

    // โหลด character
    const r6 = await fetch('/api/student/character', { credentials: 'include' });
    if (r6.ok) {
      const char = await r6.json();
      renderCharacter(char);
    }

    // โหลดประกาศที่ยังไม่ได้อ่าน
    const r4 = await fetch('/api/announcements', { credentials: 'include' });
    if (r4.ok) {
      const { announcements } = await r4.json();
      if (announcements.length) showAnnouncements(announcements);
    }

    // โหลดคะแนนจากครู
    const r5 = await fetch('/api/classroom/my-scores', { credentials: 'include' });
    if (r5.ok) {
      const data = await r5.json();
      if (data.results && data.results.length) renderClassroomScores(data.results, data.aggregates);
    }
  }

  function applyProfile(p) {
    if (!p) return;
    document.getElementById('p-year').textContent     = p.academicYear || '—';
    document.getElementById('p-grade').textContent    = p.grade || '—';
    document.getElementById('p-school').textContent   = p.school || '—';
    document.getElementById('p-district').textContent = p.district || '—';
    document.getElementById('p-province').textContent = p.province || '—';
    document.getElementById('p-classroom').textContent = p.classroom || '—';
    document.getElementById('p-code').textContent     = p.studentCode || '—';
  }

  function renderStats(results) {
    if (!results.length) return;
    document.getElementById('stats-row').style.display = 'grid';
    document.getElementById('stat-total').textContent = results.length;
    const pcts = results.map(r => r.total ? Math.round(r.score / r.total * 100) : 0);
    const avg = Math.round(pcts.reduce((a, b) => a + b, 0) / pcts.length);
    const best = Math.max(...pcts);
    document.getElementById('stat-avg').textContent = avg + '%';
    document.getElementById('stat-best').textContent = best + '%';
  }

  function renderHistory(results) {
    const el = document.getElementById('history-content');
    if (!results.length) return;
    const rows = results.slice(0, 8).map(r => {
      const pct = r.total ? Math.round(r.score / r.total * 100) : 0;
      const date = new Date(r.createdAt).toLocaleDateString('th-TH', { day: '2-digit', month: 'short', year: '2-digit' });
      const badgeClass = { practice: 'badge-practice', competitive: 'badge-competitive', adaptive: 'badge-adaptive', official: 'badge-official' }[r.mode] || 'badge-practice';
      return `<tr>
        <td>${date}</td>
        <td><span class="badge ${badgeClass}">${modeLabel(r.mode)}</span></td>
        <td>${r.score}/${r.total}</td>
        <td>${pct}%</td>
      </tr>`;
    }).join('');
    el.innerHTML = `<table class="history-table">
      <thead><tr><th>วันที่</th><th>โหมด</th><th>คะแนน</th><th>%</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  function renderMission(m) {
    document.getElementById('mission-card').style.display = '';
    const count = Math.min(m.questionsCount, m.dailyGoal);
    const pct = Math.round(count / m.dailyGoal * 100);
    document.getElementById('mission-label').textContent = `ทำโจทย์ ${count}/${m.dailyGoal} ข้อ`;
    document.getElementById('mission-bar').style.width = pct + '%';
    document.getElementById('mission-bar').style.background = m.baseCompleted ? '#16a34a' : '#3b82f6';
    document.getElementById('mission-status').innerHTML = m.baseCompleted
      ? `<span style="color:#16a34a;font-weight:700">✅ ครบแล้ว! +${m.pointsEarnedToday} ⭐</span>`
      : `<span style="color:#888">${m.dailyGoal - count} ข้อที่เหลือ</span>`;
    document.getElementById('mission-points').textContent = `⭐ ${m.totalPoints} คะแนนสะสม`;
  }

  function renderRecommendation(results) {
    // รวม weakAttributes จากทุกผลสอบ (ทุก mode ที่มีข้อมูล)
    const tally = {};
    results.forEach(r => {
      if (!Array.isArray(r.weakAttributes)) return;
      r.weakAttributes.forEach(tag => {
        tally[tag] = (tally[tag] || 0) + 1;
      });
    });

    // เอาเฉพาะ topic tags เรียงตามความถี่
    const topTopics = Object.entries(tally)
      .filter(([k]) => k.startsWith('topic:'))
      .sort((a, b) => b[1] - a[1])
      .slice(0, 3);

    if (!topTopics.length) return;

    const card = document.getElementById('recommend-card');
    const el = document.getElementById('recommend-content');
    el.innerHTML = topTopics.map(([tag, count], i) => {
      const label = tag.replace('topic:', '');
      const medal = ['🥇','🥈','🥉'][i] || '';
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;${i < topTopics.length-1 ? 'border-bottom:1px solid #f1f5f9' : ''}">
        <span style="font-size:13px">${medal} <strong>${label}</strong>
          <span style="font-size:11px;color:#94a3b8;margin-left:4px">ผิด ${count} ครั้ง</span>
        </span>
        <a href="practice.html?mode=targeted&topic=${encodeURIComponent(tag)}"
           style="font-size:12px;color:#fff;background:#3b82f6;border-radius:6px;padding:3px 10px;text-decoration:none;font-weight:600;white-space:nowrap">ฝึกเลย</a>
      </div>`;
    }).join('');
    card.style.display = 'block';
  }

  function renderWeakness(results) {
    const el = document.getElementById('weakness-content');
    // ใช้ weakAttributes จากการสอบแบบมีเวลา (competitive/official) ล่าสุด
    const timedResult = results.find(r => r.mode === 'competitive' || r.mode === 'official');
    const tags = Array.isArray(timedResult?.weakAttributes) ? timedResult.weakAttributes : [];
    if (!tags.length) return;

    const grouped = {};
    tags.forEach(tag => {
      const type = tag.split(':')[0];
      if (!grouped[type]) grouped[type] = [];
      grouped[type].push(tag.replace(/^[^:]+:/, ''));
    });

    el.innerHTML = Object.entries(grouped).map(([type, items]) => {
      const typeLabel = { topic: 'หัวข้อ', skill: 'ทักษะ', trap: 'กับดัก' }[type] || type;
      return `<div style="margin-bottom:10px">
        <div style="font-size:11px;color:#888;font-weight:700;text-transform:uppercase;margin-bottom:6px">${typeLabel}</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${items.map(item => `
            <span style="display:inline-flex;align-items:center;gap:4px;background:#fff7ed;border:1px solid #fed7aa;border-radius:99px;padding:3px 10px;font-size:12px">
              <span style="color:#9a3412">${item}</span>
              <a href="practice.html?mode=targeted&topic=${encodeURIComponent(type+':'+item)}"
                 style="color:#3b82f6;font-size:11px;text-decoration:none;font-weight:600">ซ่อม</a>
            </span>`).join('')}
        </div>
      </div>`;
    }).join('');
  }

  function modeLabel(m) {
    return { practice: 'ฝึกหัด', competitive: 'แข่งขัน', adaptive: 'ปรับจุดอ่อน', official: 'ข้อสอบจริง' }[m] || m;
  }


  function renderCharacter(c) {
    document.getElementById('char-card').style.display = '';
    document.getElementById('char-icon').textContent = c.classIcon;
    document.getElementById('char-name').textContent = `LV ${c.level} ${c.className}`;
    document.getElementById('char-xp').textContent = `${c.xpProgress} / ${c.xpNeeded} XP`;
    const pct = Math.min(Math.round(c.xpProgress / c.xpNeeded * 100), 100);
    document.getElementById('char-bar').style.width = pct + '%';
  }

  // Announcement popup
  let annQueue = [], annIndex = 0;
  function showAnnouncements(list) {
    annQueue = list; annIndex = 0;
    showAnn(0);
    document.getElementById('ann-overlay').style.display = 'flex';
  }
  function showAnn(i) {
    const a = annQueue[i];
    document.getElementById('ann-title').textContent = a.title;
    document.getElementById('ann-body').textContent = a.body;
    document.getElementById('ann-counter').textContent = annQueue.length > 1 ? `${i+1}/${annQueue.length}` : '';
    document.getElementById('ann-next').style.display = annQueue.length > 1 && i < annQueue.length - 1 ? '' : 'none';
    fetch(`/api/announcements/${a.id}/read`, { method: 'POST', credentials: 'include' });
  }
  document.getElementById('ann-next').onclick = () => { annIndex++; showAnn(annIndex); };
  document.getElementById('ann-close').onclick = () => { document.getElementById('ann-overlay').style.display = 'none'; };

  // Classroom scores
  function renderClassroomScores(results, aggregates) {
    const single = results.filter(r => !r.isMulti);
    if (!single.length) return;

    // ดึง aggregate ของปีล่าสุด (key = "year|term")
    const latestKey = Object.keys(aggregates || {}).sort((a,b) => b.localeCompare(a))[0];
    const agg = latestKey ? aggregates[latestKey] : null;
    const aggLabel = agg ? `ปีการศึกษา ${agg.year} ภาคเรียน ${agg.term}` : '';

    const rankEmoji = agg ? (agg.rank === 1 ? '🥇' : agg.rank === 2 ? '🥈' : agg.rank === 3 ? '🥉' : '') : '';
    const pct = agg ? Math.round(agg.myTotal / agg.fullTotal * 100) : null;
    const pctColor = pct >= 80 ? '#16a34a' : pct >= 60 ? '#d97706' : '#dc2626';

    const aggHtml = agg ? `
      <div style="font-size:13px;color:#444;margin-bottom:10px;padding:8px 10px;background:#f8fafc;border-radius:8px;display:flex;gap:16px;flex-wrap:wrap">
        <span>คะแนนรวม <strong style="color:${pctColor}">${agg.myTotal}/${agg.fullTotal}</strong></span>
        <span>อันดับ <strong style="color:#1e3a5f">${rankEmoji}${agg.rank}/${agg.total}</strong></span>
        <span>เฉลี่ยห้อง <strong>${agg.classMeanTotal}</strong></span>
        <span>SD <strong>${agg.classSDTotal}</strong></span>
      </div>` : '';

    const grid = document.querySelector('.grid2');
    const card = document.createElement('div');
    card.className = 'card';
    card.style.marginTop = '16px';
    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="card-title" style="margin:0">คะแนนจากครู${aggLabel ? ` (${aggLabel})` : ''}</div>
        <a href="student-report.html" style="font-size:12px;color:#3b82f6;text-decoration:none;font-weight:600">ดูรายงานเต็ม →</a>
      </div>
      ${aggHtml}
      <table class="history-table">
        <thead><tr><th>วิชา</th><th>คะแนน</th><th>เกรด</th><th>อันดับ</th></tr></thead>
        <tbody>${single.slice(0, 8).map(r => {
          const d = r.myData;
          const rank = r.ranks?.['_'];
          const total = r.total;
          const re = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '';
          const gradeColor = d.grade >= 3 ? '#16a34a' : d.grade >= 2 ? '#d97706' : '#dc2626';
          return `<tr>
            <td>${r.subject}</td>
            <td>${d.score}/${d.fullScore}</td>
            <td style="font-weight:700;color:${gradeColor}">${d.grade}</td>
            <td>${re} ${rank ? rank+'/'+total : '—'}</td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>`;
    grid.after(card);
  }

  async function logout() {
    await fetch('/api/logout', { method: 'POST', credentials: 'include' });
    location.href = 'login.html';
  }

  init();
</script>
</body>
</html>
