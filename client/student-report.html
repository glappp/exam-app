<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ผลการเรียน — รายบุคคล</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body { background:#f1f5f9; }

    /* ── Header card ── */
    .student-header {
      background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%);
      color: #fff; border-radius: 16px; padding: 24px 28px;
      display: flex; align-items: center; gap: 20px; margin-bottom: 20px;
      box-shadow: 0 4px 16px rgba(59,130,246,.3);
    }
    .avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(255,255,255,.25); display: flex; align-items: center;
      justify-content: center; font-size: 28px; flex-shrink: 0;
    }
    .student-header h2 { margin: 0 0 4px; font-size: 20px; font-weight: 700; }
    .student-header .meta { font-size: 13px; opacity: .85; }
    .student-header .badge-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .hbadge {
      background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.35);
      border-radius: 20px; padding: 3px 12px; font-size: 12px; font-weight: 600;
    }

    /* ── Section title ── */
    .sec-title { font-size: 15px; font-weight: 700; color: #1e293b; margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }

    /* ── Score cards ── */
    .score-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .score-card {
      background: #fff; border-radius: 12px; padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07); border-top: 4px solid #e2e8f0;
      transition: box-shadow .15s;
    }
    .score-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.12); }
    .score-card.good  { border-top-color: #22c55e; }
    .score-card.ok    { border-top-color: #f59e0b; }
    .score-card.poor  { border-top-color: #ef4444; }
    .score-card .subj { font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
    .score-card .subj:hover { color: #3b82f6; text-decoration: underline; }
    .score-card .big  { font-size: 32px; font-weight: 800; line-height: 1; }
    .score-card .fs   { font-size: 13px; color: #94a3b8; }
    .score-card .pct-row { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; font-size: 11px; color: #64748b; }
    .score-card .minmax-row { display: flex; gap: 8px; margin-top: 4px; font-size: 11px; color: #94a3b8; }
    .score-card .minmax-row span { display: flex; align-items: center; gap: 3px; }
    .score-card .minmax-row .mx { color: #16a34a; font-weight: 700; }
    .score-card .minmax-row .mn { color: #dc2626; font-weight: 700; }
    .score-card .pct-pill {
      padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 700;
      background: #f1f5f9; color: #475569;
    }
    .score-card .pct-pill.top { background: #dcfce7; color: #166534; }
    .score-card .pct-pill.mid { background: #fef9c3; color: #92400e; }
    .score-card .pct-pill.low { background: #fee2e2; color: #991b1b; }
    .score-card .bar-wrap { height: 6px; background: #f1f5f9; border-radius: 99px; margin-top: 8px; overflow: hidden; }
    .score-card .bar-fill { height: 100%; border-radius: 99px; }

    /* ── Charts ── */
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    @media (max-width: 640px) { .charts-row { grid-template-columns: 1fr; } }
    .chart-card {
      background: #fff; border-radius: 12px; padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }
    .chart-card canvas { max-height: 260px; }

    /* ── Term tabs ── */
    .term-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .term-tab {
      padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
      border: 2px solid #e2e8f0; background: #fff; color: #64748b; cursor: pointer;
      transition: all .15s;
    }
    .term-tab:hover { border-color: #3b82f6; color: #3b82f6; }
    .term-tab.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }

    /* ── History table (fallback style) ── */
    .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.07); margin-bottom: 16px; }
    .pct-badge {
      display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 700;
      background: #f1f5f9; color: #475569;
    }
    .pct-badge.top { background: #dcfce7; color: #166534; }
    .pct-badge.mid { background: #fef9c3; color: #92400e; }
    .pct-badge.low { background: #fee2e2; color: #991b1b; }
    .score-cell { font-weight: 700; }

    /* ── Navbar ── */
    nav { background:#1e293b; color:#fff; padding:12px 20px; display:flex; align-items:center; justify-content:space-between; }
    nav .brand { font-weight:700; font-size:16px; }
    nav .nav-links { display:flex; gap:12px; align-items:center; font-size:13px; }
    nav a { color:#94a3b8; text-decoration:none; }
    nav a:hover { color:#fff; }
    .container { max-width: 960px; margin: 0 auto; padding: 20px 16px; }

    /* ── Empty state ── */
    .empty { text-align:center; padding: 60px 20px; color: #94a3b8; }
    .empty .icon { font-size: 48px; margin-bottom: 12px; }
    .msg { padding:12px 16px; border-radius:8px; font-size:14px; margin-bottom:16px; }
    .msg.loading { background:#eff6ff; color:#1d4ed8; }
  </style>
</head>
<body>
<nav>
  <span class="brand">📚 SchoolPL</span>
  <div class="nav-links">
    <span id="nav-name" style="color:#e2e8f0"></span>
    <a href="dashboard.html">แดชบอร์ด</a>
    <a href="#" onclick="logout()">ออกจากระบบ</a>
  </div>
</nav>

<div class="container">
  <div id="loading" class="msg loading">⏳ กำลังโหลดข้อมูล...</div>

  <!-- Student header -->
  <div id="student-header" style="display:none" class="student-header">
    <div class="avatar">🎓</div>
    <div>
      <h2 id="s-name"></h2>
      <div class="meta" id="s-meta"></div>
      <div class="badge-row" id="s-badges"></div>
    </div>
  </div>

  <!-- Term tabs + content -->
  <div id="terms-section" style="display:none">
    <div id="term-tabs" class="term-tabs"></div>

    <p class="sec-title">📊 <span id="term-label" style="color:#3b82f6"></span></p>
    <div id="score-cards" class="score-cards"></div>

    <div class="charts-row">
      <div class="chart-card">
        <p class="sec-title" style="font-size:13px">📈 คะแนนเทียบค่าเฉลี่ยห้อง</p>
        <canvas id="bar-chart"></canvas>
      </div>
      <div class="chart-card" id="radar-wrap">
        <p class="sec-title" style="font-size:13px">🕸️ เรดาร์ Percentile รายวิชา</p>
        <canvas id="radar-chart"></canvas>
      </div>
    </div>
  </div>

  <div id="empty-state" style="display:none" class="empty">
    <div class="icon">📭</div>
    <p>ยังไม่มีผลการเรียนที่บันทึกไว้<br><span style="font-size:12px">ครูจะบันทึกคะแนนให้เมื่อสิ้นภาคเรียน</span></p>
  </div>
</div>

<script>
let barChart = null, radarChart = null;

async function init() {
  const meRes = await fetch('/api/me', {credentials:'include'});
  if (!meRes.ok) { window.location.href = 'login.html'; return; }
  const me = await meRes.json();
  document.getElementById('nav-name').textContent = me.firstName || me.username || '';

  const [classroomRes, academicRes] = await Promise.all([
    fetch('/api/classroom/my-scores',   {credentials:'include'}).then(r => r.json()).catch(() => null),
    fetch('/api/academic-records/mine', {credentials:'include'}).then(r => r.json()).catch(() => null),
  ]);
  document.getElementById('loading').style.display = 'none';

  // นับจำนวนเทอมใน AcademicRecord
  const acTermCount = academicRes?.total > 0
    ? Object.keys(academicRes.records || {}).reduce((sum, y) => sum + Object.keys(academicRes.records[y]).length, 0)
    : 0;

  // ── ใช้ classroom mode เฉพาะเมื่อ AcademicRecord มีไม่เกิน 1 เทอม
  // (ถ้า academic มีประวัติหลายเทอม → แสดง academic เพื่อเห็นพัฒนาการ)
  const singles = (classroomRes?.results || []).filter(r => !r.isMulti);
  if (singles.length > 0 && acTermCount <= 1) {
    renderHeader(classroomRes.student);
    const yearGroups = {};
    singles.forEach(r => {
      const key = `${r.academicYear}|${r.term || '1'}`;
      if (!yearGroups[key]) yearGroups[key] = [];
      yearGroups[key].push(r);
    });
    const years = Object.keys(yearGroups).sort((a, b) => b.localeCompare(a));
    const tabsEl = document.getElementById('term-tabs');
    tabsEl.innerHTML = years.map((key, i) =>
      `<button class="term-tab${i === 0 ? ' active' : ''}" onclick="switchTerm('${key}', this)">${esc(termLabel(key))}</button>`
    ).join('');
    window._termData = { yearGroups, aggregates: classroomRes.aggregates, mode: 'classroom' };
    renderTerm(years[0], yearGroups[years[0]], classroomRes.aggregates);
    document.getElementById('terms-section').style.display = 'block';
    return;
  }

  // ── fallback: AcademicRecord ────────────────────────────────────────────────
  if (academicRes?.total > 0) {
    const { records, years: acYears, summary } = academicRes;
    // flatten year|term keys เรียงล่าสุดก่อน
    const keys = [];
    acYears.forEach(y => Object.keys(records[y] || {}).sort().forEach(t => keys.push(`${y}|${t}`)));
    keys.sort((a, b) => b.localeCompare(a));

    // header จาก summary ล่าสุด
    const s = summary[summary.length - 1] || {};
    const GRADE_LBL = { p1:'ป.1', p2:'ป.2', p3:'ป.3', p4:'ป.4', p5:'ป.5', p6:'ป.6' };
    renderHeader({
      name: me.firstName ? `${me.firstName} ${me.lastName || ''}`.trim() : me.username,
      school: '', grade: GRADE_LBL[s.grade] || s.grade || '',
      classroom: '', studentCode: '', academicYear: s.year || ''
    });

    const tabsEl = document.getElementById('term-tabs');
    tabsEl.innerHTML = keys.map((key, i) =>
      `<button class="term-tab${i === 0 ? ' active' : ''}" onclick="switchAcTerm('${key}', this)">${esc(termLabel(key))}</button>`
    ).join('');

    window._termData = { acRecords: records, mode: 'academic' };
    renderAcademicTerm(keys[0], records);
    document.getElementById('terms-section').style.display = 'block';
    return;
  }

  document.getElementById('empty-state').style.display = 'block';
}

function switchTerm(key, btn) {
  document.querySelectorAll('.term-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const { yearGroups, aggregates } = window._termData;
  renderTerm(key, yearGroups[key], aggregates);
}

function switchAcTerm(key, btn) {
  document.querySelectorAll('.term-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAcademicTerm(key, window._termData.acRecords);
}

function renderAcademicTerm(key, records) {
  document.getElementById('term-label').textContent = termLabel(key);
  const [year, term] = key.split('|');
  const subjects = records[year]?.[term] || [];

  const labels  = subjects.map(s => s.subjectName);
  const myVals  = subjects.map(s => s.totalScore ?? 0);
  const avgVals = subjects.map(s => s.classStats?.mean ?? 0);

  document.getElementById('score-cards').innerHTML = subjects.map(s => {
    const total  = s.totalScore ?? null;
    const gv     = parseFloat(s.gradeValue);
    const pct    = total ?? 0;
    const cls    = pct >= 80 ? 'good' : pct >= 60 ? 'ok' : 'poor';
    const clr    = pct >= 80 ? '#22c55e' : pct >= 60 ? '#f59e0b' : '#ef4444';
    const gcBg   = gv >= 3.5 ? '#dcfce7' : gv >= 2.5 ? '#fef3c7' : gv >= 1 ? '#fee2e2' : '#f1f5f9';
    const gcClr  = gv >= 3.5 ? '#15803d' : gv >= 2.5 ? '#d97706' : gv >= 1 ? '#b91c1c' : '#94a3b8';
    const cs     = s.classStats;
    const gs     = s.gradeStats;
    const cpct   = cs?.percentile ?? null;
    const gpct   = gs?.percentile ?? null;
    const cpCls  = cpct >= 75 ? 'top' : cpct >= 40 ? 'mid' : 'low';
    const gpCls  = gpct >= 75 ? 'top' : gpct >= 40 ? 'mid' : 'low';
    return `<div class="score-card ${cls}">
      <div class="subj" onclick="location.href='subject-progress.html?subject='+encodeURIComponent('${s.subjectName}')" title="ดูความก้าวหน้า ${esc(s.subjectName)}">${esc(s.subjectName)} 📈</div>
      <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:4px">
        <span class="big" style="color:${clr}">${total ?? '—'}</span>
        <span class="fs">/ 100</span>
        <span style="margin-left:auto;font-weight:800;font-size:13px;color:${gcClr};background:${gcBg};padding:1px 9px;border-radius:7px">${s.gradeValue ?? '—'}</span>
      </div>
      ${cs ? `<div class="pct-row" style="margin-bottom:2px">
        <span style="color:#64748b;font-size:11px">เฉลี่ย ${cs.mean} <span style="color:#94a3b8">±${cs.sd}</span></span>
        ${cpct != null ? `<span class="pct-pill ${cpCls}">ห้อง P${cpct}</span>` : ''}
      </div>
      ${(cs.max != null) ? `<div class="minmax-row">
        <span>สูงสุด <b class="mx">${cs.max}</b></span>
        <span>ต่ำสุด <b class="mn">${cs.min}</b></span>
        ${gpct != null ? `<span style="margin-left:auto"><span class="pct-pill ${gpCls}" style="font-size:10px">ชั้น P${gpct}</span></span>` : ''}
      </div>` : ''}` : ''}
      <div class="bar-wrap" style="margin-top:6px">
        <div class="bar-fill" style="width:${Math.min(100, pct)}%;background:${clr}"></div>
      </div>
    </div>`;
  }).join('');

  renderBarChart(labels, myVals, avgVals);
  renderRadarChart(labels, myVals, avgVals);
}

function renderHeader(s) {
  document.getElementById('s-name').textContent = s.name;
  document.getElementById('s-meta').textContent = s.school || '';
  document.getElementById('s-badges').innerHTML = [
    s.grade        && `<span class="hbadge">${esc(s.grade)}</span>`,
    s.classroom    && `<span class="hbadge">ห้อง ${esc(s.classroom)}</span>`,
    s.studentCode  && `<span class="hbadge">รหัส ${esc(s.studentCode)}</span>`,
    s.academicYear && `<span class="hbadge">ปีการศึกษา ${esc(s.academicYear)}</span>`
  ].filter(Boolean).join('');
  document.getElementById('student-header').style.display = 'flex';
}

function termLabel(key) {
  const [year, term] = key.split('|');
  return term && term !== '0' ? `ปีการศึกษา ${year} ภาคเรียน ${term}` : `ปีการศึกษา ${year}`;
}

// แสดงผลเทอมที่เลือก
function renderTerm(termKey, subjects, aggregates) {
  document.getElementById('term-label').textContent = termLabel(termKey);

  const labels  = subjects.map(r => r.subject);
  const myVals  = subjects.map(r => r.myData.score ?? 0);
  const avgVals = subjects.map(r => (Array.isArray(r.classStats) ? r.classStats[0] : r.classStats)?.mean ?? 0);
  const pctVals = subjects.map(r => r.myData.percentile ?? 0);

  // Score cards
  document.getElementById('score-cards').innerHTML = subjects.map(r => {
    const score    = r.myData.score ?? null;
    const pct      = r.myData.percentile ?? null;
    const stats    = Array.isArray(r.classStats) ? r.classStats[0] : r.classStats;
    const fs       = stats?.fullScore ?? 100;
    const rank     = r.ranks?.['_'];
    const total    = r.total;
    const pctPct   = score != null ? Math.round(score / fs * 100) : 0;
    const cls      = pctPct >= 80 ? 'good' : pctPct >= 60 ? 'ok' : 'poor';
    const clr      = pctPct >= 80 ? '#22c55e' : pctPct >= 60 ? '#f59e0b' : '#ef4444';
    const pctClass = pct >= 75 ? 'top' : pct >= 40 ? 'mid' : 'low';
    const rankIcon = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '';
    return `<div class="score-card ${cls}">
      <div class="subj" onclick="location.href='subject-progress.html?subject='+encodeURIComponent('${r.subject}')" title="ดูความก้าวหน้า ${esc(r.subject)}">${esc(r.subject)} 📈</div>
      <div>
        <span class="big" style="color:${clr}">${score ?? '—'}</span>
        <span class="fs"> / ${fs}</span>
      </div>
      <div class="pct-row">
        <span>เฉลี่ย ${stats?.mean ?? '—'}</span>
        ${pct != null ? `<span class="pct-pill ${pctClass}">P${pct}</span>` : ''}
      </div>
      ${(stats?.max != null || stats?.min != null) ? `
      <div class="minmax-row">
        <span>สูงสุด <b class="mx">${stats.max ?? '—'}</b></span>
        <span>ต่ำสุด <b class="mn">${stats.min ?? '—'}</b></span>
      </div>` : ''}
      ${rank != null ? `<div style="font-size:12px;color:#64748b;margin-top:4px">${rankIcon} อันดับ <b>${rank}</b> / ${total}</div>` : ''}
      <div class="bar-wrap">
        <div class="bar-fill" style="width:${pctPct}%;background:${clr}"></div>
      </div>
    </div>`;
  }).join('');

  renderBarChart(labels, myVals, avgVals);
  renderRadarChart(labels, myVals, avgVals);
}

function renderBarChart(labels, myVals, avgVals) {
  if (barChart) { barChart.destroy(); barChart = null; }
  barChart = new Chart(document.getElementById('bar-chart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'คะแนนของฉัน', data: myVals,  backgroundColor: 'rgba(59,130,246,.8)',  borderRadius: 4 },
        { label: 'เฉลี่ยห้อง',   data: avgVals, backgroundColor: 'rgba(203,213,225,.8)', borderRadius: 4 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: { legend: { labels: { font: { family: 'inherit', size: 12 } } } },
      scales: {
        y: { min: 0, max: 100, ticks: { font: { family: 'inherit' } } },
        x: { ticks: { font: { family: 'inherit', size: 10 }, maxRotation: 45 } }
      }
    }
  });
}

function renderRadarChart(labels, myVals, avgVals) {
  if (radarChart) { radarChart.destroy(); radarChart = null; }
  const card = document.getElementById('radar-wrap');
  if (labels.length < 3) { card.style.display = 'none'; return; }
  card.style.display = '';
  radarChart = new Chart(document.getElementById('radar-chart'), {
    type: 'radar',
    data: {
      labels,
      datasets: [
        {
          label: 'คะแนนของฉัน',
          data: myVals,
          backgroundColor: 'rgba(59,130,246,.15)',
          borderColor: '#3b82f6',
          borderWidth: 2,
          pointBackgroundColor: '#3b82f6',
          pointRadius: 4
        },
        {
          label: 'เฉลี่ยห้อง',
          data: avgVals,
          backgroundColor: 'rgba(203,213,225,.1)',
          borderColor: '#94a3b8',
          borderWidth: 1.5,
          borderDash: [4, 3],
          pointBackgroundColor: '#94a3b8',
          pointRadius: 3
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: { legend: { labels: { font: { family: 'inherit', size: 11 } } } },
      scales: {
        r: {
          min: 0, max: 100,
          ticks: { stepSize: 25, font: { family: 'inherit', size: 10 }, backdropColor: 'transparent' },
          pointLabels: { font: { family: 'inherit', size: 11 } }
        }
      }
    }
  });
}


function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function logout() {
  await fetch('/api/logout', { method: 'POST', credentials: 'include' });
  window.location.href = 'login.html';
}

init();
</script>
</body>
</html>
