<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สอบแข่งขัน</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" defer></script>

</head>
<body>
  <div id="app" class="container">
    <h1>สอบแข่งขัน</h1>
    <div id="question-container"></div>

    <div id="navigation" class="mt-4">
      <button id="prev-btn" disabled>ก่อนหน้า</button>
      <span id="progress"></span>
      <button id="next-btn">ถัดไป</button>
    </div>

    <div id="submit-section" class="mt-4" style="display:none;">
      <button id="submit-btn">ส่งคำตอบทั้งหมด</button>
    </div>

    <div id="result-section" class="mt-6"></div>
  </div>

  <script>
    // 🔐 ตรวจสอบ login ก่อนใช้งาน
    const user = localStorage.getItem('user');
    if (!user) {
      alert("กรุณาเข้าสู่ระบบก่อนใช้งาน");
      window.location.href = "/login.html";
    }

    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode') || 'competitive-practice';

    let questions = [];
    let currentIndex = 0;
    let answers = [];

    async function fetchQuestions() {
      const res = await fetch(`/api/exam-set/random?mode=${mode}`);
      questions = await res.json();
      answers = new Array(questions.length).fill(null);
      renderQuestion();
      updateProgress();
    }

function renderQuestion() {
  const q = questions[currentIndex];
  const container = document.getElementById('question-container');
  container.innerHTML = `
    <div class="question-box">
      <div class="question-text">${q.textTh}</div>
      ${q.image ? `<img src="${q.image}" class="question-image">` : ''}
      <div class="answer-section">
        ${q.choices && q.choices.length ? q.choices.map((c, i) => `
          <label>
            <input type="radio" name="answer" value="${i}" ${answers[currentIndex] == i ? 'checked' : ''}>
            ${c.textTh}
          </label>
        `).join('<br>') : `
          <input type="text" id="short-answer" value="${answers[currentIndex] || ''}" placeholder="พิมพ์คำตอบ">
        `}
      </div>
    </div>
  `;

  // ⭐ ใส่ตรงนี้เพื่อให้ MathJax ประมวลผลสมการใหม่ทุกครั้ง
  if (window.MathJax) MathJax.typesetPromise();

  document.querySelectorAll('input[name="answer"]').forEach(input => {
    input.addEventListener('change', e => {
      answers[currentIndex] = parseInt(e.target.value);
    });
  });

  const shortInput = document.getElementById('short-answer');
  if (shortInput) {
    shortInput.addEventListener('input', e => {
      answers[currentIndex] = e.target.value;
    });
  }
}


    function updateProgress() {
      document.getElementById('progress').textContent = `ข้อ ${currentIndex + 1} / ${questions.length}`;
      document.getElementById('prev-btn').disabled = currentIndex === 0;
      document.getElementById('next-btn').textContent = currentIndex === questions.length - 1 ? 'เสร็จสิ้น' : 'ถัดไป';
    }

    document.getElementById('prev-btn').addEventListener('click', () => {
      if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
        updateProgress();
      }
    });

document.getElementById('next-btn').addEventListener('click', () => {
  if (currentIndex < questions.length - 1) {
    currentIndex++;
    renderQuestion();
    updateProgress();
  } else {
    const unanswered = [];
    for (let i = 0; i < answers.length; i++) {
      if (answers[i] === null || answers[i] === '') {
        unanswered.push(i + 1);
      }
    }

    if (unanswered.length > 0) {
      alert(`คุณยังไม่ได้ตอบข้อ: ${unanswered.join(', ')}\nกรุณาตอบให้ครบก่อนส่ง`);
      return;
    }

    const ok = confirm("คุณแน่ใจหรือไม่ว่าต้องการส่งคำตอบทั้งหมด?");
    if (!ok) return;

    document.getElementById('submit-section').style.display = 'block';
    document.getElementById('navigation').style.display = 'none';
  }
});


document.getElementById('submit-btn').addEventListener('click', async () => {
  const res = await fetch('/api/submit-exam', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      mode,
      questions: questions.map(q => q.id),
      answers,
    })
  });
  const result = await res.json();
  localStorage.setItem("examResult", JSON.stringify(result));
  window.location.href = "result-competitive.html";
});



    function showResult(result) {
      const box = document.getElementById('result-section');
      box.innerHTML = `
        <h2>ผลสอบ</h2>
        <p>คุณตอบถูก ${result.correctCount} / ${result.total} ข้อ</p>
        <p>ได้ ${result.score} / ${result.fullScore} คะแนน</p>
        <p>หัวข้อที่ควรทบทวน: ${result.recommendations.join(', ')}</p>
      `;
    }

    fetchQuestions();
  </script>
</body>
</html>
