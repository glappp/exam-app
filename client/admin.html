<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — คลังข้อสอบ</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .stat-strip { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 24px; }
    .stat-box { background:#fff; border-radius:10px; padding:18px; text-align:center; box-shadow:var(--shadow); }
    .stat-num  { font-size:28px; font-weight:800; color:var(--navy); }
    .stat-lbl  { font-size:12px; color:var(--muted); margin-top:3px; }

    .tabs { display:flex; gap:4px; margin-bottom:16px; flex-wrap:wrap; }
    .tab-btn {
      padding:8px 18px; border:1.5px solid var(--border); border-radius:7px;
      background:#fff; font-size:13px; font-weight:600; cursor:pointer; color:var(--muted);
    }
    .tab-btn.active { background:var(--navy); color:#fff; border-color:var(--navy); }

    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    .role-sel {
      padding:4px 8px; border:1px solid var(--border); border-radius:5px;
      font-size:12px; cursor:pointer; background:#fff;
    }
    .role-sel:focus { outline:none; border-color:var(--blue); }

    .pct-bar { height:6px; background:#f0f0f0; border-radius:3px; overflow:hidden; display:inline-block; width:60px; vertical-align:middle; }
    .pct-fill { height:100%; border-radius:3px; background:var(--blue); }

    .bp-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid #f0f0f0; font-size:13px; }
    .bp-row:last-child { border-bottom:none; }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="topbar-title">Admin Panel</span>
    <div class="topbar-nav">
      <a href="dashboard.html">หน้าหลัก</a>
      <a href="list-questions.html">โจทย์</a>
      <a href="attribute-dict.html">Dict</a>
      <a href="ai-generate.html">AI โจทย์</a>
      <a href="#" onclick="logout()">ออกจากระบบ</a>
    </div>
  </div>

  <div class="page-wide">
    <div class="stat-strip" id="stat-strip">
      <div class="stat-box"><div class="stat-num" id="s-users">—</div><div class="stat-lbl">ผู้ใช้ทั้งหมด</div></div>
      <div class="stat-box"><div class="stat-num" id="s-questions">—</div><div class="stat-lbl">โจทย์ทั้งหมด</div></div>
      <div class="stat-box"><div class="stat-num" id="s-results">—</div><div class="stat-lbl">ครั้งที่สอบ</div></div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('users')">ผู้ใช้</button>
      <button class="tab-btn" onclick="switchTab('results')">ผลการสอบ</button>
      <button class="tab-btn" onclick="switchTab('announce')">ประกาศ</button>
      <button class="tab-btn" onclick="switchTab('mock')">Mock Blueprint</button>
    </div>

    <!-- Users tab -->
    <div class="tab-panel active card" id="tab-users">
      <div id="users-content"><div style="color:var(--muted);font-size:13px">กำลังโหลด...</div></div>
    </div>

    <!-- Results tab -->
    <div class="tab-panel card" id="tab-results">
      <div id="results-content"><div style="color:var(--muted);font-size:13px">กำลังโหลด...</div></div>
    </div>

    <!-- Announce tab -->
    <div class="tab-panel card" id="tab-announce">
      <div style="max-width:520px">
        <div class="card-title">สร้างประกาศใหม่</div>
        <div class="form-group" style="margin-bottom:10px">
          <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">หัวข้อ</label>
          <input type="text" id="ann-form-title" placeholder="หัวข้อประกาศ" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit">
        </div>
        <div class="form-group" style="margin-bottom:10px">
          <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">เนื้อหา</label>
          <textarea id="ann-form-body" rows="3" placeholder="เนื้อหาประกาศ..." style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit;resize:vertical"></textarea>
        </div>
        <div style="display:flex;gap:10px;margin-bottom:14px">
          <div style="flex:1">
            <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">ส่งถึง</label>
            <select id="ann-form-role" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit">
              <option value="">ทุกคน</option>
              <option value="student">นักเรียนเท่านั้น</option>
              <option value="teacher">ครูเท่านั้น</option>
            </select>
          </div>
          <div style="flex:1">
            <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">หมดอายุ (ไม่บังคับ)</label>
            <input type="date" id="ann-form-expires" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit">
          </div>
        </div>
        <button class="btn btn-primary" onclick="createAnn()">ส่งประกาศ</button>
        <div id="ann-form-msg" style="margin-top:8px;font-size:13px"></div>
      </div>
      <hr style="margin:20px 0;border:none;border-top:1px solid #f0f0f0">
      <div class="card-title">ประกาศที่ใช้งานอยู่</div>
      <div id="ann-list"><div style="color:var(--muted);font-size:13px">กำลังโหลด...</div></div>
    </div>

    <!-- Mock Blueprint tab -->
    <div class="tab-panel card" id="tab-mock">
      <div style="max-width:560px">
        <div class="card-title">สร้าง Mock Blueprint</div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
          <div>
            <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">ชื่อชุดสอบ</label>
            <input type="text" id="bp-name" placeholder="เช่น สอบเข้า ม.1 ร.ร. ก." style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit">
          </div>
          <div>
            <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">ระดับชั้น</label>
            <input type="text" id="bp-grade" placeholder="เช่น p6, m1" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit">
          </div>
          <div>
            <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">จำนวนข้อ</label>
            <input type="number" id="bp-total" value="40" min="1" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit">
          </div>
          <div>
            <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">เวลา (นาที)</label>
            <input type="number" id="bp-time" value="60" min="1" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit">
          </div>
          <div>
            <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">คะแนนเฉลี่ยผู้ผ่าน</label>
            <input type="number" id="bp-avgpass" placeholder="เช่น 28.5" step="0.1" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit">
          </div>
        </div>

        <div style="margin-bottom:10px">
          <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">สัดส่วน difficulty (%easy / %medium / %hard)</label>
          <div style="display:flex;gap:8px">
            <input type="number" id="bp-easy" value="30" min="0" max="100" placeholder="easy%" style="flex:1;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit">
            <input type="number" id="bp-med"  value="50" min="0" max="100" placeholder="medium%" style="flex:1;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit">
            <input type="number" id="bp-hard" value="20" min="0" max="100" placeholder="hard%" style="flex:1;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit">
          </div>
        </div>

        <div style="margin-bottom:14px">
          <label style="font-size:12px;color:#666;display:block;margin-bottom:6px">หัวข้อ (tag : จำนวนข้อ)</label>
          <div id="topic-rows"></div>
          <button class="btn btn-ghost" style="margin-top:8px;font-size:12px" onclick="addTopicRow()">+ เพิ่มหัวข้อ</button>
        </div>

        <button class="btn btn-primary" onclick="createBlueprint()">บันทึก Blueprint</button>
        <div id="bp-msg" style="margin-top:8px;font-size:13px"></div>
      </div>

      <hr style="margin:20px 0;border:none;border-top:1px solid #f0f0f0">
      <div class="card-title">Blueprint ที่มีอยู่</div>
      <div id="bp-list-admin"><div style="color:var(--muted);font-size:13px">กำลังโหลด...</div></div>
    </div>
  </div>

  <script>
    const TABS = ['users','results','announce','mock'];
    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', TABS[i] === name));
      document.querySelectorAll('.tab-panel').forEach((p,i) => p.classList.toggle('active', `tab-${TABS[i]}` === `tab-${name}`));
      if (name === 'announce') loadAnnList();
      if (name === 'mock') loadBlueprintList();
    }

    // ---- Announcements ----
    async function createAnn() {
      const title = document.getElementById('ann-form-title').value.trim();
      const body = document.getElementById('ann-form-body').value.trim();
      const targetRole = document.getElementById('ann-form-role').value;
      const expiresAt = document.getElementById('ann-form-expires').value;
      const msg = document.getElementById('ann-form-msg');
      if (!title || !body) { msg.style.color='#dc2626'; msg.textContent='กรุณากรอกหัวข้อและเนื้อหา'; return; }
      const r = await fetch('/api/announcements', {
        method:'POST', credentials:'include',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ title, body, targetRole: targetRole || null, expiresAt: expiresAt || null })
      });
      const d = await r.json();
      if (d.success) {
        msg.style.color='#16a34a'; msg.textContent='ส่งประกาศสำเร็จ';
        document.getElementById('ann-form-title').value = '';
        document.getElementById('ann-form-body').value = '';
        loadAnnList();
        setTimeout(() => msg.textContent = '', 3000);
      } else {
        msg.style.color='#dc2626'; msg.textContent=d.error;
      }
    }

    async function loadAnnList() {
      const el = document.getElementById('ann-list');
      const r = await fetch('/api/announcements', { credentials:'include' });
      if (!r.ok) { el.innerHTML = '<p style="color:#aaa;font-size:13px">โหลดไม่ได้</p>'; return; }
      const { announcements } = await r.json();
      if (!announcements.length) { el.innerHTML = '<p style="color:#aaa;font-size:13px">ไม่มีประกาศ</p>'; return; }
      el.innerHTML = announcements.map(a => `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f0f0f0">
          <div>
            <div style="font-weight:600;font-size:13px">${a.title}</div>
            <div style="font-size:12px;color:#666;margin-top:2px">${a.body.substring(0,80)}${a.body.length>80?'...':''}</div>
            <div style="font-size:11px;color:#aaa;margin-top:3px">${new Date(a.createdAt).toLocaleDateString('th-TH')}</div>
          </div>
          <button onclick="deleteAnn(${a.id},this)" style="padding:4px 12px;background:#fee2e2;color:#dc2626;border:none;border-radius:5px;font-size:12px;cursor:pointer">ลบ</button>
        </div>`).join('');
    }

    async function deleteAnn(id, btn) {
      btn.disabled = true;
      await fetch(`/api/announcements/${id}`, { method:'DELETE', credentials:'include' });
      loadAnnList();
    }

    // ---- Mock Blueprints ----
    function addTopicRow(tag = '', count = '') {
      const div = document.createElement('div');
      div.style.cssText = 'display:flex;gap:8px;margin-bottom:6px;align-items:center';
      div.innerHTML = `
        <input type="text" class="bp-tag-input" value="${tag}" placeholder="tag เช่น topic:fraction" style="flex:2;padding:6px 8px;border:1px solid #ddd;border-radius:5px;font-size:12px;font-family:inherit">
        <input type="number" class="bp-count-input" value="${count}" placeholder="จำนวน" min="1" style="flex:1;padding:6px 8px;border:1px solid #ddd;border-radius:5px;font-size:12px;font-family:inherit">
        <button onclick="this.parentElement.remove()" style="padding:4px 8px;background:#fee2e2;color:#dc2626;border:none;border-radius:5px;font-size:12px;cursor:pointer">✕</button>
      `;
      document.getElementById('topic-rows').appendChild(div);
    }

    async function createBlueprint() {
      const name = document.getElementById('bp-name').value.trim();
      const grade = document.getElementById('bp-grade').value.trim();
      const totalQuestions = parseInt(document.getElementById('bp-total').value) || 40;
      const timeLimitSec = (parseInt(document.getElementById('bp-time').value) || 60) * 60;
      const avgPassScore = parseFloat(document.getElementById('bp-avgpass').value);
      const easy = parseInt(document.getElementById('bp-easy').value) || 30;
      const med  = parseInt(document.getElementById('bp-med').value)  || 50;
      const hard = parseInt(document.getElementById('bp-hard').value) || 20;
      const msg = document.getElementById('bp-msg');

      const tagInputs   = document.querySelectorAll('.bp-tag-input');
      const countInputs = document.querySelectorAll('.bp-count-input');
      const topics = [];
      tagInputs.forEach((t, i) => {
        const tag = t.value.trim();
        const count = parseInt(countInputs[i].value);
        if (tag && count > 0) topics.push({ tag, count });
      });

      if (!name || !grade || isNaN(avgPassScore) || !topics.length) {
        msg.style.color = '#dc2626';
        msg.textContent = 'กรอกข้อมูลไม่ครบ (ชื่อ / ชั้น / คะแนนเฉลี่ย / หัวข้ออย่างน้อย 1 รายการ)';
        return;
      }

      const r = await fetch('/api/mock/blueprints', {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, grade, timeLimitSec, totalQuestions, avgPassScore, topics, difficulty: { easy, medium: med, hard } })
      });
      const d = await r.json();
      if (d.success) {
        msg.style.color = '#16a34a';
        msg.textContent = 'บันทึก Blueprint สำเร็จ';
        document.getElementById('topic-rows').innerHTML = '';
        ['bp-name','bp-grade','bp-avgpass'].forEach(id => document.getElementById(id).value = '');
        addTopicRow();
        loadBlueprintList();
        setTimeout(() => msg.textContent = '', 3000);
      } else {
        msg.style.color = '#dc2626';
        msg.textContent = d.error || 'เกิดข้อผิดพลาด';
      }
    }

    async function loadBlueprintList() {
      const el = document.getElementById('bp-list-admin');
      const r = await fetch('/api/mock/blueprints', { credentials: 'include' });
      if (!r.ok) { el.innerHTML = '<p style="color:#aaa;font-size:13px">โหลดไม่ได้</p>'; return; }
      const { blueprints } = await r.json();
      if (!blueprints.length) { el.innerHTML = '<p style="color:#aaa;font-size:13px">ยังไม่มี Blueprint</p>'; return; }

      el.innerHTML = blueprints.map(bp => {
        const topicSummary = (bp.topics || []).map(t => `${t.tag.replace(/^[^:]+:/,'')}(${t.count})`).join(', ');
        return `<div class="bp-row">
          <div>
            <div style="font-weight:600">${bp.name}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">${bp.grade} · ${bp.totalQuestions} ข้อ · ${Math.round(bp.timeLimitSec/60)} นาที · ผ่าน ${bp.avgPassScore}</div>
            <div style="font-size:11px;color:#6b7280;margin-top:2px">${topicSummary}</div>
          </div>
          <button onclick="deleteBlueprint(${bp.id}, this)" style="padding:4px 12px;background:#fee2e2;color:#dc2626;border:none;border-radius:5px;font-size:12px;cursor:pointer">ลบ</button>
        </div>`;
      }).join('');
    }

    async function deleteBlueprint(id, btn) {
      if (!confirm('ลบ Blueprint นี้ใช่ไหม?')) return;
      btn.disabled = true;
      await fetch(`/api/mock/blueprints/${id}`, { method: 'DELETE', credentials: 'include' });
      loadBlueprintList();
    }

    // ---- Stats / Users / Results ----
    async function loadStats() {
      const r = await fetch('/api/admin/stats', { credentials:'include' });
      if (!r.ok) { location.href = 'dashboard.html'; return; }
      const d = await r.json();
      document.getElementById('s-users').textContent     = d.userCount;
      document.getElementById('s-questions').textContent = d.questionCount;
      document.getElementById('s-results').textContent   = d.resultCount;
    }

    async function loadUsers() {
      const r = await fetch('/api/admin/users', { credentials:'include' });
      const d = await r.json();
      const el = document.getElementById('users-content');
      if (!d.users?.length) { el.innerHTML = '<p style="color:var(--muted);font-size:13px">ไม่มีผู้ใช้</p>'; return; }

      const rows = d.users.map(u => {
        const p = u.studentProfiles?.[0];
        const examCount = p?._count?.examResults ?? '—';
        const roleColors = { admin:'badge-error', teacher:'badge-info', student:'badge-success' };
        return `<tr>
          <td>${u.id}</td>
          <td><strong>${u.firstName} ${u.lastName}</strong><br><span class="text-small text-muted">@${u.username}</span></td>
          <td>${u.email}</td>
          <td><span class="badge ${roleColors[u.role] || 'badge-warn'}">${u.role}</span></td>
          <td>${p ? `${p.grade} • ${p.school}` : '—'}</td>
          <td>${examCount}</td>
          <td>
            <select class="role-sel" onchange="changeRole(${u.id}, this.value)">
              ${['student','teacher','admin'].map(r => `<option value="${r}" ${r===u.role?'selected':''}>${r}</option>`).join('')}
            </select>
          </td>
        </tr>`;
      }).join('');

      el.innerHTML = `<div style="overflow-x:auto">
        <table class="table">
          <thead><tr>
            <th>ID</th><th>ชื่อ</th><th>Email</th><th>Role</th><th>โปรไฟล์</th><th>ครั้งที่สอบ</th><th>เปลี่ยน Role</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }

    async function loadResults() {
      const r = await fetch('/api/admin/results', { credentials:'include' });
      const d = await r.json();
      const el = document.getElementById('results-content');
      if (!d.results?.length) { el.innerHTML = '<p style="color:var(--muted);font-size:13px">ยังไม่มีผลสอบ</p>'; return; }

      const modeClass = { practice:'badge-success', competitive:'badge-warn', adaptive:'badge-info', official:'badge-error', mock:'badge-warn' };
      const rows = d.results.map(r => {
        const u = r.studentProfile?.user;
        const pct = r.total ? Math.round(r.score / r.total * 100) : 0;
        const date = new Date(r.createdAt).toLocaleDateString('th-TH', { day:'2-digit', month:'short', year:'2-digit', hour:'2-digit', minute:'2-digit' });
        return `<tr>
          <td>${date}</td>
          <td>${u ? `${u.firstName} ${u.lastName}` : '—'}</td>
          <td>${r.studentProfile?.grade || '—'}</td>
          <td><span class="badge ${modeClass[r.mode] || 'badge-warn'}">${r.mode}</span></td>
          <td>${r.score}/${r.total}</td>
          <td>
            <div class="pct-bar"><div class="pct-fill" style="width:${pct}%"></div></div>
            <span style="font-size:12px;margin-left:6px">${pct}%</span>
          </td>
        </tr>`;
      }).join('');

      el.innerHTML = `<div style="overflow-x:auto">
        <table class="table">
          <thead><tr>
            <th>วันที่</th><th>นักเรียน</th><th>ชั้น</th><th>โหมด</th><th>คะแนน</th><th>%</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }

    async function changeRole(userId, newRole) {
      const r = await fetch(`/api/admin/users/${userId}/role`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ role: newRole })
      });
      if (!r.ok) alert('เปลี่ยน role ไม่สำเร็จ');
    }

    function logout() {
      fetch('/api/logout', { method:'POST', credentials:'include' });
      location.href = 'login.html';
    }

    async function init() {
      const me = await fetch('/api/me', { credentials:'include' });
      if (!me.ok) { location.href = 'login.html'; return; }
      const data = await me.json();
      if (data.role !== 'admin') { alert('คุณไม่มีสิทธิ์เข้าหน้านี้'); location.href = 'dashboard.html'; return; }

      await Promise.all([loadStats(), loadUsers(), loadResults()]);
      addTopicRow();
    }

    init();
  </script>
</body>
</html>
