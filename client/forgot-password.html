<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลืมรหัสผ่าน — SchoolPL</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display:flex; flex-direction:column; min-height:100vh; background:#f0f4ff; }
    .wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:32px 16px; }
    .card { background:#fff; border-radius:14px; box-shadow:0 4px 24px rgba(0,0,0,.10); padding:32px; width:100%; max-width:400px; }
    .card h2 { font-size:17px; font-weight:700; color:var(--navy); margin-bottom:6px; }
    .card p  { font-size:13px; color:var(--muted); margin-bottom:20px; }
    .error-msg   { background:#fee2e2; color:#b91c1c; padding:10px 14px; border-radius:7px; font-size:13px; margin-bottom:14px; display:none; }
    .success-msg { background:#dcfce7; color:#166534; padding:10px 14px; border-radius:7px; font-size:13px; margin-bottom:14px; display:none; }
    .back-link { text-align:center; font-size:13px; margin-top:16px; }
    .back-link a { color:#2563eb; text-decoration:none; font-weight:600; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>ลืมรหัสผ่าน</h2>
      <p>กรอกอีเมลที่ลงทะเบียนไว้ ระบบจะส่งลิงก์รีเซ็ตรหัสผ่านให้</p>

      <div class="error-msg"   id="error-msg"></div>
      <div class="success-msg" id="success-msg"></div>

      <form id="form" novalidate>
        <div class="form-group">
          <label>อีเมล <span style="color:#b91c1c">*</span></label>
          <input type="email" id="email" placeholder="example@email.com" required autocomplete="email">
        </div>
        <button type="submit" class="btn btn-navy btn-full" id="submit-btn" style="margin-top:8px">ส่งลิงก์รีเซ็ต</button>
      </form>

      <div class="back-link">
        <a href="login.html">← กลับหน้าเข้าสู่ระบบ</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('error-msg');
      const okEl  = document.getElementById('success-msg');
      const btn   = document.getElementById('submit-btn');
      errEl.style.display = 'none';
      okEl.style.display  = 'none';

      const email = document.getElementById('email').value.trim();
      if (!email) { show('error', 'กรุณากรอกอีเมล'); return; }

      btn.disabled = true; btn.textContent = 'กำลังส่ง...';
      try {
        await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        // แสดง success เสมอ — ไม่เปิดเผยว่า email มีในระบบหรือไม่
        show('success', '✅ ถ้าอีเมลนี้มีในระบบ คุณจะได้รับลิงก์รีเซ็ตภายในไม่กี่นาที (ตรวจสอบ Spam ด้วย)');
        document.getElementById('form').style.display = 'none';
      } catch { show('error', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้'); }
      finally { btn.disabled = false; btn.textContent = 'ส่งลิงก์รีเซ็ต'; }
    });

    function show(type, msg) {
      const el = document.getElementById(type === 'error' ? 'error-msg' : 'success-msg');
      el.textContent = msg; el.style.display = 'block';
    }
  </script>
</body>
</html>
