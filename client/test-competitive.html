<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สอบแข่งขัน — SchoolPL</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" defer></script>
  <style>
    .timer { font-size: 20px; font-weight: 700; color: var(--navy); font-variant-numeric: tabular-nums; }
    .timer.warn   { color: #d97706; }
    .timer.danger { color: #dc2626; }
    .question-text { font-size: 15px; line-height: 1.7; margin-bottom: 12px; }
    .answer-section label {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 7px;
      margin-bottom: 8px; cursor: pointer; font-size: 14px; background: #fff;
      transition: border-color .1s, background .1s;
    }
    .answer-section label:hover { border-color: var(--blue); background: #eff6ff; }
    .answer-section label:has(input:checked) { border-color: var(--blue); background: #dbeafe; font-weight: 600; }
    .answer-section input[type=radio] { margin-top: 2px; flex-shrink: 0; }
    .progress-text { font-size: 13px; color: var(--muted); font-weight: 600; }

  </style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">⏱️ สอบแข่งขัน</span>
  <div class="topbar-nav">
    <span id="timer-display" class="timer" style="display:none"></span>
    <span class="progress-text" id="progress"></span>
    <button onclick="confirmExit('exam.html')" style="background:none;border:none;cursor:pointer;font-size:13px;color:#555;padding:0;font-family:inherit">← ออก</button>
  </div>
</div>

<!-- Exit Confirmation Modal -->
<div id="exit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:14px;padding:28px 32px;max-width:340px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)">
    <div style="font-size:36px;margin-bottom:10px">⚠️</div>
    <h3 style="margin:0 0 8px;font-size:17px;color:#111">ออกจากการสอบ?</h3>
    <p style="margin:0 0 22px;color:#6b7280;font-size:14px;line-height:1.5">คำตอบทั้งหมดจะหายไป<br>ไม่สามารถกลับมาต่อได้</p>
    <div style="display:flex;gap:10px;justify-content:center">
      <button onclick="doExitExam()" style="background:#dc2626;color:#fff;border:none;border-radius:8px;padding:10px 22px;font-size:14px;font-weight:600;cursor:pointer">ออกจากการสอบ</button>
      <button onclick="closeExitModal()" style="background:#f3f4f6;color:#374151;border:none;border-radius:8px;padding:10px 22px;font-size:14px;font-weight:600;cursor:pointer">สอบต่อ</button>
    </div>
  </div>
</div>

<!-- หน้าสอบ -->
<div class="page" id="exam-screen">
  <div class="exam-layout">
    <div class="question-area">
      <div id="question-container"></div>
    </div>
    <div class="nav-sidebar" id="navigation">
      <button class="btn" id="prev-btn" disabled>←</button>
      <button class="btn btn-primary" id="next-btn">→</button>
    </div>
  </div>

  <div id="submit-section" style="display:none;margin-top:16px">
    <div id="ticket-reminder" style="font-size:12px;color:#888;margin-bottom:8px;text-align:center"></div>
    <button class="btn btn-primary btn-full" id="submit-btn">ส่งคำตอบทั้งหมด</button>
  </div>

  <div id="result-section" style="margin-top:16px"></div>
</div>

<script>
  const urlParams  = new URLSearchParams(location.search);
  const mode       = urlParams.get('mode') || 'competitive';
  const grade      = urlParams.get('grade');
  const examType   = urlParams.get('examType'); // legacy
  const venue      = urlParams.get('venue') || examType; // venue ใหม่ หรือ fallback examType เดิม
  const timed      = urlParams.get('timed') === '1';

  let questions = [];
  let currentIndex = 0;
  let answers = [];
  let examStartTime = null;
  let timerInterval = null;
  // Auth check แล้วโหลดข้อสอบเลย
  (async () => {
    const res = await fetch('/api/me', { credentials: 'include' });
    if (!res.ok) { location.href = '/login.html'; return; }
    await fetchQuestions();
  })();

  async function fetchQuestions() {
    const params = new URLSearchParams({ mode });
    if (grade) params.set('grade', grade);
    if (venue) params.set('venue', venue);
    const res = await fetch(`/api/exam-set/random?${params}`, { credentials: 'include' });
    if (!res.ok) {
      document.getElementById('question-container').innerHTML =
        '<div class="card"><p style="color:#b91c1c">ไม่พบชุดข้อสอบ</p></div>';
      return;
    }
    questions = await res.json();
    answers = new Array(questions.length).fill(null);
    examStartTime = Date.now();
    if (timed) startTimer();
    renderQuestion();
    updateProgress();
  }

  function startTimer() {
    const el = document.getElementById('timer-display');
    el.style.display = 'inline';
    timerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - examStartTime) / 1000);
      const mm = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const ss = String(elapsed % 60).padStart(2, '0');
      el.textContent = `${mm}:${ss}`;
    }, 1000);
  }

  function _renderBlock(block) {
    if (block.type === 'text') {
      return `<div class="qb-text">${(block.value || '').replace(/\n/g, '<br>')}</div>`;
    }
    if (block.type === 'image') {
      const src = /^https?:\/\//.test(block.url || '') || (block.url || '').startsWith('/') ? block.url : `/uploads/${block.url}`;
      return `<div class="qb-img"><img src="${src}" onclick="openLightbox && openLightbox(this)" style="max-width:min(100%,420px);max-height:300px;border-radius:8px;object-fit:contain;cursor:zoom-in"></div>`;
    }
    return '';
  }
  function renderQuestionBody(q) {
    if (q.content && Array.isArray(q.content)) {
      return q.content.map(block => {
        if (block.type === 'hint') {
          const inner = (block.content || []).map(_renderBlock).join('');
          return `<details class="qb-hint"><summary>${block.label || 'ความรู้เพิ่มเติม'}</summary><div class="qb-hint-body">${inner}</div></details>`;
        }
        return _renderBlock(block);
      }).join('');
    }
    const lang = typeof currentLang !== 'undefined' ? currentLang : 'th';
    const text = lang === 'th' ? (q.textTh || q.text || '') : (q.textEn || q.text || '');
    let html = `<div class="qb-text">${text.replace(/\n/g, '<br>')}</div>`;
    if (q.image) {
      const src = /^https?:\/\//.test(q.image) || q.image.startsWith('/') ? q.image : `/uploads/${q.image}`;
      html += `<div class="qb-img"><img src="${src}" onclick="openLightbox && openLightbox(this)" style="max-width:min(100%,420px);max-height:300px;border-radius:8px;object-fit:contain;cursor:zoom-in"></div>`;
    }
    return html;
  }

  function renderQuestion() {
    const q = questions[currentIndex];
    document.getElementById('question-container').innerHTML = `
      <div class="card">
        <div style="font-size:12px;color:var(--muted);margin-bottom:10px">ข้อที่ ${currentIndex + 1} / ${questions.length}</div>
        <div class="qb-wrap">${renderQuestionBody(q)}</div>
        <div class="answer-section">
          ${q.choices?.length ? q.choices.map((c, i) => `
            <label>
              <input type="radio" name="answer" value="${i}" ${answers[currentIndex] === i ? 'checked' : ''}>
              ${c.image ? `<img src="/uploads/${c.image}" style="max-height:40px">` : ''}
              ${c.textTh || ''}
            </label>
          `).join('') : `
            <input type="text" id="short-answer" value="${answers[currentIndex] || ''}" placeholder="พิมพ์คำตอบ" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-size:14px;margin-top:8px">
          `}
        </div>
      </div>
    `;

    if (window.MathJax) MathJax.typesetPromise();

    document.querySelectorAll('input[name="answer"]').forEach(input => {
      input.addEventListener('change', e => { answers[currentIndex] = parseInt(e.target.value); });
    });
    const shortInput = document.getElementById('short-answer');
    if (shortInput) shortInput.addEventListener('input', e => { answers[currentIndex] = e.target.value; });
  }

  function updateProgress() {
    document.getElementById('progress').textContent = `ข้อ ${currentIndex + 1} / ${questions.length}`;
    document.getElementById('prev-btn').disabled = currentIndex === 0;
    document.getElementById('next-btn').textContent = currentIndex === questions.length - 1 ? '✔ เสร็จ' : '→';
  }

  document.getElementById('prev-btn').addEventListener('click', () => {
    if (currentIndex > 0) { currentIndex--; renderQuestion(); updateProgress(); }
  });

  document.getElementById('next-btn').addEventListener('click', () => {
    if (currentIndex < questions.length - 1) {
      currentIndex++; renderQuestion(); updateProgress();
    } else {
      const unanswered = answers.map((a, i) => (a === null || a === '') ? i + 1 : null).filter(Boolean);
      if (unanswered.length) { alert(`ยังไม่ได้ตอบข้อ: ${unanswered.join(', ')}`); return; }
      if (!confirm('ส่งคำตอบทั้งหมดใช่ไหม?')) return;
      document.getElementById('submit-section').style.display = 'block';
      document.getElementById('navigation').style.display = 'none';
    }
  });

  document.getElementById('submit-btn').addEventListener('click', async () => {
    const durationSec = examStartTime ? Math.round((Date.now() - examStartTime) / 1000) : 0;
    if (timerInterval) clearInterval(timerInterval);
    document.getElementById('submit-btn').disabled = true;
    document.getElementById('submit-btn').textContent = 'กำลังส่ง...';

    const res = await fetch('/api/submit-exam', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ mode, grade, examType, questions: questions.map(q => q.id), answers, durationSec })
    });
    const result = await res.json();

    if (!res.ok) {
      // เกิดขึ้นถ้าตั๋วหมดระหว่างรอ (edge case)
      alert(result.error || 'ส่งคำตอบไม่สำเร็จ');
      document.getElementById('submit-btn').disabled = false;
      document.getElementById('submit-btn').textContent = 'ส่งคำตอบทั้งหมด';
      return;
    }

    localStorage.setItem('examResult', JSON.stringify(result));
    location.href = '/result-competitive.html';
  });

  // ── Exit modal ──────────────────────────────────────────────────
  let _exitDest = 'exam.html';
  function confirmExit(dest) { _exitDest = dest || 'exam.html'; document.getElementById('exit-modal').style.display = 'flex'; }
  function closeExitModal() { document.getElementById('exit-modal').style.display = 'none'; }
  function doExitExam() { sessionStorage.clear(); location.href = _exitDest; }
  history.pushState(null, '', location.href);
  window.addEventListener('popstate', () => { history.pushState(null, '', location.href); confirmExit(); });
</script>
<script src="/feedback-widget.js"></script>
</body>
</html>
