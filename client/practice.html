<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ฝึกหัด — คลังข้อสอบ</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .result-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
    .result-row:last-child { border-bottom: none; }
    .result-correct { color: #16a34a; font-weight: 700; font-size: 18px; }
    .result-wrong   { color: #dc2626; font-weight: 700; font-size: 18px; }
    #question-area { margin-top: 0; }

    /* overview */
    .overview-header {
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
    }
    .overview-toggle {
      font-size: 12px; color: var(--muted); padding: 2px 8px;
      border: 1px solid var(--border); border-radius: 6px;
      background: #f9fafb; transition: background .15s;
    }
    .overview-header:hover .overview-toggle { background: #f0f0f0; }
    .overview-body-wrap { margin-top: 12px; }

    .grade-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px; flex-wrap: nowrap; overflow-x: auto;
      padding-bottom: 4px;
    }
    .grade-row::-webkit-scrollbar { height: 3px; }
    .grade-row::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 9px; }
    .grade-label {
      font-size: 12px; font-weight: 700; color: var(--muted);
      white-space: nowrap; min-width: 60px;
    }
    .topic-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 20px; font-size: 12px;
      border: 1.5px solid var(--border); background: #fff;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: border-color .15s, background .15s;
    }
    .topic-chip:hover { border-color: var(--blue); background: #eff6ff; }
    .topic-chip.passed  { border-color: #16a34a; background: #f0fdf4; color: #15803d; }
    .topic-chip.started { border-color: #f59e0b; background: #fffbeb; color: #92400e; }
    .topic-chip .chip-bar {
      width: 32px; height: 3px; background: #e5e7eb;
      border-radius: 9px; overflow: hidden;
    }
    .topic-chip .chip-bar-fill { height: 100%; border-radius: 9px; background: #3b82f6; }
    .topic-chip.passed  .chip-bar-fill { background: #16a34a; }
    .topic-chip.started .chip-bar-fill { background: #f59e0b; }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="topbar-title" id="topbar-title">📗 โหมดฝึกหัด</span>
    <div class="topbar-nav">
      <span class="topbar-user" id="greeting"></span>
      <button id="back-btn" onclick="confirmExit('dashboard.html')" style="background:none;border:none;cursor:pointer;font-size:13px;color:#555;padding:0;font-family:inherit">← ย้อนกลับ</button>
      <a href="#" onclick="logout()">ออกจากระบบ</a>
    </div>
  </div>

  <!-- Exit Confirmation Modal -->
  <div id="exit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;align-items:center;justify-content:center">
    <div style="background:#fff;border-radius:14px;padding:28px 32px;max-width:340px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)">
      <div style="font-size:36px;margin-bottom:10px">⚠️</div>
      <h3 style="margin:0 0 8px;font-size:17px;color:#111">ออกจากการฝึกหัด?</h3>
      <p style="margin:0 0 22px;color:#6b7280;font-size:14px;line-height:1.5">ความคืบหน้าในเซสชันนี้จะหายไป</p>
      <div style="display:flex;gap:10px;justify-content:center">
        <button onclick="doExitExam()" style="background:#dc2626;color:#fff;border:none;border-radius:8px;padding:10px 22px;font-size:14px;font-weight:600;cursor:pointer">ออก</button>
        <button onclick="closeExitModal()" style="background:#f3f4f6;color:#374151;border:none;border-radius:8px;padding:10px 22px;font-size:14px;font-weight:600;cursor:pointer">ฝึกต่อ</button>
      </div>
    </div>
  </div>

  <div class="page">
    <!-- topic overview (แสดงเฉพาะ mode ปกติ) -->
    <div id="overview-panel" class="card" style="display:none">
      <div class="overview-header" onclick="toggleOverview()">
        <span class="card-title" style="margin:0">ภาพรวมหัวข้อ</span>
        <span class="overview-toggle" id="overview-toggle-btn">ซ่อน ▲</span>
      </div>
      <div id="overview-body" class="overview-body-wrap">
        <p style="color:var(--muted);font-size:13px">กำลังโหลด...</p>
      </div>
    </div>

    <!-- adaptive banner -->
    <div id="adaptive-banner" style="display:none;background:#dbeafe;border:1px solid #93c5fd;border-radius:10px;padding:14px 18px;margin-bottom:16px">
      <div style="font-weight:700;color:#1e40af;font-size:14px">🎯 โหมดปรับจุดอ่อน</div>
      <div id="adaptive-desc" style="font-size:13px;color:#1e3a8a;margin-top:4px">กำลังวิเคราะห์จุดอ่อน...</div>
    </div>

    <!-- targeted banner -->
    <div id="targeted-banner" style="display:none;background:#fef9c3;border:1px solid #fde047;border-radius:10px;padding:14px 18px;margin-bottom:16px">
      <div style="font-weight:700;color:#854d0e;font-size:14px">🔧 ซ่อมจุดอ่อน</div>
      <div style="font-size:13px;color:#713f12;margin-top:4px">หัวข้อ: <strong id="targeted-tag-label"></strong> — ตอบถูกให้ครบ 10 ข้อ</div>
    </div>

    <!-- เลือกหัวข้อ + เริ่ม -->
    <div class="card" id="setup-panel">
      <div class="card-title" id="setup-title">เลือกหัวข้อที่ต้องการฝึก</div>

      <div class="form-row" style="margin-bottom:14px" id="chapter-group">
        <div class="form-group">
          <label>ระดับชั้น</label>
          <select id="grade" onchange="onGradeChange(this.value)">
            <option value="">-- เลือกชั้น --</option>
            <option value="p4">ป.4</option>
            <option value="p5">ป.5</option>
            <option value="p6">ป.6</option>
          </select>
        </div>
        <div class="form-group">
          <label>หัวข้อหลัก</label>
          <select id="chapter" disabled onchange="onTopicChange(document.getElementById('grade').value, this.value)">
            <option value="">-- เลือกชั้นก่อน --</option>
          </select>
        </div>
        <div class="form-group">
          <label>หัวข้อย่อย</label>
          <select id="subtopic" disabled onchange="updateTestBtn()">
            <option value="">ทั้งหมด</option>
          </select>
        </div>
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px">
        <button class="btn btn-primary" id="practice-btn" onclick="startExam('practice')">ฝึก</button>
        <button class="btn btn-outline" id="test-btn" onclick="startExam('test')" disabled title="กรุณาเลือกหัวข้อก่อน">สอบ (10 ข้อ)</button>
      </div>
    </div>

    <!-- โจทย์ -->
    <div id="question-area"></div>

    <!-- ผลลัพธ์ + วิเคราะห์ -->
    <div id="results"></div>
    <div id="analysis"></div>
  </div>

  <script src="topicMap.js"></script>
  <script src="script.js"></script>
  <script>
    let currentPasses = { subtopic: {}, topic: {} };
    let currentStats  = {};

    (async () => {
      const res = await fetch('/api/me', { credentials: 'include' });
      if (!res.ok) { location.href = 'login.html'; return; }
      const me = await res.json();
      document.getElementById('greeting').textContent = `สวัสดี, ${me.firstName || me.username}`;

      const params = new URLSearchParams(location.search);
      if (!params.get('mode') && !params.get('topic')) {
        loadOverview();
      }
    })();

    async function loadOverview() {
      const panel = document.getElementById('overview-panel');
      panel.style.display = '';
      try {
        const res = await fetch('/api/student/topic-stats', { credentials: 'include' });
        const data = await res.json();
        currentStats  = data.stats  || {};
        currentPasses = data.passes || { subtopic: {}, topic: {} };
        renderOverview(currentStats, currentPasses);
      } catch {
        document.getElementById('overview-body').innerHTML =
          '<p style="color:var(--muted);font-size:13px">โหลดข้อมูลไม่สำเร็จ</p>';
      }
    }

    function renderOverview(stats, passes) {
      const grades = ['p4', 'p5', 'p6'];
      const gradeNames = { p4: 'ป.4', p5: 'ป.5', p6: 'ป.6' };
      let html = '';

      for (const grade of grades) {
        const topics = gradeTopics[grade] || [];
        if (!topics.length) continue;
        const gradeStats = stats[grade] || {};

        // นับ subtopic ผ่าน (จาก SubtopicPass table)
        let totalSubs = 0, passedSubs = 0;
        for (const t of topics) {
          const subs = (gradeTopicSubtopics[grade] || {})[t.key] || [];
          totalSubs += subs.length;
          passedSubs += subs.filter(s => passes.subtopic[`${grade}|${t.key}|${s.key}`]).length;
        }

        html += `<div class="grade-row">
          <span class="grade-label">${gradeNames[grade]}<br>
            <span style="font-weight:400;font-size:11px">${passedSubs}/${totalSubs}</span>
          </span>`;

        for (const t of topics) {
          const topicSubs     = (gradeTopicSubtopics[grade] || {})[t.key] || [];
          const topicSubStats = gradeStats[t.key] || {};
          const subTotal  = topicSubs.length;
          const subPassed = topicSubs.filter(s => passes.subtopic[`${grade}|${t.key}|${s.key}`]).length;
          const topicPassed   = passes.topic[`${grade}|${t.key}`] || false;
          const anyStarted    = topicSubs.some(s => topicSubStats[s.key]?.attempted > 0);
          const avgAcc = topicSubs.reduce((sum, s) => sum + (topicSubStats[s.key]?.accuracy || 0), 0) / (subTotal || 1);
          const accPct = Math.round(avgAcc * 100);

          // สีชิป: เขียว=ผ่าน topic, ส้ม=เริ่มแล้ว, ขาว=ยังไม่เริ่ม
          const stateClass = topicPassed ? 'passed' : anyStarted ? 'started' : '';
          const icon = topicPassed ? '✅' : anyStarted ? '🔶' : '⬜';
          const tip  = topicPassed ? 'ผ่าน topic แล้ว' : `${subPassed}/${subTotal} subtopic ผ่าน`;

          html += `<span class="topic-chip ${stateClass}" onclick="quickStart('${grade}','${t.key}')"
              title="${tip}">
            ${icon} ${t.label}
            ${subTotal > 0 ? `<small style="opacity:.65">${subPassed}/${subTotal}</small>` : ''}
            <span class="chip-bar"><span class="chip-bar-fill" style="width:${accPct}%"></span></span>
          </span>`;
        }
        html += '</div>';
      }

      document.getElementById('overview-body').innerHTML = html ||
        '<p style="color:var(--muted);font-size:13px">ยังไม่มีข้อมูล</p>';
    }

    function toggleOverview() {
      const body = document.getElementById('overview-body');
      const btn  = document.getElementById('overview-toggle-btn');
      const hidden = body.style.display === 'none';
      body.style.display = hidden ? '' : 'none';
      btn.textContent = hidden ? 'ซ่อน ▲' : 'แสดง ▼';
    }

    // อัปเดตสถานะปุ่มสอบตาม dropdown ที่เลือก
    function updateTestBtn() {
      const grade      = document.getElementById('grade')?.value || '';
      const topicKey   = document.getElementById('chapter')?.value || '';
      const subtopicKey = document.getElementById('subtopic')?.value || '';
      const btn = document.getElementById('test-btn');
      if (!btn) return;

      if (!grade || !topicKey) {
        btn.disabled = true;
        btn.title = 'กรุณาเลือกหัวข้อก่อน';
        btn.textContent = 'สอบ (10 ข้อ)';
        return;
      }

      if (subtopicKey) {
        // สอบ subtopic: พร้อมเสมอ
        btn.disabled = false;
        btn.title = 'สอบ subtopic นี้ — ต้องได้ 8/10';
        btn.textContent = 'สอบ subtopic (10 ข้อ)';
      } else {
        // สอบ topic: ต้องผ่านทุก subtopic ก่อน
        const subs = (gradeTopicSubtopics[grade] || {})[topicKey] || [];
        const allSubsPassed = subs.length > 0 &&
          subs.every(s => currentPasses.subtopic[`${grade}|${topicKey}|${s.key}`]);

        btn.disabled = !allSubsPassed;
        btn.title = allSubsPassed
          ? 'สอบ topic นี้ — ต้องได้ 8/10'
          : `ผ่านทุก subtopic ก่อน (${subs.filter(s => currentPasses.subtopic[`${grade}|${topicKey}|${s.key}`]).length}/${subs.length})`;
        btn.textContent = 'สอบ topic (10 ข้อ)';
      }
    }

    // คลิก chip → เซต grade/topic แล้ว scroll ลงไปที่ setup panel
    function quickStart(grade, topicKey, subtopicKey) {
      document.getElementById('grade').value = grade;
      onGradeChange(grade);
      document.getElementById('chapter').value = topicKey;
      onTopicChange(grade, topicKey);
      if (subtopicKey) document.getElementById('subtopic').value = subtopicKey;
      updateTestBtn();
      document.getElementById('setup-panel').scrollIntoView({ behavior: 'smooth' });
    }

  // ── Exit modal ──────────────────────────────────────────────────
  let _exitDest = 'dashboard.html';
  function confirmExit(dest) {
    // ถ้าไม่ได้เริ่มทำข้อสอบ (ยังอยู่หน้า overview) ออกเลยไม่ต้อง confirm
    const examScreen = document.getElementById('exam-screen');
    if (!examScreen || examScreen.style.display === 'none') { location.href = dest || _exitDest; return; }
    _exitDest = dest || 'dashboard.html';
    document.getElementById('exit-modal').style.display = 'flex';
  }
  function closeExitModal() { document.getElementById('exit-modal').style.display = 'none'; }
  function doExitExam() { sessionStorage.clear(); location.href = _exitDest; }
  history.pushState(null, '', location.href);
  window.addEventListener('popstate', () => { history.pushState(null, '', location.href); confirmExit(); });
  </script>
</body>
</html>
