<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Practice Mode</title>
</head>
<body>
  <h2>📚 ฝึกทำข้อสอบ (Practice Mode)</h2>

  <div>
    <label>🌐 ภาษา (Language):
      <select id="language" onchange="changeLang(this.value)">
        <option value="th">🇹🇭 ไทย</option>
        <option value="en">🇬🇧 English</option>
      </select>
    </label>
  </div>

  <label>เลือกหัวข้อ: 
    <select id="chapter">
      <option>บวก</option>
      <option>ลบ</option>
      <option>คูณ</option>
      <option>หาร</option>
      <option>เศษส่วน</option>
      <option>สมการ</option>
      <option>พื้นที่</option>
    </select>
  </label>
  <button onclick="startExam()">เริ่มทำข้อสอบ</button>
  <button onclick="logout()">ออกจากระบบ</button>

  <div id="question-area"></div>
  <div id="explanation" style="margin-top: 1em;"></div>
  <div id="results"></div>
  <div id="analysis"></div>

  <!-- 🔄 โหลด dependency -->
  <script>

    function changeLang(lang) {
      currentLang = lang;
      // หากต้องการ refresh โจทย์ทันทีเมื่อเปลี่ยนภาษา:
      if (typeof renderCurrentQuestion === "function") renderCurrentQuestion();
    }
  </script>

  <script src="topicMap.js"></script>
  <script src="script.js"></script>
  <script>
  // ตรวจสอบว่า login อยู่หรือไม่
  const user = JSON.parse(localStorage.getItem("user"));
  if (!user) {
    alert("กรุณาเข้าสู่ระบบก่อนใช้งาน");
    window.location.href = "login.html";
  }

  function logout() {
    localStorage.removeItem("user");
    window.location.href = "login.html";
  }

  // ใช้ชื่อผู้ใช้งานในการแสดงผล (ถ้าต้องการ)
  document.addEventListener("DOMContentLoaded", () => {
    const greeting = document.createElement("p");
    greeting.innerHTML = `👋 สวัสดี, ${user.firstName || user.username}`;
    document.body.insertBefore(greeting, document.body.firstChild);
  });
</script>

</body>
</html>
