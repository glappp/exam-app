<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard — SchoolPL</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; background: #f4f6fb; color: #1a1a2e; min-height: 100vh; }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; }
    .back-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .week-label {
      margin-left: auto;
      font-size: 0.8rem;
      opacity: 0.75;
      text-align: right;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 16px;
      max-width: 900px;
      margin: 0 auto;
    }
    @media (max-width: 620px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      overflow: hidden;
    }
    .card-header {
      padding: 14px 16px 10px;
      border-bottom: 2px solid #f0f0f0;
    }
    .card-header h2 { font-size: 1rem; font-weight: 700; }
    .card-header .sub { font-size: 0.75rem; color: #888; margin-top: 2px; }
    .card-body { padding: 10px 0; }

    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 8px 16px 4px;
    }
    .section-divider {
      height: 1px;
      background: #f0f0f0;
      margin: 8px 0;
    }

    .row {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      gap: 10px;
      font-size: 0.88rem;
    }
    .row:hover { background: #fafafa; }
    .rank { width: 28px; font-weight: 700; color: #888; text-align: center; flex-shrink: 0; }
    .rank.gold   { color: #f4a100; font-size: 1.1rem; }
    .rank.silver { color: #8e8e8e; font-size: 1.1rem; }
    .rank.bronze { color: #b46c3a; font-size: 1.1rem; }
    .name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .score { font-weight: 700; color: #2563eb; white-space: nowrap; }
    .time { font-size: 0.75rem; color: #888; white-space: nowrap; }
    .me-tag {
      font-size: 0.65rem;
      background: #e0edff;
      color: #2563eb;
      padding: 1px 6px;
      border-radius: 999px;
      font-weight: 700;
    }

    .my-row {
      margin: 8px 12px 4px;
      background: #eef4ff;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.85rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .my-row .my-info { color: #555; }
    .my-row .my-score { font-weight: 700; color: #2563eb; }

    .empty { padding: 16px; text-align: center; color: #bbb; font-size: 0.85rem; }

    .no-saturday {
      margin: 8px 12px;
      background: #fff8e1;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.82rem;
      color: #a07000;
      text-align: center;
    }

    .loading { padding: 24px; text-align: center; color: #aaa; }
    .activity-icon { font-size: 1.2rem; margin-right: 4px; }

    /* Period schedule */
    .schedule-wrap { max-width: 900px; margin: 0 16px 16px; }
    @media (min-width: 900px) { .schedule-wrap { margin: 0 auto 16px; } }
    .schedule-card {
      background: #fff; border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07); overflow: hidden;
    }
    .schedule-header {
      padding: 12px 16px; border-bottom: 2px solid #f0f0f0;
      display: flex; align-items: center; gap: 8px;
    }
    .schedule-header h3 { font-size: 0.95rem; font-weight: 700; }
    .schedule-header .season-name { font-size: 0.75rem; color: #888; margin-left: auto; }
    .schedule-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    .schedule-table th { background: #f8f9ff; color: #555; font-weight: 600; padding: 8px 14px; text-align: left; }
    .schedule-table td { padding: 8px 14px; border-top: 1px solid #f0f0f0; }
    .schedule-table tr.current-period td { background: #eef4ff; font-weight: 600; }
    .badge-settled { font-size: 0.7rem; background: #d1fae5; color: #065f46; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .badge-current { font-size: 0.7rem; background: #dbeafe; color: #1e40af; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .badge-upcoming { font-size: 0.7rem; background: #f3f4f6; color: #6b7280; padding: 2px 8px; border-radius: 10px; }
  </style>
</head>
<body>

<header>
  <button class="back-btn" onclick="history.back()">← กลับ</button>
  <h1>🏆 Leaderboard</h1>
  <div class="week-label" id="weekLabel">กำลังโหลด...</div>
</header>

<div class="schedule-wrap" id="schedule-wrap" style="display:none">
  <div class="schedule-card">
    <div class="schedule-header">
      <h3>📅 ตารางรอบแชมป์รายเดือน</h3>
      <span class="season-name" id="season-name"></span>
    </div>
    <table class="schedule-table">
      <thead><tr><th>รอบ</th><th>ช่วงเวลา</th><th>สถานะ</th></tr></thead>
      <tbody id="schedule-body"></tbody>
    </table>
  </div>
</div>

<div class="grid" id="grid">
  <div class="loading">กำลังโหลดข้อมูล...</div>
</div>

<script>
function fmtTime(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

function rankIcon(rank) {
  if (rank === 1) return '<span class="rank gold">🥇</span>';
  if (rank === 2) return '<span class="rank silver">🥈</span>';
  if (rank === 3) return '<span class="rank bronze">🥉</span>';
  return `<span class="rank">${rank}</span>`;
}

function renderTTWeekly(data, myId) {
  const { rankings, myBest } = data;
  if (!rankings.length) return '<div class="empty">ยังไม่มีผลสัปดาห์นี้</div>';
  let html = rankings.map(r => `
    <div class="row">
      ${rankIcon(r.rank)}
      <span class="name">${r.name}${r.userId === myId ? ' <span class="me-tag">คุณ</span>' : ''}</span>
      <span class="score">${r.score} pt</span>
    </div>`).join('');
  if (myBest && !rankings.find(r => r.userId === myId)) {
    html += `<div class="my-row">
      <span class="my-info">คุณ — อันดับ ${myBest.rank || '?'}</span>
      <span class="my-score">${myBest.score} pt</span>
    </div>`;
  }
  return html;
}

function renderSQWeekly(data, myId) {
  const { rankings, myAttempt } = data;
  if (!rankings.length) return '<div class="empty">ยังไม่มีผลสัปดาห์นี้</div>';
  let html = rankings.map(r => `
    <div class="row">
      ${rankIcon(r.rank)}
      <span class="name">${r.name}${r.userId === myId ? ' <span class="me-tag">คุณ</span>' : ''}</span>
      <span class="score">${r.score}/10</span>
      <span class="time">⏱ ${fmtTime(r.timeUsed)}</span>
    </div>`).join('');
  if (myAttempt && !rankings.find(r => r.userId === myId)) {
    html += `<div class="my-row">
      <span class="my-info">คุณ — อันดับ ${myAttempt.rank || '?'}</span>
      <span class="my-score">${myAttempt.score}/10 · ⏱ ${fmtTime(myAttempt.timeUsed)}</span>
    </div>`;
  }
  return html;
}

function renderHoF(list, activity) {
  if (!list.length) return '<div class="empty">ยังไม่มีข้อมูล</div>';
  const isSQ = activity === 'saturday_quiz';
  return list.map(r => `
    <div class="row">
      ${rankIcon(r.rank)}
      <span class="name">${r.name}</span>
      <span class="score">${isSQ ? `${r.totalScore}/10` : `${r.totalScore} pt`}</span>
      ${r.totalTime != null ? `<span class="time">⏱ ${fmtTime(r.totalTime)}</span>` : ''}
    </div>`).join('');
}

function renderNoSaturday(opensAtMs) {
  const d = new Date(opensAtMs);
  const dateStr = d.toLocaleDateString('th-TH', { weekday: 'long', day: 'numeric', month: 'long' });
  return `<div class="no-saturday">📅 สอบได้วันเสาร์เท่านั้น<br><small>เปิดอีกครั้ง ${dateStr}</small></div>`;
}

async function load() {
  try {
    const [overviewRes, meRes] = await Promise.all([
      fetch('/api/leaderboard/overview'),
      fetch('/api/auth/me').catch(() => null),
    ]);

    if (!overviewRes.ok) throw new Error('โหลดข้อมูลไม่สำเร็จ');
    const data = await overviewRes.json();
    const me = meRes?.ok ? await meRes.json() : null;
    const myId = me?.id ?? null;

    const wkDate = new Date(data.weekKey + 'T00:00:00Z');
    const satDate = new Date(wkDate.getTime() + 6 * 86400000);
    document.getElementById('weekLabel').textContent =
      `${wkDate.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' })} – ${satDate.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' })}`;

    const w = data.weekly;
    const hof = data.hallOfFame;

    const ictNow = new Date(Date.now() + 7 * 3600000);
    const isSaturday = ictNow.getUTCDay() === 6;
    const sqNoSat = !isSaturday && !w.saturdayQuiz.myAttempt && w.saturdayQuiz.rankings.length === 0;

    document.getElementById('grid').innerHTML = `
      <div class="card">
        <div class="card-header">
          <h2><span class="activity-icon">⚡</span> Time Trial</h2>
          <div class="sub">คะแนนสูงสุดของสัปดาห์ · ${w.timeTrial.total} ผู้เล่น</div>
        </div>
        <div class="card-body">
          <div class="section-title">แชมป์สัปดาห์นี้</div>
          ${renderTTWeekly(w.timeTrial, myId)}
          <div class="section-divider"></div>
          <div class="section-title">Hall of Fame</div>
          ${renderHoF(hof.timeTrial, 'time_trial')}
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2><span class="activity-icon">📝</span> สอบประจำสัปดาห์</h2>
          <div class="sub">10 ข้อ · 20 นาที · ทุกวันเสาร์ · ${w.saturdayQuiz.total} ผู้เข้าสอบ</div>
        </div>
        <div class="card-body">
          <div class="section-title">แชมป์สัปดาห์นี้</div>
          ${sqNoSat ? renderNoSaturday(wkDate.getTime() + 6 * 86400000) : renderSQWeekly(w.saturdayQuiz, myId)}
          <div class="section-divider"></div>
          <div class="section-title">Hall of Fame</div>
          ${renderHoF(hof.saturdayQuiz, 'saturday_quiz')}
        </div>
      </div>
    `;
  } catch (err) {
    document.getElementById('grid').innerHTML =
      `<div class="loading" style="color:#e55">โหลดข้อมูลล้มเหลว: ${err.message}</div>`;
  }
}

async function loadSchedule() {
  try {
    const res = await fetch('/api/leaderboard/periods');
    if (!res.ok) return;
    const data = await res.json();
    if (!data.periods?.length) return;

    document.getElementById('season-name').textContent = data.season?.name || '';

    const now = new Date();
    const rows = data.periods.map(p => {
      const start = new Date(p.startDate);
      const end   = new Date(p.endDate);
      const isCurrent = p.id === data.currentPeriodId;
      const fmtDate = d => d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', timeZone: 'UTC' });
      const badge = p.settled
        ? '<span class="badge-settled">✅ ประกาศแล้ว</span>'
        : isCurrent
          ? '<span class="badge-current">🔵 กำลังดำเนินอยู่</span>'
          : '<span class="badge-upcoming">⏳ กำลังจะมาถึง</span>';
      return `<tr class="${isCurrent ? 'current-period' : ''}">
        <td>${p.label}</td>
        <td>${fmtDate(start)} – ${fmtDate(end)}</td>
        <td>${badge}</td>
      </tr>`;
    }).join('');

    document.getElementById('schedule-body').innerHTML = rows;
    document.getElementById('schedule-wrap').style.display = '';
  } catch (e) { /* ไม่แสดง error ถ้าโหลดตารางไม่สำเร็จ */ }
}

Promise.all([load(), loadSchedule()]);
</script>
</body>
</html>
